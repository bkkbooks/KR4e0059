body:
  text: 海桑集卷一明陳謨撰四言古瞻屺堂并序昔者孝子行役嘗陟屺以瞻母屺何所獨無即所瞻何日不存雩陽黃侯以其祿弗逮養揭瞻屺以名堂蓋將所在乎見之按詩話山無草木曰屺係以詩曰緬彼崔嵬坤土而隆匪磜匪砠弗赭弗童我興瞻之念母劬躬嵌巖窈深可以容與其岑其蔚膏發泉乳我心孔悲念母鞠撫曖翠在庭朝爽盈襟宛兮慈顔春和煦林孰是金行為此慘栗鶴髮其髟霜露既集攢峰叢巒羅立間間既有令子亦有賢孫風木之悲寸草之傷甘旨在庖綵烏在堂祿薄養豐其樂如何豐而弗逮所慨實多移忠之孝亶惟盡瘁教忠繄母展也孝子孝子終身悠悠瞻此咨詢堂詩并序天下郡縣建牧伯守宰必立風紀之司以蒞之風紀肅而善惡彰美化成矣乙已分憲李公按部至廬陵而八邑之巨姦積蠧盤根狡冗翦剃剔抉發謫無遺鄰郡聞風膽落將去吏為民不可得蓋自壬辰亂民間不識繡衣久矣一旦震霆起蟄於涸隂之餘嚴霜殄沴於炎荒之野塗歌里詠松茂柏悅何可勝紀吏厥知所向始萌懼心廬陵舊有按察司公扁其堂曰咨詢而大書揭之其屬邑士陳謨僑贑聞而踴躍謹獻詩曰奕奕巖巖風紀之堂雪氷其柱鐵石維梁鳥飛過之不敢下窺髙明有抗神物訶撝十載之曠一日而偉如翬如翼繡衣戾止有扁崇崇端正不頗珊瑚碧樹交結枝柯憲綱之振在悉民隱于咨于詢是謂繩凖幽者潛潤逺者峻壁聰察或遺孰伸孰抑芻蕘之賤商工之卑勿卑勿賤言亦有禆虎冠狼牧童子能言蜜矢氊針明者昏焉孝婦之旱三年尤劇決獄之雨頃刻而集穆子格言著於春秋咨謀度詢必務於周巖巖李公服是明訓惠我廬陵以風列郡百邪以正衆枉斯雪載瞻堂扁居不栗烈公德在民公轡在野峩峩穹碑式勸來者朝陽詩并序朝陽美韶陽錢史君也為政宜民德如朝陽故以頌其豈弟也瀛海之東桃都之山有木相扶蔚乎盤盤金雞既鳴日觀斯出鴻濛之枝其赫有奕乃浴于海遂升于天蒼蒼涼涼維氣之先君子鍾之剛健其德匪維剛健抑又溫克穆穆暾暾冬夏一致彼晝而親愛畏或二我親其朝有愛無畏君子作牧召父杜母寧寬以擾無猛而勢韶石之上舜峰之下湛湛露晞皇華被野嵎夷之宅暘谷之賔成歲定時羲和紀勳寧獨韶陽史君遺愛式遄其歸光于昭代五言古萬年樹俗名冬青結子紅明似櫻胡宮中多植之對搖落而淪荆棘傷而賦焉翳薈隱嘉樹窮冬常不雕堆魁火齊珠錯落英瓊瑶直幹不偃蹇爽氣何飄蕭碧梧與翠竹無此晴霞標憶昨甘泉宮含風鬱蕭蕭鳳凰五色羽翔集不待邀天子重萬年當之奏雲韶王母留佩環月明耿良宵如何海塵起蜃霧腥丹霄惡草薦煌煌不材聳翹翹懿此麗荒寒容華日以消磨牙集豺虎墮羽羣鴟梟引睇蒼梧雲重華邈難招徘徊將何及落景騰山椒送友人之鍾陵以我白石歌壯君黃鵠逰笑騎將軍馬踏遍西山秋古之大哲人於此懷民憂鐵柱繫長蛟斗門遏洪流地軸安其常水靈何所求長笑蜀太守空立三犀牛繄此十萬家髙柳連城樓形勝自天開攻守由人謀綵筆為我題宣城美才猷寧知東湖水可以藏漁舟雲壑簡南安陳知事達人本雲卧丘壑外軒冕神明交淡泊樵牧相偃蹇伊優與骯髒叔世同一貶凄其望諸葛憂抱何能展甘霖幸一溉涸鮒將冀免歸巖出有時潛石不相逺橫浦極天髙懷人路悠緬英英露菅茅矗矗飄素練嵌虛隱空翠窈窕涵蔥蒨雖復簿書繁而無塵鞅絆摛章喚隂鏗作賦招王粲涼颸散沖襟清波送流盼亭亭金芙蓉似是武夷澗花下藏仙舟漁郎莫之見濟勝天與逰流霞共誰薦甲辰九日逰興國靈山寺簡同逰車馬爛輝光登臨向上方攢雲衆峰直引路萬松蒼澗底蒲茸白籬根栗葉黃爽猶宜羽扇晴復麗羅裳縹眇雲關峻巖嶤石徑長雜花明亂草好鳥隔幽篁漸近精藍域俄聞洞水香棟梁何崒崒金碧極煌煌崖裂獅初嘯巒廽象欲狂鯉魚新上水靈鼠舊依倉四句皆山形石筍何年長池蓮此日荒鐵船歸瀚海方竹壓瀟湘瀑散晴空雨林含伏日霜行雲走神女卧鉢隱龍王一紀長離亂叢林半在亡如何超劫劫獨此見堂堂喜挹清河彥兼承入幕郎風流同茂宰嘯詠及重陽杯紫浮萸烈瓶虛插桂芳髙僧慣賔客才子盛文章壁怪前題漫遊疑後日忘少陵多秀句偏在贊公房乙已正月携家自永豐蕭原鄭大中氏復歸平川雪晴郊行分得數字因用述懷蓂飛窮孟陬鴉喜喧晴宇食罷淡無營意行愜幽趣章縫六七人諧笑雜今古出行仍關市負郭皆樂土霜留草頭花雪落松梢雨山翠掃嬌蛾水光搖浴鷺梅殘驚縹蒂栁弱未金縷縱橫野人廬大半無外戶皆云縣官好所病在軍旅近時哨糧卒出沒甚虓虎劫財野為青殺人血漂鹵以兹不有寧全家入城住縣官極保障郭外今安堵官軍多下流執訊繫長組向來劉表鷹化為張湯鼠家人尚未還賔主闕茗具升平亮可復籬落勤遮護桑柘即抽萌鵝鴨尚多數芳菲亦未通笑指桃李樹乘除理則然甘苦要相補我從去年秋不得戀墳墓避地來平川誓將逺抄虜凄涼塤與箎白髮走歲暮彼是天一方鱗鴻杳無據前登胡公山似蟻緣壁度懸崖臨不測仄徑憂跌仆竦身膽為掉况敢一下顧喘噎投村家村家亦冦伍危言相恐迫云此難久駐喚兒自束髮導客從兒去所利客資囊奪攘俟中路我家一百指幸不罹此罟脫身走鄭鄉奔竄泥沒股鄭公素長者見客深慰撫薪米既幸周時亦分酒脯草菅藉地溫伏枕且無慮新年返平川復此名勝聚自聞野人言驚悚狂欲舞縣官希魯卓才子追沈杜深懷五色筆隨意數行醑清吟勿體拘占韻實齒序藹藹春雲埀冷冷石泉語志喜亦未然姑將紀愁苦夜飲簡同席華月流中天美人集公館戰塵良已清涼颸且賔雁對此念君子萍蓬各鄉縣賞勝如前期會心豈在逺曠懷諒所同樂酒皆維宴駕言望廣寒所思邈遙漢玉兔搗玄霜為誰駐顔面蕭蕭青桂枝吹香助芳薦殊乖建安才虛辱髙賢眷微詞苦難工所適非所玩貞婦時運忽復乖兵塵昏白日風花信所飄安得念茵席所悲命如葉自誓心匪石出即依旁舍歸斯匿深壁凶徒肆披猖雞犬俱辟易罔俾荃為茅寧甘血成碧哀哀八歲兒抱母同毁璧分韻得杖字三十韻西林崒雄峰衆山此其王秀如沖霄鳳險若排空浪髙木鬱扶踈旭日明滉漾何煩紫蓋朝默已通蓬閬太史覽九州於焉憩仙仗遂令百里間疲癃走祈望髙明當中天拱衛羅萬象是日正重九晴雲開蕩蕩往來三四公白髮森相向始自泮水涯青錢挂笻杖徐升閲武亭宛見武安像飛步凌數階恍然層霄上始悟出城闉頓隔蠓蚋盎稚松早騰拏香草極條暢落星不上天伏鴿猶在壙顧侯鎮是邦文武古良將馬軍送行厨時羞壓冬釀寵兹數君子園綺相少長佳句况絶竒意重千金貺朋徒有清歡觴酌無限量侯惠不可忘羈懷良自曠吾愛元陽子至寶不慢藏掉頭不能吟養真有嘉尚吾愛霞外人飄蕭雲鶴狀身藏一黍微氣溢九垓壯自慙局方內探道肯多讓言誇豈是玄夢斷猶成想譬如水中月誰能擒不放歸途醉昏昏逸興殊悵悵遙禮山上雲雲深暮鍾響張思孟賞菊席上次葛誠夫韻十月菊始繁何殊艷陽花衆芳誠所存獨萃清河家琴樽暢襟抱金蘭盛才華煌煌錦綺雲承以朱翠霞餐英想靈均吹帽懷孟嘉極興從淋漓笑諧絶疵瑕晚節相與娛吾生良有涯題秋江送别圖贈酈彥誠祥烏有慈母旅食他山樹波淨涵金螺沙明橫白鷺飲啄逰其間逍遙娛旦暮祥烏夜夜啼所思在返哺銜悲訴鸞凰乃得導先路往還里數千離淮復經楚兒髮白不多母顔渥如故白鷺安敢留金螺送東注霜降潦水收冬溫栁芽露望望故園春淮山湧晴霧哦松謝丞託興於琴劒金玉各賦一章因賦答之為琴為遞鍾氷繭絃孤桐下堂寫猗蘭上堂奏薰風一默成連師無虧昭文氏所貴薦郊丘何心勞鄭衛為劍為豪曹吳鈎非寶刀鳴匣欲剸犀流星利吹毛嘗聞武庫災穿壁徑飛去勃勃芒碭雲赤帝何由遇為金為紫磨太白無顔色不歸董卓塢肯近王濟埒丹砂安可化水銀安可成淮南枕中術舉世髙其名為玉為截肪含章而永貞入火火弗焦沉水水弗氷守圭與五瑞雕琢備文質成器有相資懿此他山石溽暑作古意六首并六句濕雲涵薄霧日光如鏡塵楊花吹滿床燕雛嬌近人雙雙白練帶銜得櫻桃新微薰似清暑復慢幽人肌泉聲翠帷隔花艷玉瓶滋誰緘雙青梅題作無情辭溶溶雨沼波宿來得新魚但看萍無蹤始悟魚安居莫照叉頭花叉落驚雙鳬翦下菖蒲葉換却流蘇帶雖微纂組工自是清淨態畫簾景遲遲雕盤香靄靄困多病不如塵生風自卷蕉心先雨開菱花後時翦宿有錦字書教兒枕頭展枇杷香在手將餧隴頭鸚嬌鳴久不食振羽謝多情從今無浪言浪言郎君驚遊天慶觀登衆妙堂興歎堂有玄元像竒古而蘇公小大二碑及居士泉皆廢蓋戎卒居之琳宮宅兜牟褻汙衆妙門試窺搗衣砧上有眉山文上堂羅兒婦下堂飼雞豚塑像古且竒稽首玄元君端居燕穆清誰使居人羣亦有居士泉澄源為之昏那無一寸膠可洗千丈渾西湖行樂圖生綃動湖光長夏宜清暑芙蓉散風漪徑柏留晴霧行無羽扇塵樂有瑶琴趣令德將遐齡魯侯深燕譽夜雪耿耿茅簷下明燈看飛雪犯此太古寒因之百情熱匡山有神人路斷梁亦絶舉目但悽􅀈星霜變玄髮狂歌白石爛往往逹明發敗菊敗菊如佳人粉面初酣酒猗猗耐荒寒蘭芷相與友緬彼仙桂枝金粟照窗牖吹香逐環佩乃亦襲塵垢獨秀搖落餘肯與繁華偶故應鄙陶潛憔悴五株栁吳生何人斯礪斧君知否題種德齋豫樟豫樟材之雄拔地恆千尺冥將霄漢迫密是鸞皇室斬伐遭時艱根荄走石壁先公餘後澤條肄今矹硉又復儲楝梁溪山再開闢樹德必務滋埀猷逺翼翼幽齋蔭瀟灑絃誦終日夕成蹊者桃李充牣皆黍稷樂地貴名教髙風仰賢式蔽芾晉公槐蒼寒孔明柏邦人所敬恭君子以觀德題蕭氏友恭堂庭前紫荆樹四時根如石誠非雨露私乃是友恭積蘭蓀産其隂松桂左右翼清風列嘉賔賞弄終日夕伯氏髮已種溫溫金玉質才堪百吏師興逐壺公逸仲氏鶴昂藏家事久云敕衣內滄海珠枕中淮南術修髯引清風叔子秀而栗鬱鬱眉睫間色矜新句出塤箎吹若貫江海潤交益兒孫束禮法中外罔嗟戚然萁誚曹丕酣酒傷牛弼不見九江人同堂廣長席不見安豐生自結天翁識雞來哺狗雛犬俟同牢食行當表宅里逺可風百億况乃隂德深髙曽所培植我來數升堂雅素最相悉廬山王文學金蘭契方密長歌樂知心髙文已在壁鄙詞雖匪工聊用勸無斁弔越王臺昔者虞翰林盛製越臺碑讀碑多勝槩登臺但荒基王昔乘黃屋自云帝蠻夷迷途殊早復臣節終無虧陸賈信自賢任囂豈真癡臺今廢興幾終古名不移海山萬景赴豈殊隆漢時乃知登覽勝曷以臺觀為穗石洞天即五仙觀仙各持一穀傍各立一石則五羊也吳晉紛紛日荆交瀼瀼時五仙持五穀為拯斯人飢滕修加撫字郭璞徙城池羣生日以阜兩賢功同歸五羊上天去白石今纍纍至今稻梁豐不數蝦蟹微潟滷出牢盆堆疊如山坻化為百萬糧充君節度資兵民兩足食市井相娛嬉懷哉五仙人埀德無窮期讀五賢傳偶成五首昔在山隂縣風流顧凱之茂林當户逺白日下簾遲興寄丹青裏人懷豈弟思越山千仞碧俯仰共心期右詠顧凱之楓柳雖合抱何如齋中松縱無棟梁日長會九天風正聲若金石擲地諧商宫尋我遂初賦意在山水中寧知桓司馬復與此心同右詠孫興公辭吳還入洛雲漢昭文章玄圃積白玉纍纍俱夜光長歌豪士賦委質成都王列軍朝歌城震鼓數百里悲風天際來牙旗遽披靡至今華亭鶴聞者為流涕蓴羮敵羊酪黃耳為書郵顧榮既知己士龍亦東頭吳中佳山水卒歲宜忘憂右詠陸機笑疾故自佳吾以全吾天况識墓中人飄飄喜談玄浚儀有畫像名亞卓魯賢胡不傳循吏而以權門愆自非東海恩難雪成都寃大笑落水時流風至今傳右詠陸雲閣道東有大牛王濟鞅裴楷緧和嶠刺促不得休寧知投分寄石友白首同歸俱被收牧羊酤酪俟伏臘灌園舂稅何所求夫人輕軒兒戲綵天下樂復有否九卿司馬安通人和長輿巧宦信有之用拙寧非誣我思陶徴君養素傲樊圃黃菊繞柴桑清風滿窗戶右詠潘嶽題夾谷行樂圖麗景屬芳晨濃春滿郊甸駕言使君車旌旗望中見嚶嚶閙時禽宛宛低風燕田畯各歡集山農悉矜眩深耕務所先復此勞身勸溫言匪文具善政諧始願耒耜大夫勤豆籩君子宴野人禮法踈曷以助芳薦青青陵陂麥一穗獨堪獻使君占豐兆歡賞杯急轉簮麥不簮花衆賔雜歌忭勝槩入畫圖風流足吟玩披圖向他年可入循良傳吳孝廉九臯歸舒城黃蘆日蕭瑟賔鴻念長途晨興謝執友欲發仍徐驅請為君子行言送孝廉車水有深潛魚林有返哺烏綵衣化為衰落景傷倚閭陟屺歌白華飛雲增鬱紆鳳凰有丹冗窈窕臨古舒醴泉噴巖阿竹實埀庭除飲啄愛羽毛他年御瑞圖願君崇令德金玉堅不渝弔落星寺移船落星灣不見落星寺灰飛劫已空石在頑無智嘗聞容桀黠豈是關天意覽勝懷昔賢金仙久無寄星宫環紫垣官守寧容棄向來果何愆一斥淪九地化石竟不歸千載同一恚七言古題吕仲善所藏汪水雲草蟲卷子并序卷中百蟲各極情態而終以大小數鴈豈所謂江南破百鴈來乎水雲寓黍離之感於畫圖觀者凄斷瑶琴理罷松風長懶上湖船看歌舞行雲流水有心期野草間花各天趣紛紛蟲羽恣飛揚散入毫端無遁處尋香逐艷何從來含睇凝情如欲語黃筌崔白稱好手妍吮朱鉛眩童竪不肥不瘦潤有餘墨暈生春獨清楚春蘭翛然如處女短不出叢秀眉嫵夏芷仙人白紵袍長身玉立風生宇何當石根容我步烏紗笻竹從容賦漆園蒙莊知道者夢裏化為蝴蝶去蘧蘧栩栩情態多什什伍伍花間住顛魂無定抑無歸粉翅織紋何用許象房守宫半夜走玉帳佳人成白首絡緯蕭條蟋蟀寒山河已落他人手籬根曄曄牽牛花瓜蔓藤枝亦何有西湖清淺緑荷雕畫橋依約春風柳海潮不至天目傾七寶金鞭從北狩雙雙朔鴈俱南翔莓苔菰米連瀟湘飛鳴宿食各自得豈有矰􅌳仍須防道人蒿目難為傷銅山淚盡天亦荒琴歌既斷賦無續畫圖倣佛存興亡平川呂氏好古者不鄙謂豫題此畫忽憶秦皇漢武年萬事輪雲如走馬題青山白雲圖劉生用墨如用兵墨如雨點鴉亂行須臾生紙氣飛動浮雲白白山青青秦皇昔向湘江下怒伐湘山山盡赭此樹能逃烈焰中至今瑶翠森如畫窈窕復疑盤谷中書癡擬欲挂髙松飢煮肉芝分白雪寒披栗葉嘯天風題春江送别圖跨牛菴前松兩株跨牛菴中誰讀書金華仙伯黃太史至今虹霓四壁光有無往時聞人侯獨駕一篷雪來從太史逰風致兩竒絶賢郎故是鸞鳳雛僑居奉母樂有餘七千里外懷定省新年欣得陜州書黃河鐵牛安且都河中水暖多嘉魚民恬俗熙官府靜召南復頌賢大夫賢郎江頭買舟好六月潘輿到家早公館甘棠蔽芾隂夀觴先進安期棗書史孫碧霄寫景春江潯别意恆苦多畫意恆苦深江清栁碧天沉沉誰能贈君緑綺琴沙鷗往來未近人燕燕亦復多好音江水去不回柳條空爾長松飄金粉綴離席絮住淨萍隨去航就中龎眉老禪伯夙昔賢侯心莫逆河梁日晏重牽衣一望青山三歎息歎息深深禮白雲但祝平安厚眠食郎君歸戲綵衣披圖吟詠想依依月明却憶金魚浦應是南來翔鴈飛喜雨行為瓜爾佳縣丞作田將入種黃塵飛髙原卑隰同歔欷秧苗盈尺日夜老南風捲地吹人衣夾谷賢侯心栗栗憂國憂民賦安出清平禪關地髙迥龎眉老衲動如律松頭上接雲氣寒柏樹遽作龍身蟠寶瓶楊枝初灑潤風雷奔走驅濤瀾免冠散水城南北通身是雨皆天澤連日滂沱不暫停大湖長陂收不得斯民呼舞賢侯燕白下由來壯哉縣今年奉公百不憂䆉稏髙低滿郊甸金柑花金柑花鉛霜銀雪盈丫杈獨當伏日偏榮荂緑珠金彈葉重遮半黃可恨飄籬笆數枝尚復秋始花花不成實徒紛葩髙枝蠧穴心久瘕秋髙恐畏成枯槎抉蠧椎鑿何當加低株三尺隂㲚㲚始自脫略茅與䔑試花寂歷明晴赮秀色已似卑梨楂后皇嘉植楚甸誇憶昨包貢天王家兼程星火疲騮騧蓬萊歌鐘觴九霞傳柑曲宴恩波奢塵飛道斷虎奮牙下州斬伐無根芽他園見之何悵邪天王北狩黑海涯故侯誰種青門瓜楊梅荔子金枇杷紛紛並得登籠笯金柑花委香屑玉同塵沙行歌花底沾烏紗歌成謾起園官嗟題瓜爾佳同知畫像卿雲景星麗天目吳峯如繡江如醁鍾竒育秀誰最多九苞鳳凰維夾谷大明啓運朝明堂覽德遂與羣龍翔西江下邑煩撫字勤勞祗用躋民康井井栽桑隂覆野歲歲萊田有新稼萬頃黃陂淡更清一襟寒雪光相射丹青寫出廟堂姿唐代衣冠逺有儀瑶林瓊樹風臨賦預想凌煙閣上時次瑶攴石望鞋山舟移瑶攴下遙望石如屣舟人云是大姑娘一掬弓彎曽墮此吾聞古有巨人迹薑嫄履之生后稷神靈竒蹤此其一水仙羅襪凌波輕安取盤囷如此石又聞大禹乘四載濬川來經彭蠡濵遺此表徵千萬春江神呵禁疇敢登偶一踐踏風雷驚導河自崑崙砥柱碣石壯本根瞿塘灧澦堆舟航不敢爭飛奔長江巨石天意存此其小者疑屣云君不見小姑健兒女將軍劍峯屹立當海門落星石星宫墮江化為石作鎮鯨波與蛟室東西日月異崑崙金碧樓臺自兜率海枯塵起劫火飛陽侯鼓波竟何術大船駕海貔貅來戰罷湖中血波赤至今白骨堆山丘此石雖頑淚應滴君王掃除江海清匡廬五老復精明南朝三百六十寺安得乘雲取次行題謝令尹朝京得意圖緋衣皂帽朝天客如龍駿馬桃花色埀鞭緩轡曲江頭賞遍咸陽二三月亂來奴𨽻皆輕肥使我復憶開元時畫圖忽見驚相問不是知章定牧之悼劉生劉生少年美無如壯志只欲攀雲衢焉得青藜照天祿苦遭燕麥迷玄都故園花木愁題鴂綵服庭闈歎蟪蛄白璧久寒黃土暖更堪老樹夜鳴烏史君雨為徐知府作甘雨注三農舞村村歌且謡云是史君雨四月欲盡五月來政恐腴田變磽土史君五馬走青原神龍騰驤離洞府翻倒銀潢挾隂霧澗溪爭赴長江去一夕良苗青尺許老農言百無苦昔憂井枯無飲處陂塘不得瀦魚鱉為人取丁男租稅且闕供婦女徒然力機杼木皮草根紛可煮何似舂粳仍飯黍園蔬復蔥蒨不肉美堪茹家牛不賣曰取乳牲肥酒香楓社鼓時時取歡覔鄰父醉裏長歌史君雨歌觀瀾歌并序湯君堯佐世家浠水為望族故有觀瀾亭自其大父父遊衍玩適而君少時讀書求志於其中君既以才諝選初調佐吉州司市征核而貨阜官理而務清廨宇平臨大江風漪雨縠月湍雪瀧四時朝暮瞬息造次無不可觀君慨念浠水懷祖父不置友生劉元實因以觀瀾副其志致能賦者率賦之按字書水因風起曰波又云瀾大波也夫水淺深大小絶殊故海瀆河江汝漢淮泗瀾在在殊善觀者隨大小淺深皆可有得孟氏蓋云有術故也即瀾何所獨無抑善觀者希耳君修於家研於學契夫瀾也深矣又能所在致愛致慤著存不忘匪徒善觀而孝思發焉斯不亦善之善者乎乃為長歌之其詞曰浠之水兮泓以洸不淟淟以灕入兮不騰騰而濞張其聲渢渢兮其肆以洋有美人兮亭之臯服且食兮咏以陶始涵渟俄湁潗兮噫氣怒而相遭文澐澐兮又􅡶􅡶錦機錯理兮象緯飛奔忽魚龍兮軒舉亂藻荇與行雲蕩日月兮弗支送鳬鷖兮在亹吾雖弗及觀海兮吾既得夫委與源凖千濤於一波兮又孰弱夫湍而壯瀾懷先人之不可見兮臨長流而永嘆曰盈科與成章兮佩明訓以乾乾吁嗟乎美哉洋洋兮永矢而弗諼歸猿洞歌簡玉華遁叟我本白猿翁來尋碧環女望山但覺藤羅深入門唯見花成塢花間蝴蝶為我語解君佩纕媒洞府自應託夢無險阻鳳凰飛來嗒以咍子非西行牛秀才昭君丐奴猶可笑野狐惑人何媚哉孫郎前身孫供奉袁氏化形妖氣重峽山要是萃逋逃狐女觀心國師動翁所佩蒼龍精試一舞耳生風旌陽斬蛟江水中何當一掃山為空我聞鳳凰言還謝雙蝴蝶畫船東下山蒼茫間向江心弄明月蕃塔寺金天聖人面流沙流蘇帳暖飄金花一從蕃僧起蕃塔常言彼此為一家朝朝上塔呼天應天門只在蕃塔頂碧甸雙睛白纒頭大師端坐如堅忍棾夾斜行只自識蠻音鴂舌聽不得菩提樹下學談禪彈指蘭闍笑如吃塔上金雞四面飛可憐宛轉無定栖狂風吹落市人笑何日飄蕭渡海歸甘湖九曜石石皆劉漢自大湖徙置大者名九曜樂州甘湖百丈餘中有長生之神魚天星入湖化為石短肥長瘦八九株醉翁上馬嗔索扶蒙頭衲士病且癯熊蹲豹躑猿狖攫麟鳳不動雲凝舒嗟哉天星母乃愚下俯奧泄甘同汙煙霏雨暗叢百怪鴟鳶糞頂鳬鴨呼嗟乎南中不可以久留何當返爾大澤與具區魚樂圖為王石泉賦石曽曽兮寫琴泉洲重洲兮隱釣船美人兮收綸湛空江兮遙天鶴汀鳬渚兮長短相憐羌林水兮翳然我所思兮濠濮之間淡松雲之滿几服芝术以忘年吳元年客韶陽戲作海桑歌海田茫茫皆種桑鴻濛萬劫劫復長隂連壺嶠磻空濶枝與日月相低昻桑根老人太清史肯向人間管甲子伏羲三十萬春秋一年一醉如流水雙鬢白盡還青青至今愛寫換鵝經只釀松花嘗滿甕與君歌笑走沉冥歲己未年七十有五作百字令以自夀安期瓜棗問今年海上怎生遲了七十五年看又過更七十年難老吟首歪詞寫張歪字送與陳摶笑笑時冷眼乾坤龍虎顛倒追念一度長安再逰汴水那用希夷號三百年中多少事一夜連床怎道易象卦圖天根月窟有何人能到為君長嘯洞天鐵笛春曉五言律臘月三日次康山廟阻風風滑不成雪雨寒徒滯舟湖低山石長天盡水煙浮漁子身如葉將軍命賭侯報功存廟食白骨謾成丘爛泥湖著淺和韻波濤遭險路風雪迫殘年空濶疑無岸蒼茫但有天冥行良獨苦著淺待誰牽舟子不知水長吁斷復連版子磯巢湖小龍子作鎮版磯頭遊戲騰玄象端居拱赤虬兩峯攢馬耳一水挾鴻溝遙寄新詩句明珠或見投登峨嵋亭弔太白墓神氣歸天上江頭徒認墳花留宫錦色星動翰林文過客多題壁摛辭難逸羣祗應掃松雪可以薦清芬望九華山秀色似匡廬芙蓉擬不如遙知五老者深羡九華居採藥間騎鹿眠雲或著書歲華詎云晚於此遂吾初峽江周郎墓此地亦巴丘將軍豈昔遊風吹大樹老墳對古壇幽廟祀存邦典時艱惜勇謀小喬殊凛烈爽氣共橫秋題復初上人松雲山房挂衲雲根松結巢松頂雲千年養金珀五色麗乾文松風引名勝雲月淨囂氛待携陸修靜酌酒聽桐君吉文費赴考功壯志已云逹守官仍一窮桑麻焦土後花栁閉門中貞石書遺愛輕車赴考功臺城天尺五鳴佩列羣公寄韶州段同知菊圃二守聲名久河東古絳州儀曹陪法從樞府接英遊夏館榕隂滿秋籬菊蕊稠官居隨地好山水自風流病起聞蟬蠟樹一蟬吟北風吹客襟時添柏子火坐擁木綿衾伏枕身如蛻觀書力不任清虛來漸逺於此識初心别黃侯歸嶽州青陽里二首奕奕青陽里江船秋到家鴈從彭蠡過月向洞庭賒砌長公孫竹園開子母瓜莫令生白髮應自問丹砂天地一虛舟水煙相共浮不隨蒼玉佩未弊黑貂裘孝友涪翁傳才情謝朓樓君山有仙子吹笛待來遊題秋江圖送青陽君秋水雨添碧秋江柳復春行歌螺子浦言送青陽君南嶽雲峰靜金華石色新懷賢空見畫情緒若為論渡江釣艇浮螺子依依夕照前鳥飛黃葉落山斷碧雲連野暝蘆花白天清桂魄圓紛紛樵與牧長嘯入蒼煙題小景使者求才俊官船倚杏花春光連楚甸鶯語似京華松潤藏雲密洲回帶石斜秦淮到應賞明月滿家家聞道二首聞道潼關下黃流似海深由來天設險過者日傷心漢殿芝房冷唐陵玉甃沉不應有佳氣鬱鬱尚如今中夜居庸北蒼茫見帝星翠華煙漠漠沙草月熒熒象緯尊南極鯤鵬返北溟感恩餘老象粉骨向心亭送子卿還家奉親雪紵唐人服香羅女直巾行吟楚澤畔猶是葛天民茭白炊烏稻橙黃鱠紫鱗登髙應最樂戲綵侍嚴親送郭思信逺遊不謂公家役還為壯歲逰風吹木蘭槳水發蓼花洲彭蠡漁歌晚秦淮月色秋瓊花無恙否幾月到揚州和陳中常贈别相見即相知相携未忍離神光湛盧劍髙誼角弓詩單父琴三疊河陽花滿枝逍遙行樂處别後定懷思夀星圖雲根一丈人長眉如柳青調笑赤松子出入紫微庭文鹿銜芝草金童把玉經武帝何由識空瞻南極星社日偕郭思誠伯仲郊行過其先人墓桃李螺江浦晴天散暖雲沙明靈運屐花照信陵墳入饌池魚白治聾社甕醺人生行樂耳春色已平分寄川上隱君停雲疊雪鱗浩蕩十洲春髙卧容安石耕巖樂子真絮花籬落靜梅雨篆煙新蟻蛭空多事鷗波只自馴蕭氏公孫竹圖孝竹參差寫光輝八葉蕭巖巖商皓節楚楚阮郎標挂壁紅芳映迎風綵鳳飄五君來往熟得醉不煩招蹇驢使爾不為蹇知非果下孫卓錐疑是駿漆步僅如豚暮雪灞橋水春風錦里村殷勤詩伯愛遲鈍向人言江橋晚景山欲收屏障雲偏曵葆縿水侵楊栁渚帆倚夕陽橋夏緑團空翠秋雲盛麥苗携書歸隱處不待太沖招懷楊子將建安七才子江夏一黃童鸛爵那䘖鱣琴髙不化龍羈孤千里易孝友一生隆最有宜春恨魂飄結暗松池上萱草池上多萱草雨餘紛好華亂榛扶易直輕燕掠微斜愛欲移當背憂冝摘送茶苕華比顔色同向國風誇贈安南使歸國秦淮栁影中使舫背歸鴻建業山河壯南交節制通襟涼乘海氣家逺待秋風仍歲頻銜命詩囊夜吐虹題郎中顧公蔗境詩卷昔者山隂縣風流顧愷之春風癡欲絶秋草淡相冝上馬青山送埀簾白日遲千年留蔗境只許省郎知初五宿峽山口野燒隔江明官船畏虎停危檣侵石峽髙枕倚沙汀樹杪初弦月蘆根數點螢一埕香桂酒自笑獨為醒因驛舟回寄清逺令晚泊清逺驛言懷仙李標江光浮雲樹潮信急蘭橈單父彈琴夜西山拄笏朝悵然一凝佇詩寄北風遙過清逺縣愛其山水追賦趙他劉漢墓清逺佳山水英雄多墓田趙他餘四世劉漢幾何年雲勢連衡嶽江源起蜀川海邦歸職貢應更産時賢過湞陽峽漢楊僕將軍駐兵處帆過湞陽峽攢峯劍插天嵌巖通窈窕石壁絶夤緣將軍若下瀨於此駐戈船飛鳥不敢下聲名何赫然過虎榜山已較文場藝俄經虎榜山上有欲落石下為無底淵詩人昔好事留字嵌空間摩挲殊未可駐目但悠然寄瀧水縣丞出佐瀧水縣緬懷貞節堂春明綵服麗天逺白雲長鸞詔騰雙闕金冠表一方依依縫線密應念久風霜别曲江參謀孫舜元北望水天冷南遊瘴海涼衣霑椰葉露酒送荔枝漿上相憐才美邦人沐化良向來經濟熟知不愧龔黃海漁公子為宋昌裔作我愛宋公子把竿長釣鰲間尋龍伯國笑指海鳬毛員嶠隨波轉珊瑚入網髙秦人未相識何用遣盧敖清江釣隱小隱清江上無心競白鷗蓼雲團竹屋蘆雪點羊裘放鶴歸何晚看花醉即休底須終日苦三百六魚鉤謝中常惠倒提扶衰得倒提散步任東西花栁冝煙渚溪山愛雪泥酒壺挑可逺竹戶啄須低只恐穿林石銅聲驚鳥啼劉子中茅堂整整築茅堂修修傍水鄉月明珠在浦竹密鳳鳴岡嘯傲輕軒冕踈豪引豆觴敲門無宿客題句隔莓墻李楚善山居身外等浮雲松隂靜閉門桃源有仙李盤谷傍漁村賢聖杯中樂君臣藥府尊重來應待臘梅雪滿郊原題春日山居圖隱者有髙趣幽居不用多松濤搖石壁樵徑入煙蘿倚檻看雲起攜琴任客過殷勤郭熙畫好句待隂何隱居圖寓隱茅堂僻幽尋鳥道分晴天千障雨伏日萬松雲豈是漁樵侶應懷鴻鵠羣小橋清淺處有竹抱桐君畦樂詩為王與齡二首為愛東湖水築堂臨水濆寒光夜留月白氣曉成雲花樹不可剪藥苗時自分客來常欵語琴薦對爐薰栗里問淵明旁舍招雲卿荷鋤草露濕織屨栁風清二子俱天趣是翁忘俗情時時車馬客於此聽棋聲懷海北張指揮韶陽深窈窕海北鬱岧嶤冬熱蕉衫薄晴寒海族驕轅門歌畫一城角動招搖想見張公子椰漿日幾瓢行年七十二時部使者移郡勘年甲行年七十二白髮向人羞肯羡梁江總空懷齊楚丘繡衣題姓字皂蓋驗春秋一自周原獵難為渭水叟題隱者山房隱者壺中日仙家劫外天晴虹出丹室玄鶴戲芝田待客沉香火清神枸杞泉何當謝塵事間説赤烏年題段氏山房結搆秀峰下清江長在門吟看輞川樹眠借武夷雲白石種成玉癭藤刳作尊誰為知已者竹祖與桐君巢雲為蕭伯璵賦二首為問巢雲子雲居定幾年飢堪煮為食吟即染成箋雨過龍文潤天清海色鮮相逢韶石上舒卷興悠然為問巢雲子幽貞夙所廬寧隨龍卧壑不學鳳棲梧拂袖凌空翠因風問太虛芙蓉曽攬結五老復何如遊月溪庵用壁間韻百粵多精舍南華是祖山人知尊象教俗已變髦蠻明月青溪上清風翠竹間時時一談詠杖屨自忘還謝烈婦夜月香魂冷春雲别恨長寧歌折楊栁不學野鴛鴦畫可歸屏障祠堪配女郎琵琶彈馬上晚節謾悲涼次楊子良催菊韻三首楚楚臨階菊曾看壓衆芳紅桃承海曙白玉吐霞光韶石多炎壤南天少肅霜如何深自閟不肯趂重陽楚楚臨階菊金風護得遲黃衣誰近侍白璧貴逢時屈子餐寧飽陶潛愛豈私由來傲霜節松柏共髙姿楚楚臨階菊從知品第嘉程侯情最重楊子興偏賒金蝶歸絲網天鵝散雪花只冝搖落賞難向艷陽誇報春樹但使羣芳早何嫌五月遲往花任楊柳孤注笑酴醿春事誰能報天機不自私此身雖老大雲錦爛離披芙蓉仙隱芙蓉仙隱處太守日來逰丹鼎飛隨鶴松壇暖卧牛泉凝三伏雪草耐萬年秋五馬朝天去山人空爾愁題梅關圖相送梅關去岧嶤上白雲緬懷張相國復憶庾將軍夾道松隂直初晴海色分天彭為井絡叱馭動成羣得季子果嘉興書聞汝蹤無定杭州定婺州雪寒探虎穴浪猛踏風舟千里傳家問三年滯旅遊七旬今又四短髮不宜秋五言排律崆洞雲居為曾巽卿賦雲居崆洞下野鶴雞羣中墮甑前境忘棄瓢煩慮空蒼狗任時態白衣謝塵容卷幔度冉冉開鏡浮溶溶隂榻清媚夏晴扉粲娛冬畝耕足歲年林卧窺鴻濛少日忽復逺聚沙想羣童杖策笑安期出門交蒯通晚悟要為逹朝華那可崇嘗恨史家流老韓將無同如何曹相國堂上留蓋公和雲壑熟食日韻并序别只欲聞韶去其如度嶺賒淹留囊易澀敘别雨頻嗟老樹迷雲葉危墻上土花榆煙新出火穀雨早分茶紀節門埀柳悲風墓集鴉他鄉託萍水髙興鄙桑麻酒出銅泉滑魚分丙穴嘉金相霞錯落錦句玉橫斜落月雷塘路啼鵑介子家鍾情君最厚滚滚惜年華題友人村居四座列圖畫半生傲丘樊布韋寧是貴軒冕詎為尊愛客頻掃徑教兒日應門榮華曽把玩道誼將彌敦雲與水無係吾將我共存興亡自今古運數任乾坤牢落三間屋縱橫半畝園棊尋仙客戲書對古人言斯鞅何功業韓彭幾子孫神竒終化腐汙潦本無根桃李休相笑梅花不解村為中常題溪山訪隱圖自適貴清曠駕言懷隱淪雨深禹穴外沙淨霅川濵著述尊𢎞景耕桑樂子真翠屏猿滅迹繡谷豹藏身木客傾壺夕桐君種藥晨水煙清自媚天籟韻常新芝熟原輕漢松髙本避秦祗應陶靖節來往問遺民題吕仲善營丘山房圖稷下古諸薑營丘小洞房鄰存鍾令宅里似鄭公鄉亂後蓬蒿長春歸棣蕚芳每從黃髮老最譽白眉郎一室如函丈羣書自大方移床分竹影掃壁散藝香輪鞅莓苔外鳬鷖几席傍歌商懷考父玩易到羲皇建業看圖畫平川隔水鄉參差多點染窈窕極蒼茫山勢元宗岱溪流想釣璜髙秋憑虎踞何處覔鷹揚追挽劉宗榮總角從先進劉墻白下東衣冠會元日桑梓共髙風內譜通家舊金科奕世同至今懷古道猶及拜先公夫子聲名早承家德業隆山輝元韞玉節苦自和熊善行東平最寒芒太乙通賢良蕡有策著作向多功未展青雲翮先成白雪翁修文期太速遺草意何窮令子稱才傑儒科致顯融善和存故里一畝復新宮種德門逾大光幽石已礱典刑看奕奕圖畫極渢渢春日珠林道秋風宰木叢長懷書甲子應自問鴻濛輔嗣經仍講賔王句更工焚黃知有日含笑九原中王員外赴京喜奉綸音至遙瞻帝里歸秋風辭省掖海氣拂朝衣參相深分閫員郎夙贊機金湯身作固蠻徼子來依欲遍羣黎德常勤四牡騑兵氓同鼓舞草木悉光輝留句題丹荔看花想紫薇鴈從淮浦起馬傍越臺飛未得承芝宇應嗟鎖棘闈送君霄漢上綵鳳逐朝暉簡徐太守二十韻牛女埀光逺番禺枕海長藩宣開畫省撫字屬黃堂銅虎未分牧郎星暫斂芒化行龍伯國春動馬人鄉流徙歸城邑頑嚚棄斧斨稻苗豐戰地潟滷盛兵糧出入明星爛聲容赤芾煌衣濃薇苑露冠重柏臺霜兩府聮賔位元戎解佩纕已無鯨簸海冝有鳳鳴岡百貨流泉溢羣蠻枕奠康昔襦今又袴肉藿酒如漿暇日同民樂隨時愛景光摩挲九曜石調笑五仙羊鐵柱悲劉鋹荒臺弔越王霸圖童豎駿客思海雲涼此日殷勤接仍看抱送祥麒麟天上石楯戟殿中郎傾倒情何極吟哦興不忘公侯知衮衮不數竇家芳海桑集卷一
