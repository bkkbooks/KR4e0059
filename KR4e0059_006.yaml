body:
  text: 海桑集卷六明陳謨撰序何侯序河東董元鼎觀逰於韶石韶之景十有二次第賦焉又將觀於仁化益充其宜賦者以仁化有賢令何侯也請曰知何侯深莫如先生幸頌何侯政得藉手見侯以慰彼氓豫惟侯由進士製巖邑巖邑盤錯也非利器不行進士鸞鳯也非鷹鸇可比利器足以治盤錯而鷹鸇不可馭善良必若盤錯迎創以解而頑梗胥為善良之歸其惟何侯有焉昔子路治蒲曰邑壯難治夫子曰恭而敬可以攝勇寬而正可以懷強愛而恕可以容困溫而斷可以抑姦則政不難矣夫以子路之勇而思其難將不懷鷹鸇之志乎夫子之言皆勉之於豈弟殆使進為鸞鳯也吾於何侯既以頌又以勸者夫亦猶其行古之道歟豫又聞侯來時浮彭蠡湖望大小孤放歌舟中筆勢開合衝拂與湖山相雄角此侯嘗朗詠以貺豫者元鼎行必聞之又將與侯金舂而玉應其奚囊虛往實歸也審矣因并寫以為序潛光集序安城劉倬為章以其先君子士培所録先世潛光集七卷示余且曰先君子亂後記録而成之手澤如新倬携以自隨卧起如對先君誠泯沒是懼必梓以傳先生幸乃序以見志余受而讀之往復再四不厭嗟乎忠義之家忠孝之澤逺矣哉其在宋史則有著作郎諱弇見於文苑傳實元豐進士元符中南郊進大禮賦哲宗以為相如子雲復出周益公序其龍雲集曰歐陽公以文章為儒宗繼之者弇也知澧州諱夢驥沒於王事提刑廣州諱子薦死於封疆則皆見於忠義傳皆轟赫顯顯愈逺愈耀者也倬於提刑為五世孫風流文雅宛然鳯毛實能用意於史傳外蓋論其大體固史官體裁然細事具眉目則家傳行實志銘哀挽與往來書翰彼此互足尤不可忽而使士培辛勤記憶於磨滅無徵之餘而不得倬也繼志以述其事鋟梓以永其傳則亦安能使其光逺也哉倬乎公侯子孫有不復其始乎子姑待之又相與是集相輝於無窮也贈雷州知事序昔者契為舜司徒而封於商頌之者特稱其桓撥言契布其文教洋溢中外而實能奮武以致民功也又曰受小國大國是達言其於小大之任無所不宜也又曰率履不越遂視既發言其能循禮而民化之速也夫臨民所本者惟在於禮所難者惟在於武禮之不至則身之不修固無以表下武之不足則罷軟而不勝任亦何以馭下哉如是則受小任且不宜矧大任乎同里談侯若驥入新朝敡厯中外膺文武之職纍纍著能聲最後特授平陽知府夫知府古諸侯也平陽臨蒞五十餘縣誠大國也若驥受之賦者均訟者平風采清峻逺近翕服非受大任而是達乎上嘉其能屢承顧問恩意優洽宜也洪武十五年既命大臣徐侯復初布政於廣東又選用才賢施化於列郡十六年授若驥雷州知事三月之官便道還鄉余得復傾蓋於二十八年之後且自慶其得郡小其職易稱居郡幕其憂易分嗚呼受小任而是達寧復過是耶其有得於契之率履不越也審矣其政孚於民而遂視既發也逺矣士大夫居官志在澤民豈恤位之髙下哉若趙由為守則易尉而為尉則凌守不能處下僚者也黃霸米鹽其政及入相則功名損於治郡時不能勝重任者也是皆有愧於契也抑若驥是行皇上殆使之以六月息乎若驥不惟安之抑又慶之其所抱負所施設詎可量乎里之賢士五人餞送江滸咸贈以歌詩余則為之序縉雲應仲張西溪詩集序詩道如花果謂其天葩紛敷必貴乎有實也詩興如江山謂其波濤動蕩岡巒起伏畢陳乎吾前然後肆而出之也必貴乎有實則綺麗奢靡者舉不足矜必肆而後出之則搜抉肝腸者皆非自然也此詩之至也縉雲應仲張氏以其西溪詩集示余不浮不淡有頌有規自其洪武十二年赴吏部試薰風詩清新而韻度及其過鄱陽湖望廬山五老峰遊清原七祖禪寺諸篇皆極嶄絶且圓美流轉若夫詠縉雲西溪八景聲調雅而不塵賦綿山十二景古意古調深得前賢矩矱非蹈襲筆墨畦徑者比其能務於有實而幾乎自然也審矣嗟乎君縉雲人也宦遊江西司征廬陵江西詩派祖少陵而廬陵有詩人堂仲張遊衍此堂久矣其詩之合轍不亦宜乎送江滙源之洪都序故濟寧府鄆城縣丞江孔殷有子曰匯源年冨而清狂材良而通敏將遊洪都請贈言於余余與孔殷交契厚善及其敡厯仕宦又嘗邂逅於金陵相勞苦敘殷勤最篤别未幾而以疾終鄆城任繼君而丞鄆城者萬君從善也彰交代之誼嘉匯源之俊配以女而昏以童于是孔殷妻携夫骨與其子及從善女皆還其鄉吁難矣哉匯源既冠冠昏哀先人之九原不得見幸外舅之千里猶可親思見外舅如見其先人焉是以有洪都之行余雅聞從善任鄆城滿除臨清丞一年改真定府易水縣知縣以憂還家遂老於西山南浦間嗚呼仕而未老得間此向子平之盛致也間而生事益豐此陶朱公之遺法也匯源操几杖從長者之後日追隨東湖煙桞深處遇南州髙士徐孺子焉其不曰子可教可教矣乎贈程鄉縣丞劉斯得之官序獻嵗發春甲子開運推驗者謂當上元之期此太平之祥也適劉君斯得歸京師顯有美除二令于潮州之程鄉縣且矜况余曰陛辭之際天顔穆溫謂爾大小百司欣逢昌運皆將享有皇極之福而澤流生民蓋畫一之法既定户口租稅版籍益明庶民皆惟正之供有司者特舉而措之耳抑氣數之有開而治道實相符也嗚呼士之用世何幸而遇其時哉嗚呼斯得也幸遇斯時又何幸而得程鄉之善地哉不期年而報政吾故有以必之矣且夫窮飬逹施士之常也然窮養弗端則逹施者或不能正大或不能明察或昧于經濟而流於迂或纒於簿書而玩於法或餌于貪猾而喪其亷若此者敗官多矣吾斯得一無是也始洪武十五年七月以秀才舉同舉者二十一人赴京除試僉事者七人而斯得與焉授任廣西按察司分守梧州府容縣懷集縣其年十二月到任懷集舊為廣東徭蠻流劫官舍煨燼人民死徙者衆斯得即具榜招諭復業者凡六百餘户縣復成縣而課稅有不明者皆為設法增益焉嗚呼斯得治懷集僅一月耳而事之可書已如此其窮之所飬何如哉次年三月命還以嘗食土人雞酒謫工役六十日役滿除今任嗚呼得罪抑何微耶已罪而旋平又何二之耶斯得窮之所飬殊不大厥施今以治懷集一月之勤為程鄉三年之淹以懷集六百家之感為程鄉一同百里之思海邦之地莫不鼓舞王化於上元之甲子焉歌頌之興有不洋洋乎盈耳哉贈廣威將軍馮指揮奏凱序侍衛親軍指揮使馮廣威以總兵官征南將軍申國公之命分兵招諭泰和髙行鄉四都之民脅從於永新龍泉萬安之山冦而未輯者廣威親臨其地察其相挻為逆初不盡然震之以迅霆壓之以泰山不若辨其玉石憫其久陷而開之以自新於是廣宣上德多納欵附致逃山竄谷者逺近相率扶老携幼踵接轅門皆給文憑以示信得復于民者凡一千六百餘户以口計之何啻萬餘視永新等三邑斬馘多而招徠寡泰和四都獨私雨露將四都之田野無汙萊之患租稅無後期之憂皆廣威之德也而千六百户之老者含哺鼓腹以終其天年壯者採山釣水飲食作息以鼓舞於王化其童幼丱角亦將既壯既室以丁以中而為太平幸民其感廣威之恩又豈有涯哉廣威歸而侍衛於九重時以南來山川之險易民物之利病城郭邑居之孰美閭閻市井之孰盛一陳於上前將必有禆於政治其為民之德不尚大於四都者乎於是泮宫士友皆為詩以頌而屬余為序云贈傳允謙還京序世祿之家與國咸休其令子賢孫清修玉立皆能佐方興之運輔赫奕之功若今傳君允謙是也君顯顯令聞抑抑粹容而充之以學問之勤發之以通敏之識老成而厯練文雅而風致其賢可知已洪武十七年正月上以吉之永新龍泉萬安山冦猖獗肆為民毒爰命國公暨二侯提兵征討而以君參其軍事至則誅鋤巢穴擒獲翦戮逺邇攸寧君贊畫之力居多及是班師暫駐泰和㒒始得良晤焉見其景星鳯凰有瑞世之英姿瑶林瓊樹乃上苑之嘉植而上之所使從事戎行與公瑾羽扇綸巾相周旋者乃所以玉成其逺大之器業為國家之大用也其意深哉於其别也故贈以言如此云王伯貞文集序王伯貞氏以其所製古文介余評之余評泊已又從而序之曰古今名家之作不必其有所傳授而在家學則傳受抑一助也唐之韓子為一世文宗然其為銘文薦道功德自其先世已然至韓子乃卓冠同倫爾宋蘇老泉有先秦戰國之風而子瞻之浩瀚子由之平實各為一宗不相齊同文之至也伯貞年甚冨學甚優文甚工亦其先父子與先生嘗充經筵説書先叔子啓先生以御史入廣為僉事由僉事授崇慶知州伯貞無役不從故所見所聞逈出塵表又申以家學之懿至其自得於古文者又當出於家學之外矧伯貞復由賢能薦舉試按察僉事廣東未幾徵還除水部主事以憂去官則其敡厯中外涉獵廣逺以昌其文者詎尋常訊其占畢者可同調哉吾評伯貞之文不雷以舒故雅不欎以簡故暢充是以往成家名世直易易耳故序而歸之贈劉宣使序周官大行人之職有主邦使之禮者蓋掌邦國傳遞媺惡吉凶之事凡其使也必以旌節謂事之欲速達者則執旌節以達於四方使無阻也後世兩府而下皆有宣使常員是其遺意自非疏通練達之器烏足以當斯選哉江西大藩劉君以才入選凡征討四出銜命往來無役不預偹嘗艱苦戎行間而才猷亦自是愈著己亥秋以中書旨致牢禮餼獻於分省于吉贑者道經西昌其友生念契濶之久而樂良晤之傾寫也又慶君盛年英譽有用於時而常不辱使命也則相與告諸朋徒而誦歌之且以期待於方來屬余序焉嗚呼君自兹升矣方今當興隆之運經營四方凡梁棟榱桷小大之材靡不畢舉君等而上之國信使使也直指使亦使也異時聞終􅂒請纓而南越震來歙單車而隗囂聳相如建節而卭莋通暴勝持斧而海瀕悅所以宣道德意延問疾苦所以究吏治之得失視風俗之厚薄亦孰非為使哉吾固佇乎其有聞矣西昌友生李孟章陳文正倪子鉉也序者陳謨云贈周伯景序番昜大郡多衣冠茂族皇元有天下髙官膴仕者肩摩而轂擊若伯溫周公以碩學為經筵講臣當至正間則其尤表赫者也余識其族子伯景于贑平川俱困躓不偶然相與談故家文物出處隱約翛翛旅瑣中不見可憐之色嗚呼其可感也夫其可敬也夫方淮蔡亂起士大夫裂冠毁冕化為豺狼者何可勝道而伯景僅僅以武功授南安驢田巡檢冉調為平川回龍寨以位甚卑以任甚劇而自至正己丑迄辛邜則固甚能其官以廉有聲自壬辰迄甲午當道者升使總兵征進則又能覆巢搗穴擒馘驅逐招亡撫來賑飢恤弱以殊績著自乙未迄戊戌雖不幸一嘗陷入虎口而略不屈挫及完節來歸又能誘諭羅田十三村逆民返我圗籍磔其渠而安其良功莫大焉賞不酬勞升平川主簿而氛祲愈惡君亦拂衣隱矣嗚呼使君前二十年從伯溫於京師其所至到宜何如也必不﨑􅋂歷落遊徼間以迂其身種種其髮而低徊於狹徑以取尺寸之功其可感以此然而甘心於寬間之野寧淡與泊相遭而不使接與構為伍此陶元亮之甲子管幼安之遼東是豈不足赧莽大夫之顔而寒馮瀛王之膽哉其不可敬也耶抑余聞君祖母當元初內附時不幸虜於兵君父極鼎甫三嵗越十一年聞母在泗州及至彼則聞入髙麗又三年至髙麗求之則母已前月死且葬矣極鼎泣訴官始獲負骨以歸饒婦同虜者三百皆哭送城外事載郡志嗚呼極鼎純孝人也純孝之門胤嗣必賢宜伯景守身厲志如是運之有泰有厄時之或利或鈍吾無如彼何獨計不辱其先人以流光來裔則為賢耳詩曰維其有之是以似之請以為伯景頌送王子敬詩序朋友以道藝文學相切磋者天下之至樂也是故合志同方營道同術並立則樂相下不厭者儒行之所美而離羣索居則雖子夏不能自知其過此伐木所以詠於詩而麗澤所以著於易也僕異時從諸君子學有講講有會會有程不矜口耳不事時好一宿於理期於明體達用而後已焉言之合也金舂而玉應意之適也雲凝而風休自謂此樂雖千金列駟不與易也乃今王君子敬有章貢文學之役筮日將行嗚呼其使僕與諸君子何如其悵耶子敬捧檄實以慰其髙堂二親又以慰章貢多士願望僕與諸君子皆不能留雖子敬亦不容自淹恤則相與祝之曰君族祖父雪溪先生始登第遂守均州再調為章貢則君先世仕國流風餘韻猶有存者肅然如有見聞乎其容聲可也又祝曰君其厚自愛益樹學卒業於逺大務悅親而慰其離思以志為飬可也三祝曰古人敦友道有一日相思千里命駕者又有於夢中相尋者自今講學有得當兩相寄相益毋金玉爾音而有遐心也如是則僕與諸君子雖隔顔靣猶晤對雖不相親講習而嘗切磋雖不接笑言而其樂靡間矣乃各為歌詩以餞行而余則序其所以拳拳者如此云車玄谷歸王山序王山本晉王子瑶飛升處以是得名及唐貞觀中匡瑜於此白日上升故又稱匡山山麓有崇元觀則西昌州城延真宫派别也故延真髙士世世遞居之今處崇元者為玄谷尊師師以道門之秀有士林之文玄德內充而威儀外肅清言亹有典則而道紀律度尤間當海桑變殷草昧時艱王孫泣路隅竄荆棘或毁衣冠匿名姓或昔君今僕忍極耻不足保殘喘者何限下者乃懷千金挾夜光倉卒間道以授鈔掠婉孌姬薑落人手徒掩袂沾裳不能制又何限也而師隱處匡山如陶唐康衢如海外神洲又何其超耶且夫匡山之間巖洞險仄土壤沃饒易以避亂亦易以召亂顧處之有道與否耳數年來雖虎豹出沒然畜牧自蕃雖桴鼓四警然煙火日密田年屢豐篁可楮􅐕可醪葛可衣筍可葅民用阜康莫不慕玄宗而服真教玄谷日優遊其間不混不皎狎麋鹿戲猿鶴殆將後天而老以凋三光也非有道者歟今年春三月州長以城邑茍完宜有以昭答既往導迎方來乃協民庶力按道家黃籙科式即延真宫行之而走書幣起師監齋余時宿齋宫撰朱詞見師所繩紏衆莫不謂然允為能職嗟乎此特其外見者耳猶可稱於衆如是若夫藏用之智周身之仁觴子瑶于白雲之鄉𨽻匡瑜於鴻濛之野視蚊蚋甕盎萬起萬滅曽不滿夫一哂則固非衆所能測而豫獨允知之因其還山也遂書以為别贈州從事某序夫能斡坤軸撼乾樞鼓元氣而雷域中騰百川而雨天下者龍之神也而神也者氣之英實為之人而鍾夫氣之英也亦然苐王公而下雖人不一其品等縣邑而上雖吏不一其職然無小無大無論窮達其處身卓有所立者其致身必顯有所施是皆氣之英而龍之神也吾見多矣凡所為軒軒炳炳感風雲而埀竹帛者古猶夫人今亦猶夫人焉安得邂逅既見不樂道而深美之今年春某以才選來為從事未數月民誦之洋洋盈耳最君之所立所施一從事詎足以厚辱哉然君不鄙夷其州所以贊畫於長二悉立於公上者舉以法故民唯恐一旦當路奪以去也則又自釋曰陵之桷鴻漸非久安藿之場白駒寧久食而况際貞符懷韜略英邁獨往倜儻不拘其發舒竒氣為昌言為偉䇿自致通顯固其所耳譬諸應龍藏沙石間小出而遊於溪洞崖壑亦時時澤及彼方斯已幸矣庸得係而縻之乎于是凡士類者咸為美德之詩而余則序其所以然者抑用徵諸異日焉送曾魯山之潮州序古稱豈弟君子民之父母説者謂豈以強教之弟以悅安之民皆有父之尊有母之親嗚呼希矣我儀圗之其維今潮州大守孝亷魯山曽公乎公系出唐五原防禦使世躋膴仕炳炳為章貢聞家故公風流篤厚文學政事動踰人人然在公第常德耳獨事親致隆極親終苫廬於墓域者終三年哀如新有雉常馴墓間而環山松蠧食樹盡枯獨公所樹墓松獨不蠧人以為公孝所感致則其行實可徵已公自親終絶仕進想蓋久世既更當路者將略定南服以公有同鄉在焉強起之公不得已野服樵夫拜以見兾勿奪志然莫克辭即日就道南中聞公且至郡縣有率先歸欵者當路韙之遂有今命嗟夫潮之民物亦何幸耶方亂之始生名都大郡胥不保而潮以逺獨完及鯨鯢之波稍就帖息赤子出萬死氣僅存如縷則又疲於奔命而潮又以逺獨猶先朝幸民覆巢之下破竹之餘始及於潮使非我公強起而應之潮安保為完州也今潮既得為完州不識一兵不傷一草又得孝亷如公者為之父母豈以教之弟以安之潮之民物不愈幸耶夫方千里之內専一城而治古諸侯之任也可以為萬物吐氣矣俗之利病而罷行之民之善惡而休戚之潮人沐浴清化衣被風采吾知郭伋再入併州而竹馬數百歡迎于道路黃霸冉為頴川而嘉禾生於府鳯凰集於境也公嘗遊西昌豫獲拜焉豫友蕭朴則公侍生也率士人作為歌詩以餞公屬其序于豫豫又惟豈弟君子者天下士也漢世郡守入為三公公得久於潮哉豫始以前所稱者為潮人致其賀終以後所期者為潮人致其思是為序贈軍幕黃君序軍幕而有賢從事一軍之慶也匪直一軍為然凡藩府官司之所在徴發鎮戍之所至與事上撫下承乘保障之一切皆有賴焉其為任亦重矣必得人焉溫溫乎其體恭勿勿乎其體仁明於旁燭而不苛才於剸繁而不滯若吾黃君伯經者不可謂從事之賢者哉伯經常為贑支邑信豐令尹政績有聲民德之不忘及為贑萬户府照磨如其為令尹時是時豪傑並起四方雲擾赤子無所庇賴不荼毒於冦則縻爛於兵伯經能推其愛信豐者愛及他傍縣邑所以脫之虎口納諸樂國殆不勝計嗚呼軍幕而有若人焉以招則徠以征則克以綏則和以澄則清將無施而不獲者何贑赤子之多幸耶余雖不及識然嘗聞其風槩而子敬王文學尤善談其行事有古循良吏操烈嗚呼當國者方急賢如渴略門第外資格尤恐有遺如伯經者詎止是哉詎止是哉吾固豫為銓衡得人賀矣郭生詩序稱詩之軌範者蓋曰寂寥乎短章舂容乎大萹短章貴清敻纒綿涵思深逺故曰寂寥造其極者陶韋是也大篇貴汪洋閎肆開闔光焰不激不蔓反覆綸至故曰舂容其超然神動天放者則李杜也不及乎寂寥者為桞子厚王摩詰儲光羲孟浩然而六朝之靡靡以淫促促以簡者弗與焉過乎舂容者為韓退之蘇子瞻韓公慷慨論列如河出崑崙極海而止其忠憤激切殆與少陵一飯不忘君者同機蘇公雄渾傑特元氣淋漓引星辰而抉雲漢真可與太白神逰八極之表二公俱非絺章繪句之所比也此詩之至也後之學子於所不及者進而極諸陶韋之閫於所過者約而歸諸李杜之樊不亦前無古而後無今乎然而世無其人也區區者蓋願學焉今老矣不足以進此道而視今之時人則又加惑矣類皆崇短章之促促者掇陳言之靡靡者即風月花草江山魚鳥百十字止無論貴賤逺近寒暑盛衰不能外此以為詩之材而此百十餘字顛倒後先往來出沒可以成其詩之集唐人云千首如一卷初等終是也于是短章每况愈下矣其於大篇則縮手汗顔不敢發一喙甚而黃茅白葦中時插一葩曰吾此體隂鏗何遜也嗟乎詩道一至此靡耶今年來雙龍山中得郭生詩而讀之愛其絶出流輩不追時粧諸短章律度圓事情切大篇如和杜北征尤今時望洋以走者如水總管刀老婦嘆通天巖歸隱諸篇信乎其希蹤於前軌而非茍然而為之也生由此其軌益大肆力焉成家名世不難吾固以吾所見異為時人者相與勉之其為舂容也為寂寥也有不各極其至矣乎桃源圗序桃源圗者渝上碧霄孫君為友人劉君以文氏作也不簡不繁逺近濃淡無不得所凡陶彭澤所為記韓昌黎所為歌第隱約半幅盡之信佳手也圗成以文求豫序志之余唯碧霄方承平時圗桃源凡幾直寄耳想耳及來西昌西昌幸出劫灰外其可為桃源宜不一所碧霄皆身厯之非寄與想也以文本五雲宦裔僑鳯岡垂四十年嘗仕而旋隱五雲未免劫灰即鳯岡亦一桃源也丹青蓋寫其實云然陶公記曰晉太元中漁人黃道真自桃花源歸詣太守劉歆説其事太守即遣人隨往已迷不復得路南陽劉子驥髙尚士也聞之欣然親往未果後遂無問津者噫二劉以迹求桃源耳毋怪乎覿靣九疑使頗知津安知不為入海求三山者舟輒近而風引去之也陶公辭彭澤老柴桑翛然世外桃花源有是人否乎然則柴桑亦一桃源也今之時視晉宋之間南北龎裂抑又有間矣以文任運自然掇皮皆真與陶公等宜乎雅尚如是豫壯遊鳯岡雪顛重來樂與君共此桃源也故欣然序述且以告諸同志者肆為歌詩以張之孫觀民之鍾陵序求美村者必之乎鄧林之野懷至寶者不立于五達之衢何則培塿堆阜之植蓬蒿荆棘其翳薈之也深牛羊樵牧其遏抑之也易故常不至於成林而干霄而魚目欲與明月爭光碔玞思同結緑齊貴往往衒賈以欺人人不知寶則極口舌以自珍執衣裙而留玩焉斯二者固無取也君子者修之於家非聖賢之訓不親非孝亷之操不尚必不肯輕出其所長小用於一試時然後動定然後應而常退焉若不與於世者其於吾友孫觀民氏則然豫與觀民别六七年意其攀入海之魚龍軼赤霄之鵠鷺久矣乃今樂蓬茨於崆洞之下讀書事親外足不識車馬之塵耳不聞雁鶩之聲淡乎其如秋之髙穆乎其如陽之暾曒乎其如氷玉之栗之潤其藻思之綺而不浮也其金相之毅而有煒也其懷至寶也如是其為美材也如是然則吾子固未嘗一立於五達之衢而求子者自至乎鄧林之野逃名而名隨韜彩而彩發亦君子自驗其學之一效也于是觀民有鍾陵藩府之辟不容辭行而有不果之色凡交遊者率為詩歌以壯之而邀豫序焉嗚呼子行宜果矣鍾陵之間大藩所都大僚所集必不辱子所守方今閭閻利害可慨者多其為我曳長裙而一昌言之茅亭分韻詩序僕與吳師魯孫觀民王伯貞對床於吕仲善館中極道離合悲歡之故運數安危之機人情物態之變夜參半不能寐仲善曰不可以不賦請以共君一夜話為韻韻由齒分人各成詩而詩悉同體翌日復求序之僕與觀民為蘭金之契避亂後幸乃得兹邂逅有可感者有宜詗問者有驚且愕者而又有可慶可慰者於是而傾寫底裏如霏鋸屑如卷海濤雖九韶之奏八珍之御不足喻其快也仲善好客之當時諸君俊逸之參軍而僕乃牽率潦倒乎其間將弗稱乎雖然觀民將應藩府之辟其去此殆雪泥之鴻爪耳僕異日與諸君誦停雲歌伐木徒想像天末不可即則今兹聚首歡洽何可以不識也時嵗在乙巳十月五君分韻詩序昔者韓子語孟郊有曰我願身為雲東野化為龍言合并之難思欲如雲龍常四方上下相逐有不可得故一邂逅即相與聫句唱酬以為樂誠古人之盛致也平川吕君仲實以五君分韻詩示余求序其端以為孫君觀民逺行之贈且志後會焉豫讀之悠然曰觀民善交仲實好賢諸君子能賦皆不可不序當嵗乙巳九月觀民自贑偕吳師魯來遊平川于時王伯貞客吕仲善茅亭所孫吳二君物色伯貞喜茅亭頗異仲善亦喜茅亭得二君又異即復下榻廖君以善於觀民則太丘元方之交也是夕亦對床亭中仲善嘉名勝之集不常樂笑言之雅有益取共君一夕話分韻成詩次夕又以勝讀十年書分焉詩成各韻度可愛豫聞齊鍾嶸詩評云范雲婉轉清便如流風回雪丘遲點綴映媚似落花依草此六朝諸賢佳致五君蓋有得之者矣觀民之洪都公務之隙時一展玩其有不懷韓孟雲龍之感乎然時方向泰又庸知諸君子不與觀民四方上下而雲龍乎即他日對床分韻未有已也然則友義之敦何時而忘之仲實之欲序而志焉豈小補哉贈吳師魯序廬陵吳師魯避地章貢時逰平川余亦旅瑣中數數相見相勞苦外吟嘯以為適乙巳十月會宿吕氏茅亭將别各惘然有不忍違之色誦古人八表同昏平路伊阻俯仰今昔感慨係之于是益重匪風下泉之思而嘆孔明公瑾不作久矣會有告者曰腥雲毒霧且盡景星鳯凰將覩諸君何戚焉或者不謂然貞白生請占之遇比之坎其辭曰比之自內營丘生又占之遇革之豐其辭曰大人虎變豫曰此其兆乎比相親革相變也自內比外以從顯比之君道斯行矣虎變文炳以革天下之故運斯泰矣王貢彈冠庶或在是楊子不云乎士不得則龍蛇師魯在章貢其為龍蛇也久矣豫亦安能栖栖久處此者固與君交慶之君歸以二占質諸友蘭先生其不然乎其不然乎諸君各為詩以贈豫請書此以為序興國縣申免倍徵序秦漢而來田有賦賦有經豐不加益歉不加損有司守其額徴其入以為常嵗比不登明良在上或賜民田租之半或三之一史必大書之未聞倍而徴以權宜而足兵食者也自淮蔡亂二十年東南耗竭力相十而霸權相百而君更起倐謝無寧嵗而世無桓文之賢以匡而糾之於是有據一城以抗大國者地狹費夥則征斂百出若章貢嵗取加倍之賦是豈不得已哉亦勿恤而已矣及建業兵蹙其城盡徙其官屬士卒收其圗籍而其倍徴之賦與額無辨主典者徴入急於星火平川常賦七千屯田雜賦不與焉當大兵之後邑里蕭條民惟正之供且稱貸弗給而又倍之雖椎剝膏髓無所於出况倍與正不辨將遂為正其為害豈小小哉縣令朱克敬其民欵上干府若總制之司不得允則率吏民俯伏泣訴庭下當道者憫惻其誠與之申達且俾緩征俟命未幾命下得可民額手相賀指子孫誓不忘於是主賦吏相率請曰吏幸乃承事今得終役得不受大府逋責令之惠孔厚今兹黜其倍以歸簿正無窮之澤實令所致吏亦與有鄉譽焉願先生紀述示逺近永譽將來豫曰令書上考孰大於是後之將鼓舞而頌曰倍我徵者不幸作俑於章貢而尤甚幸反正於朱平川誠盛美不可不書他政固勿論也嗚呼善固國者先固其民善寬民者先寬其賦充是以往無行弗達一平川邑何足淹哉余是以紀之劉啓東文序僕逆旅平川始識斗明羅先生與其朋徒劉啓東凡數輩不多見也每讀斗明古文詩歌歎其沈蔚徑核葩條扶踈掩映敷不贏簡不鬱得柳桞州風骨三復不忍去手平川先賢勳業如鍾令公為唐名臣炳然與房杜姚宋埀光轟烈聞其風者雖去之百世猶凛然足以亷貪起懦而作之氣獨文章由令公來未見薰古人膏馥而烜赫焉者豈韓子所云宰物者輕與人以富貴重與人以文章殆是類耶夫唐之文韓子起八代之衰而桞子亦然至于今學古者不於韓則於柳雖天縱若歐蘇不能外厥繩檢然則勳業在房杜諸人而文章在韓桞抑又明甚斗明固薰古人膏馥而興也嘗既學宦矣已而翻然棄去益大肆力於古如使斗明冨貴如令公事業如令公其文未必能爾爾也其朋徒經其口􅊰指授者皆風氣日上而啓東最稱才嗟夫由令公來見斗明由斗明而奮者宜不少然復不多見文章誠不易得於天如此哉啓東以其文若干篇示余敬書此而歸之夫子之文明以縝溫以達束規矩而不輕縱此正途也昔柳子答韋中立書自敘其學與其為文誠天下古今準的子熟復焉而蹈行之古人不難到也此非余言也子之師必嘗語子矣王子賢歸瑞金序永嘉山水之勝名天下謝康樂草池存焉故鍾其竒秀者皆彬彬文蔚以試於用則政譽藉藉殆前賢清風雅韻師表百世而能慕用興起以致然與瑞金令尹王君子賢永嘉人也同館贑上清宫君方以輸賦猝猝無暇豫亦旅瑣棲屑然稍間即相與論詩不置每夕薰爐茶鼎上下古今宦遊南北之迹登臨瀟灑之興繁華巨麗之觀興亡物態之變一偹於詩琅音洪吐聼者忘寐豫或病某題艱某詠欠工君須臾口占皆清楚俊邁即凡成仙雖停杯擊鉢無以過也君讀書之所扁雲樵山房觀其志蓋在於山水之間而功名利達特分內餘事昔康樂為臨川聞有勝處即伐木通道連旬彌月從賔客僚友極意而後歸雖涉物論終不芥蒂則其在永嘉可知已夫何所獨無芳草哉無謝公沖襟清思則草亦常物耳君之雲樵山房宜與草池齊名可也瑞金在萬山底其民朴茂易與為善君進其明秀者與之吟詠而振起其披靡彼以其給公上之餘力從賢令尹答樵歌於雲中將遺愛未有斁也山房之句不多於草池乎豫將過而和之故先序以為贈玄虛閣詩序玄虛閣在贑治右靣直江東太隂泉在閣後今總制參政陸公鼎建之七日而成上祠祐聖帝焉按郡故名泉太隂者以江之東其山火旗取壬癸制丙丁故泉與閣所係為重兵後閣燬參政既鋭加起廢遂謀於玄妙提點秋月曽公求得人以主之提點遴選其徒郭昌白王玄外使領祠事豫友竹逸王君極初蕭君率凡能賦者贈送之屬豫寓其宮來請序嗟乎贑治城郭邑居琳館梵剎雄壯甲傍郡承平舊觀興復必有時未幾而斯泉獨先被參政寵光如新疏瀹豈無意哉夫地載神氣而山川流形其間名都巨邑宅而據其上遊不能無偏重之勢智者創物常迎其息而損其益所以為民社計者深矣古者藏氷開氷以節陽氣陽猶火也過則為災然則浚泉之隂抑山之烈豈非總制封疆者之一務乎二髙士道德沖玄文采炳蔚蚤夜精白以奉北極之神斯泉也觱沸涌乳有相之道不惟往年井井而閭閻奠枕以歌詠參政之德是又二髙士功勤相與植立於久逺也方壺詩序太守方壺常公世家瀛海其先大夫字曰瀛山者參政則堂家公鉉翁所命故翰林承旨牧菴姚先生復以方壺字公皆不忘所自生之義公蚤為內朝禁臣中嵗宦遊南服晚而退老崆洞之下翛翛物表若素未嘗居軒冕者豫恨識公晚及連得接殷勤聆謦咳燕趙豪傑悲歌擊節之氣猶足以薄崑崙而卑泰華中原文獻之懿猶歷歷然也公謂豫曰昔者名公卿才賢辱賦方壺者璧煥而珠絢今與善和之藏俱化去獨記憶汝礪傅先生詩時時頌道之嗣而賦者又侈矣繫瀛海之思於無窮將不在是乎子為我序之豫惟方壺之山飛仙化人之所室宅白麟赤鳯之所遊集醴泉芝草之所蕃滋緬緬邈邈不可迹求若瀛海間意公特寓焉耳不然求三山于渺茫而不知神仙之在人寰者固秦人取譏於盧敖也夫豈參政與翰林命字之初意哉嘗試與公燕坐一室江山風月萬景畢赴鳶魚髙深各一其天水木清華莫匪竒趣而所神交者非竹林七賢則商山四皓也固已蟬蛻汙濁之中汗漫九垓之外矣此殆諸賢賦詠所未及者吾何足以序之輒因公命謹書此于申齋劉先生記文后來者庶有考焉制使張公還鎮韶州序嵗乙巳春王師戡定南服遐荒郡縣相次入貢兵威與文教胥被罔不震疊先是制使張公以節鉞分閫於韶陽者數年卒伍肅睦邉陲乂安通商阜農講武勸學民用大和名稱達於朝冬十二月有旨入覲遂得朝正於臺城問在邉所以撫馭綏寧者對皆稱旨賞譽咨嗟解所御龍服親被公命大官具燕禮特厚時禁酤無敢醴賔獨各府連日宴公皆得旨若賜酺然可謂溢寵矣已乃亟還公于韶益固疆圉錫官駟局假以示優洽公歸至章貢豫獲拜焉神觀澄穆藹乎春陽之溫沖襟爽愷浩乎深淵之靚論議卓越鑿乎絲麻穀粟之實用也韶之民一何幸歟匪惟韶民環韶之四履芽枿抽萌羽毛鱗介皆有所芘賴以自全也昔公去韶不再閲月而其民若兵倀倀失所依歸今雖還未及鎮而塗歡里忭洋洋乎韶石舜峯之間者已不啻赤子之得慈母矣朝命亟歸公而錫賚有加豈徒然耶豫將從公幕府乃先敘次中朝所以安邉之意以慰韶人焉曽原道展墓詩序原道先生為余談其譜第園池賔從名勝文物風采與遊從宴嬉之盛倣佛如畫復如夢昔人有擊節者曰自太白死三百年無此樂矣夫何必三百年即目前隱約雖三千年不啻多也政復一家興廢然世道率具是如之何不使聞者慨也原道僑綿川以展墓至郡松楸何啻二十餘所喪亂一紀又半獨無恙將非虔化府君之澤逺而不斬其何能濟兹府君出五原防禦使凡十世當盧光稠時遇異人葬其毋於崆洞五陽兩山間墓地如仙人掌當宋徽宗時有兩侍郎皆以文節著宋史其他顯宦纍纍皆仙掌衍溢不絶今原道父子復世濟其美殆郭景純相地工妙不是過也其巋然滄桑反覆之外者將遺澤抑地利耶豫遊贑恨晚不得立所謂中書橋上聽瀑喧松韻俯石籟濯風漪挹崆洞之朝輝與五陽之夕爽以息於曾氏之館徒想像司空圗王官許用晦丁邜如將見之其何能不使豫重慨也原道畢事亟歸綿川謹色飬諸君各賦詠以贈而屬豫題其端記曰春雨露既濡君子履之必有悽愴之心非其寒之謂也此孝子也非原道吾誰與耶熊克庸歸耕序士君子方窮居獨善嘗輟耕壠上太息以俟時雖靈均亦然其言曰恐美人之遲暮又曰恐修名之不立豈獨為身利耶亦憂世而已及夫出疆載質之餘分庭抗禮之後畎畝之志或不得伸軒冕之梏或纍其守承順之恭又非所樂淵氷之情常不敢釋乃欲脫屣浮榮髙蹈樊圃狎漁樵友麋鹿庶幾一日之樂以滌其憂世之志不亦重可悲耶夫固足以觀世道而世道又何賴耶熊君克庸筮仕垂三十年乃謝祿辭榮甘食貧於崆洞之下日吟嘯自適莫能奪其心至是慨然買舟奉母歸清江將隱於耕以老焉告行於諸往來者咸為詩壯之僕請以古道為餞夫君功名利達之士也世道必將有賴尚安得久于耕哉姑將息肩弛擔展桑梓之恭盡菽水之歡而已鳴騶入谷鶴書赴隴不夙則暮君慎毋果于忘世窮居獨善非君子之中道也彼其狎漁樵友麋鹿類非得已如得已焉伊尹終於有莘之耕夫孔明老于南陽之野人矣君其有不達楊子良歸飬序天下之至樂莫樂於奉親然而忠臣孝子弗克如志者多矣其係于人者勿論姑論其係于天者則有慈侍嚴侍者焉有具慶重慶者焉至其甚不幸者蓋莫如永感而豫實蚤罹之嗚呼其可慟也夫乃嵗丙午旅瑣於韶陽適姻姪楊子良相處於半載暨嵗更是為吳元年豫猶留滯而子良以母老亟歸慈侍下韶軍幕王侯竹間亦重鶴髮倚門之感嘉子良之歸飬也賦詩為餞又率能賦者咸餞之豫讀之喜曰子良先君子萬全先生與豫同學易為合志且肺腑之親又通家也二氏之故亂離多矣今幸乃得與子良接殷勤之歡于嶺表千百里之外日追隨昔賢遷謫之遺蹤登臨之勝處吟咏以陶寫酣暢以沈雄誠所須以逃虛者而奈之何暫止而亟違也吾無以為子贈吾聞關西夫子講道于家有鸛爵銜三鱣於庭弟子曰蛇鱣大夫之象也先生自此升矣已而果然子歸飬其親極天下之至樂將不有三鱣之瑞哉吾行展桑梓尚得升堂為賀姑序此以志别云二月仲丁祭先賢詩序韶為嶺南壯郡先賢過化故多學故有祠中祀周元公右祀二程子朱子槎溪廖公尊道統也而元公槎溪又其仕國也左祀晉丞相王公𨗳唐中書令張公九齡吏部韓公愈宋諫議余公靖王公始興內史張余韶産也韓公宦逰遷謫所經景先哲也自學計入公廪釋奠如綿蕝先賢廢不祀垂二三年乃丁未二月仲丁曲江縣丞鄭和獨以俸合士友陳爼豆具制幣舉三獻儀緋衣象笏與章甫逄掖魚魚雅雅揖讓登降禮行樂作是蒸是享觀者咸嘖曰縣丞舉是曠典灼知政本矣夫禮不足求諸野若廢之是無本也果無學計獨不興豺獺之念哉王參軍簡夫聿觀厥成嘉寵賦頌之命僕序其事僕因語丞有宜興者二既興諸賢像然襄公闕焉一也蘇文忠公祠久廢盍肖像列諸襄公之次二也丞曰然然乃序次以質諸參軍參軍曰然然于是凡諸預祭者胥作詩紀之而謨為序錢史君改知饒府序漢史敘循吏傳云所居民化所去見思我儀圗之惟韶陽錢史君有之夫善政能使民齊而化為難善政足致民譽而思為難化則非止齊其外思則非止譽于一時思之逺者化之至也漢史深哉或曰史君信循吏子誠善論政若是徴乎曰僕所覩記所傳聞徵其實然殆不浮也僕嘗僑章貢僅一覩部使者行部至則十邑之資富碩腯與羸尫單寡者纍如俘者啾如鬼者填衢隘市籲穹嚙土訴寃雪憤日相屬不絶使者罪枉諸墨痛繩傍逮爰書山積夜參半燭不能休其郡政蓋可知已僕今僑於韶凡數覩部使者矣至即好喻其民令得上訴然卒無一訴者韶四邑方數百里之地邑令稟承惟謹亦未有尤其邑者使者聳嘆韶政長者也其民化服何如也牧韶五年桁楊卧于庭絃歌被於野諸所興作若公府公廪學校祠廟民歡集之而租調力征常賦率先期辦非民化疇克爾哉始君自南雄改韶州雄之人固甚恨奪以去嘗懇懇思之而韶人亦惟恐他府奪以去也一聞注代即咨咨戚戚或傳代者他調則額手以慶去年南雄官租輸韶廪輸者視雄反更易直咸感刻曰父母恩衆兒不是過也其去思表慕如是古今循吏漢為盛漢循吏龔黃為盛其化民其去思傳班班可考龔遂治渤海革刀劍為牛犢令人種榆百本薤五十蔥一畦韭三畝彘雞各五而已黃霸治頴川米鹽其政而精力行之命郵亭鄉官贍鰥寡嚴條教務農桑畜飬種樹而已其政易通其事易行其效易致也史君惟其有之是以似之今將移守番陽韶府參軍王君簡夫集歌頌謡章以贈而僕則序其實焉夫番陽名郡専𨽻江南西道觀察使而今復然地大而物侈齒繁而賦夥編户談禮樂闤闠有湖山實江東之上遊存中州之文物類非嶺海所敢髣佛得龔黃而理之豈特呻吟化為謳歌哉僕將慶其嘉禾生于府而鳯凰集于境也雪溪序王徽之嘗居山隂夜雪初霽月色清朗四望皓然忽憶戴逵在剡便乘小船詣之此史氏本語也後世竒其事髙其趣往往圗畫以為玩僕嘗以為溪光雪影髙寒逈映昡晃飛動殆不可描染徽之為桓溫參軍蓬首散帶為桓沖馬曹問馬不知馬飄飄乎負凌雲之氣幽襟雅韻與溪光雪影表裏清絶復非畫史所能倣佛故史語勝畫筆世罕知者即何所何嵗無雪與溪而人品非復徽之雪且晦其影溪亦掩其光矣仰彌髙銜江西省命至韶太守徐公奐謂僕曰彌髙簮纓科第世胄其父闕志伊甫兄克溫俱以進士美宦厯江右大郡彌髙復以才選為行人之官殆世濟其美者别字雪溪自况雅潔韶有能詩數君子相率賦詠之幸敘其端僕曰彌髙承父兄之業聞於義方者皆詩書禮樂之懿給事蕃宣使于四方者皆紀綱法則之事有逸氣有竒彩溪光雪影得君增重矣王徽之不復見哉河東董鉉亦旅于韶與君故舊其賦雪溪也願望深至嗚呼鉉也今之戴逵也有不相與吟嘯於皓皓之頃乎小蓬萊序守禦韶州指揮張公大書小蓬萊三字以贈蒲衣道者歸隱空同灞上其友海桑氏為之説曰仙聖之隱是不一方或逺或近或汗漫九垓或浮湛一世未嘗不可知而卒莫之知牧豎蕘子或得親焉而五侯七貴求執鞭不可得世徒知紫蓋石廪天台羅浮青城天柱武夷匡阜為飛仙化人之都抑豈知交衢閧市有廖天一焉耕荒釣寂有逍遙逰焉故商嶺咫尺于咸陽四老人者超遙其中秦皇烏得而羅之烏得而知之彼盧敖徐福固已大笑於海上矣夫隱豈以去人逺為哉灞上雙江之沃洲也舟車之迹狎至市朝之聲相聞遊鯈潎潎然鳬鷖浮浮然竹􅓗織織然厥土之毛蒔之鱗鱗然厥種之實廩之崇崇然殫其出食其入固由由然充充然也而挹其髙虛窵其沖明雪塵襟之弊弊然也煙青也而鰲露其背日耀也而波散其金望舒留其佩瓊田萬其頃跨黃鶴吹橫玉而過之又于于然也竒矣哉小蓬萊乎小之云乎囊括宇宙杯納川溟也夫孰得而小之余海桑氏也三見清淺揚塵不啻過也頗有桑八百株將自海東移之灞上幸分我寸田尺宅為我起癡虬鋤新雨而藝之余將剝安期生之實懷東方朔之核引東陵侯之蔓以為先生夀是為小蓬萊序於是韶之大夫庶士皆形諸歌詠焉先生以丙午冬至韶主王參軍簡夫所其道一本於無為參軍隆敬過常情好深厚丁未二月其徒苦迎歸莫能留也夫無為之道天以之而清地以之而寧君王以之而治平先生之所存又何得而涯涘哉哦松集序玉山徴士鄭君和翩翩濁世之佳公子也其色如璊其氣如暾來丞曲江有本有文緝緝純純德與量偕𢎞若守及長至于耆碩交譽合辭允亷允孝誠不可得方且仕優則學益大肆力希古作者遊焉息焉則播諸詩章暇日畀余評之夫詩之元氣萃於杜工部其散為萬象則百家千割焉然少陵論詩蓋曰于道未為尊其度越百家卓卓以此道者何仁義孝弟而已矣鄭君蚤志道六嵗習詩書十五富文史及其以賢良徵固辭願終飬再四弗獲讀諸詩自乙巳九月就徵迄丁未曲江纍百十章而思親懇懇一食不置其於仁義孝弟隆矣哉其本厚植如是其詩何患乎不追古也夫銼萬物於筆端㵼元氣之淋漓固作者能事充極髙之才識森束吾之繩削不茍不弛而練而達無他道也哦松集中律詩整整楚楚絶句清新大篇如彭蠡湖卷績石鏡梅圗龍王廟龜峰行等尤為美致余既加評泊復書此而歸之嗚呼固必期至於度越百家其亦慎毋畫焉爾矣李一中逰南華序夫厄運天地所不能逃也况仙佛乎况民物乎吾意混沌開闢天柱折地維缺凡幾矣三辰失次川沸冡崩蓋時時有之當其厄時彼亭毒之表宰物之徒得無有人間世之悲邪人者不足以知其然而仙者或知之矣夫仙亦委順而已故曰莫能逃也自漢以來學仙者舉宗龍虎自唐以來為佛者悉祖南華二山雄拔深秀冝為異人所都海內所走集乃兹十五年間天隔海斷江之東嶺之南相望如絶域二氏子若孫欷歔足繭拽竒訪古之士亦無由至焉吳元年六月龍虎化士李一中携法籙道金陵至韶州將逰南華禮大鑒僕與同邸對床間一壁夜話侵二鼓為僕言今天師承國寵被恩錫有加於前代凡龍虎仙宫百廢具興矣嗚呼審如化士言殆太平有徵乎嶺南之人見法籙如對紫清而南華之山亦將鶴驚猿愕意鳬舄自丹霄而降也吾所云天地與仙佛俱不能逃也以其數則過以其運則泰矣吾固由化士卜之也大鑒后曺溪凡幾傳為今夀南山耆年童貌其言恂恂其氣溫溫一見知為叢林中瑞麟也故廣東憲副楚之竒與論出世間法最契他人莫得問一中往吾知必渙然有合矣李梅所詩序古稱耆夀俊者耆夀語其福俊美其德英也禮六十曰耆指使又曰八十曰耆夀而至六十八十亦云至矣然而不徒曰耆夀而必曰俊者才過千人曰俊不俊是徒福也徒福之人百嵗之上者有矣可以侈國家束帛牛酒之賜而非所謂鄉先生沒而可祭於社者故耆可能也俊為難嘗試觀三老董公遮説沛公為義帝縞素興軍其卓識如此不俊而能之乎漢之三老為縣掌教化今郡縣耆老率是職也吾於平川得一人焉曰梅所李先生先生踰七望八精練如少年博古今窮經不倦通識政體善應事機縣大夫至者皆以老事先生皆就而問政可否緩急之宜先生必懇懇為民陳説官民兩便之上府大藩蒞平川尤近縣以民瘼申請其尤難者必煩先生先生每開陳忠概切至府若藩必從之嵗甲辰之冬臺城命雄師取贑平川幾以後欵受攻先生一如師而城以安堵則其尤大且著者吾故曰耆可能也俊為難非梅所其誰能之先生以其吟藳畀豫刪集豫讀之安敢去取其間然承命之辱其何辭敬録若干篇而序其端云夫先生之詩老成而順習明達而藻麗有議論有調度豫之所知者如此昔歐公舉梅聖俞詩佳處數端聖俞不以為然及聖俞自誦其得意者歐公亦不然也嗚呼先生之詩或非豫之所深知然先生之賢則知之深矣讀其詩也因是序也可以得其人焉張克讓歸金陵序金陵古帝王之州也其王氣無時而無顧昧者徒欲厭而勝之自祖龍時則然矣然而愈厭愈熾者將安所咎乎將地靈者天必相之非人所能計乎而祖龍而六國以及乎王朝王氣故未艾也夫豈埋金足以當之哉韶陽教授張克讓金陵人也折節嗜學必欲得斗升之祿以榮其親纍赴明經科不偶于有司乃薄逰嶺海由遺逸舉授瀧水教諭調湘江山長再調韶陽旅瑣南中且二十年迄不獲一命以老又嘗﨑嶇兵間傷其一臂極栖屑可念今年二月有至自臺城者得家問大夫人以夀終而一家憂禍網赴水死者七人即日解學官追服哀毁如新遭喪告行于所往來其友曾君學程求豫贈言以慰其悲豫不得避則復於曾君曰金陵王氣方新而克讓乃迷其邦徒周旋任嚻趙他間與鳥言夷靣相爾汝是可悲也金陵王氣極盛而克讓返其舍又儼然在衰絰之中不得立三槐九棘之下以吐虹霓竒氣不亦重可悲乎然而克讓孝亷人也險阻艱難備嘗之矣庸非天降大任之所在其亦自慰可也吾聞構大厦者無遺材矧六代之京都三吳之佳麗尚安得有棄人邪曽君曰是足以慰其悲侈其歸遂書以為贈索侯序索侯彥聖尹樂昌之次年豫來旅韶石槩聞侯之為政有生將往謁焉出諸賢頌章介豫序其端豫惟侯不可干以私而子顧謁之乎生曰侯風流儒雅豈弟子諒所為謁之者將以反自朂也豫曰子悉侯之為人乎生曰其先大夫謙齋先生為先朝名公卿肅風紀垂政譽而侯肖似之然則子悉侯之為政乎生曰樂昌巖邑且喪亂雕瘵之餘侯務勞徠安集其民築城鑿池以固之敦禮悅樂以風之化用興行里無徴呼而單父之堂更諸爽塏則子來之餘力也然則子悉侯之為學乎生曰侯燕處髙明四壁縹緗焚香讀易覽物揮毫雅歌弦壺率以為常嗟夫甚矣生之善自朂也古語有之旬日間不見黃叔度則鄙吝復萌故薰其德而善良者莫便于近其人子既悉侯之為人與政與學子之質將丕變侯亦必有以益子之不逮其不虛往而實歸未之有也余與侯故未靣生為致其情余聞樂昌者縣東二石因以名山而縣亦以名樂石之山多竹宜簫幸為致焉余將吹參差待鳯凰于九成之臺矣仰尊德歸青原序班孟堅稱士食舊德之名氏以為盛致然而自漢以來勳在盟府澤流鄉國者史不絶書而其子若孫能食舊德者曾不多見雖以魏鄭公虞永興為唐名臣不及百年而感慨係之豈其德或愧于流光邪抑世變之下雖賢哲末如之何也夫盛時猶然矧龎裂之俗冠屨易位之餘哉余與尊德仰君相遭於韶城相勞苦外復相慶猶不失為士猶得日相與觴詠訪任囂趙他陸賈遺迹於煙墟莽蒼中而歎楊將軍路伏波不作久矣尚安得麥鐡杖父子果烈邂逅一笑邪無何仰君來别歸青原出從事王君簡夫贈言復求余贈嗟夫果何説以贈君然仰氏廬陵名宗也自其髙曽大父宦逰江東能不家於官而俾其子學方技於餘杭金氏金之帶下國手無雙而仰氏盡其術由是帶下醫無逺近悉走仰氏簡夫稱其大夫人工巧竒效殆顯徴不誣尊德守其家傳而益之以文學之懿且其才嘗得推擇試吏矣以為不足為旋棄去唯務世業而已其來韶也茍其疾而衆瑟縮者君皆一藥而愈韶之貴宦髙資咸願留君而莫之獲固甚恨嗟夫君之髙曾其遺後也明以逺君之食德而無忝也將盛且大德厚流光豈虛語哉吾故原上下盛衰之故而深有羡於君焉彼其此厥不務而時之是懟果天邪人邪曾學程應徵序曾氏為西昌宦族宋時有安止兄弟四人凡領鄉書十而登賢科五其一以乙科不足榮再試中甲科乃仕建中靖國間東坡過焉為志其所著禾譜且勉以再譜農器而作秧馬歌遺之一門衣冠之盛他族罕比學程其族子也亂來旅食四方氣益張學益懋所謂加其膏而希其光溉其根將食其實者丙午之夏部使者至韶州咨詢之餘搜賢才於大守錢公必務得其人焉乃毋敢膺舉者于時學程方客太守錢公所衆曰求璧于山而橫結緑于席上求珠於淵而卧明月於忩間誠公論不可掩太守以為然即舉之部使者一見以為然即身勸之且命所在禮送焉學程顧戚于中慘于色退然如有違而不果者余請壯之以言傳曰公侯之子孫必復其始昔安止兄弟起家為監司為名公卿襲芳繼躅非子而誰木之在山也荆棘荒之風雪蝕之不自知其中於梁柱也匠石見而驚焉劍之在土也掩陽文隂縵之竒蟄倚天衝斗之氣不自知其斷蛟龍而剸犀象也薛燭得而神焉子烏覩夫所至到與所立屈信與否何如邪足乎已不蘄乎人安夫素不邇夫華有介無隨有亷無垢古之君子如是而已子行矣夫孰不曰賢太守真能知人而部使者果爾為國得賢也吳廷碩歸浙東序漆園吏云逃虛空谷者聞人足音跫然則喜之矣蓋聞似人而喜也夫空谷之境逺市朝絶軒冕幽人貞士託之以崇髙節抗浮雲者也然而逃其間者猶動色於足音想像如見焉豈非朋從盍簮天下之至樂歟今空谷所在皆豺虎窟宅莫之敢逃而昔之名城壯邑干戈燔劫生聚蕭條乃亦與空谷無異吁可吊也哉豫今年逃虛于韶有合志者數人日相往來以文字為樂豫之逃庶矣乎及秋而浙東吳廷碩實來粲粲乎婺女之明且潤也森森乎金華之蔚以秀也論道當時之故慷慨志士之風余其嘉之今之時度嶺而南韶為極邉然多漢晉唐宋賢士大夫遺烈豫既得與廷碩訪竒攬勝戞擊后蘷氏石磬之音摩挲漢熹平六瀧之刻徘徊張曲江貂蟬之峯嘯咏狄太守九成之臺其樂為何如其視聞足音而喜者又何如奈之何廷碩不能淹恤而遽以别告也凡合志者舉莫克留則相與作為歌詩送之美其行為孝亷其才為建安而願其去此為機雲為嚴徐也子既滯空谷則寫情而為之序引遊西林分韻詩引癸丑重九日郡庠諸賢偕逰西林髙明宫自退菴夏先生凡五人焉緣仄徑而上既及松門憩石階一息羽士聶霞外趙元陽袁元極雲褐迎笑延入客次氣少定盥潔謁髙明君因周覽盤礴青原諸峰悉羅列在下􅀢林森爽肅乎不見秋陽之赤威也入其黍珠室寥廓恍惚浩乎不知宇宙之垠堮也文人勝士所紀詠俱極興趣觀者忘疲于是總制顧侯文質遣其子致肴羞淳醪曰吾以簡練弓馬不寧有暇不能從賞名山敢以詩侑醉不醉是負名山與令節也凡在賞者雖不對公瑾無不心醉焉既爵行無算且滿引且𢋫吟以侈我顧侯盛心宴將終又相與言曰𢋫吟竟矣尤當分韻以紀斯會夏先生曰然竹杖芒鞋歸去來韻也齒有定分韻也元陽曰吾不作人間語久矣子其代之詩既就觀者嘖曰登髙能賦可為大夫殆不虛也僕曰不然夫何必大夫登髙能賦可以為列仙矣衆皆曰其然乎因書以為引海桑集卷六
