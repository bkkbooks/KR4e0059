body:
  text: 海桑集卷八明陳謨撰墓志銘劉深林先生墓志銘先生諱楚蘭字芳叟學者稱深林先生系出漢楚孝王囂十四世祖後周淮南制置大使始自金陵徙吉之泰和髙祖濟贈承事郎曾祖天定宋理宗朝以尚書擢第纍仕至朝散郎寶慶知府祖崇甫宋文林郎嶽陽軍節度推官考繩武宋亡元興隱居講學非程朱不宗學者稱琴軒先生繇仲子如川官承直郎永濟倉監支納推恩贈承直郎吉安路總管府判官妣蕭氏贈恭人先生其長嫡也聰頴沉毅善智謙沖博涉經術惇隆孝友事府君愈色婉容洞洞屬屬然未弱冠服恭人喪哀浮于禮睦姻仁族不以嵗歉愆虧府君繼室王氏羅氏事之如一王息女六及笄且歸悉為營資裝常割其室奩中助之至元初天下舉茂材慨曰吾宦譜由漢迄今四十五世吾不可以布衣老因偕群季入燕用薦授建昌文學考滿勑升吉水儒學教諭無何以群季隨朝府君年老辭祿歸養益肆力於學尤深於易壘土為園室覆以茅名玩易齊别築樓亭奉親樓曰風月無邊之樓取曠逺無滯本元公意也亭曰四時佳興之亭環植嘉木花草鑿池引泉取純公語也府君逾八帙日與鄉之耆夀俊為九老會每佐食視具必整府君歡適焉弟監支納由過用愆虧資産償不給知吉水馬侯承檄督徴窘迫甚至先生為侯規畫且捐已資助之償㒒始壯時當泰定甲子府君之喪觀焉凡沐浴飲唅之儀絞衾斂殯之制衰麻疏數之等內外哭踊之位若葬及祭不豐不約大致準朱子家禮皆先生講行之鄉人考禮者得有所觀倣焉其後攝鄉校施馬帳凡親承議論者悉有所𢎞益先生沒四十年孤城始以狀求志銘以㒒知德深也㒒行且七十表先進以儀來今不敢以鄙拙辭先生生宋咸淳二年丙寅終元至順元年辛未享年六十有六娶通判袁氏曾孫女生女一側室胡氏生子一孤城也孫男二先生沒時城方四嵗喪葬皆弟季通董之易代之際遭過軍發闕將以某年某月某日改厝於某之原銘曰知進退存亡之幾者易也謹冠昏喪祭之節者禮也易以幹之禮以維之幹強以茂其支維張以達其施懿哉先生壯德之機時則雍熙我思遁肥孝友是師幽光逺而鍾廷方墓志銘洪武二年己酉某月贑平川鍾君廷方卒享年六十有七某年某月還葬於麻田九年丙辰春余答邑大夫之聘館我于泮林其孤應雷職訓導始以父行乞銘嗚呼可感也夫先是乙巳余避兵劫旅平川一年嘗聞廷方先君子儒而俠藏書萬卷時從借讀之領客升堂恣所觀閲有手澤尚存者有新若未觸者且曰父死時戒云吾無以遺汝汝能保藏書不墜箕裘吾瞑目泉下矣廷方守家訓讀父書沾沾惟謹嘗奉太醫院檄試邑醫諭又嘗攝邑文學其後常守職前廊頗僻於書遇家藏未備者購之不吝或偶乏資寢食不安其母至脫簮珥助之乃已琴譜丹經奕數星術亦旁通而篤嗜之先世遺文手輯成帙名一家機軸名公詩詠采而録之名治世雅音廬陵諸先達顧學皆親炙慕用不倦學者稱束巖先生尤篤於墳墓九世祖進士以宋慶元甲午葬一百四十三年風拔其宰木墓遂毁廷方易棺衾重窆之大寧路儒學正揭軌表其墓母謝氏有元後至元丙子葬五止寨貴溪縣丞楊升雲為墓志文二十二年丁酉地墳泉發神弗妥安乃改卜儒林郎之栗里進士劉楚復表其墓又十二年戊申廷方復思吉卜買得廢壙於屋山下長坑之原改葬焉或嗾坑近不逞者誣以發闕縣斥其誣而府信之勒縣窮治廷方父子兄弟不勝其楚皆自誣伏繫獄廷方憤憤成疾會提刑項公霦行部至邑亷得其實坐訴者誑官妄認他廢壙徙之逺鄉而廷方先死矣嗚呼古之不易墓然或嚙或崩則遷之治之禮亦宜之廷方孝母葬再易而以孝嬰禍死識者蓋痛惜焉曾祖紹安文林郎知汀州上杭縣祖斗元贑儒學正父端孫字炳文娶李氏先卒子男四應龍應麟應雷應奎女一孫男五女五有雜文詩藁藏于家銘曰生能讀父書父曰汝不吾辱死從母於地下母曰吾不能汝福被誣得直善報速年幾七十夀匪促子孫蟄蟄似以續嗚呼孝哉銘可讀王祖母謝孺人墓志銘王氏承重孫華生偕弟巧生麻衣雪涕請曰祖母將葬未有志銘則不成乎葬敢以通家楊緝狀乞銘先生不賜鄙夷用光于幽余閲狀按孺人姓謝氏贑興國縣北故家世與王氏姻婭生前元大德五年辛丑二月年十八歸王敬翁是為廷震居士冡婦廷震早喪事姑劉氏孝謹姑年衰齒落病久成痼一膳一藥皆手自調餌承顔順志朝夕扶護凡十有二年姑亡未亡時族姻婦人皆疑病染勸使居外輒拒曰為婦而棄姑禮歟吾不避也衆大慚卒無恙甲午夏大疫家人死三四復有勸之者乃曰性不畏病堅不去亦不染其至性慈孝如此先是壬辰盜起攻劫敬翁將避地黃耉莊而徘徊顧忍孺人切齒曰身存子孫存患無家乎遂決去果冦至家毁而屬完甲午敬翁卒戊戌紅巾陷贑圍縣城攜家依劉氏聚居同患者五六家月餘糧盡僅僅能飦粥然必與同患者分少而食之其保家恤患如此烏乎孺人生二十四年而哭夫六十五哭次子七十三哭長子孀獨二十三年諸孫色養怡愈享年七十六終於大明洪武丙辰二月居常守婦道謹教子若孫勤甘貧無怨處困而亨壽考安榮可謂賢母矣子二德成俊成女二淑柔先卒齊娘孫五華生字明道能詩巧生字本道為縣學生從豫遊福生王生善生善生俊成出也曾孫二丙辰十月葬瑶下洞銘曰其晝哭也人曰母有令子其晝夜哭也人曰母有賢孫侃侃其貞粹粹其溫音容逺而懿範具存霜風露薤冬日背諼哀哀慈烏過者忍聞哀削承重負土成墳瑶洞之原同穴夫君體魄攸寧式昌後昆鄧大椿墓志銘士君子出官不幸而得巖邑宜死處巖邑而下無以芘其民上無以承乎公宜死雖上無以承乎公而下茍可以芘其民則雖死如生吾於彭水知縣鄧君大椿見之始君以終場舉子就徵洪武四年授四川省合州石照縣知縣賜銀帶朝服及至官蒿萊滿目君肇立官署招徠流亡勸農興學職所當為者靡不興舉無何革併郡縣石照遂廢改除知重慶府涪州彭水縣縣介蠻獠萬山間俗習異中土刀耕火種棲巖遁穴飢則殽獸糧蕨以為常知有人道而不知有仁義君以禮樂之化陶其善良以刑法之懲鋤其強梗民相率服化先是鄰縣黔江有丞姓方者以本縣舊管軍籍申達事未施行而黔江併於彭水至是旨下君盡得其軍以遣軍有姓陳者又於兵部誣彭水民為軍甚衆部遣彭主事至急於得軍虎威以逞君力爭民不可以入軍主事徵益厲君度不容展則曰吾有死耳良民不可籍也籍良民宜死不籍民亦死遂自經府以事上聞即曰免彭水軍民感其德配享君於城隍祠且家繪像蒸嘗之洪武五年壬子十二月也十一年戊午其姪性善始獲走數千里歸骨于故鄉始君之死同僚移文泰和至再而性善牽掣不得即往至是所賜銀帶已送還官而性善實來然君之行李手畢與其同僚祭文士庶哀挽皆完以歸亦可嘉己君生前元延祐四年丁巳五月十六日享年五十有六父茂𢎞祖宗可曾祖光先系出宋神童有興之後母曾氏娶羅氏繼康氏子男一人仲煥孫景元俱先卒今以性善子祖元繼仲焕之後洪武十二年十二月葬于城西南圳之原銘曰生以科第發身非碌碌死有祠祭于盈川不為不榖葬而從先人於地下斯為不辱嗚呼其人如玉楊母嚴氏墓志銘友生楊清將日月合葬其考妣拜曰清先君辱在邵庵虞先生銘文而先母刻辭有待敢狀以請又拜曰先母棄孤五年遭亂且窶不克祔不孝不天無所逃罪惟惠光幽壤庶其不朽按夫人姓嚴氏諱端字幼莊曾大父驤甫宋節幹大父瑞老父繹母吉安府判繩武劉公女夫人其次息也最鍾愛自幼出傳及習女事率優諸女兄母嘗曰此兒不凡他日必為人賢妻令母年十九歸楊逺是為翰林待制吟窗先生仲子待制起家科第顯宦而最貧生五丈夫子皆賢逺獨明經教授千里外用助旨甘夫人為介婦長能佐冡婦奉養不計有無姑郡君素多疾能質叉釧資藥餌終三年不少怠郡君沒繼郡君者事亦如之年三十二逺卒晝哭如禮能治麻絲躬織紃以訓育幼稚底于成人待制嘗稱斯婦早孀貧苦生事最落最甘守衆婦弗如也至正壬辰兵亂四起夫人間關挈幼逃難採拾備晨昏復能倉卒看客不厭凡居孀二十七年亂離半之貞素有恆常稱未亡能執妻道矣兒冠襲箕裘女嫁守襟鞶能躬母道矣其斯以為不辱生丙午三月終甲辰九月男二長清也次美以待制命後第三子仁好古學有才名後夫人死四年客死袁州女二長適劉禮次適陳巖俱儒士孫男二敏寓孫女一銘曰婉而堅以永年孀而貧子以賢閭不待旌不辱清門榖異穴同吉壤在原有相之道啓爾後昆元故隱君峻極郭先生墓志銘郭氏之先宋仁宗朝有郭源者歐陽公薦其博學有才纍徵不起子素孫賁贄皆知名當世傳六世至宋傑領丁酉鄉薦又一世曰獬曰麟皆捧鄉書曰蠡補太學生則隱君髙祖也隱君諱宗字宗大學者稱峻極先生曾祖方子祖傳道吉安路泰和州儒學録父建中建昌教授初授永明縣主簿以疾未任改授道州路江華縣尹命下於身後隱君天資沖粹文雅謹敇乍見肅然不言笑既乃亹亹如霏玉屑聽者屬饜為學沉潛有歸宿通詩經得六義邃深處侍江華公建昌時進士謝南窗先生詩經巨擘也甚稱譽之每賞詩卷不下五伯江華公去取髙下君從旁贊其是無不允者榜外者或來靣質君厯指某失經旨某失問意莫不愧服而去至正丙申大比里歐陽銘中選謝且拜曰嘗讀先生詩義於楊自立許雖私淑猶及門也其學術之正有如此者事江華公與母劉夫人孝養兼至喪葬依朱子家禮無違事叔父粹中尤盡養沒喪具皆已出女兄適楊公明生子自立甫六十日女兄死抱自立鞠于家長則訓迪之凡十七年妻以女而厚其資其后自立洪武三年以春秋舉進士官至杭州通守皆君之教也其篤於倫誼有如此者壬辰亂起悉焚劵已責蒸嘗外喜積粟待荒糴翔湧即減直以惠旁近窮冬雨雪必散薪米以周里之貧者嵗以為常邑大夫有願交者禮君以上賔君亦時時陳善以輔其不逮嘗有姪誣其叔而官信其誣者君力陳大義以直之叔得無罪姪亦感悔又有募卒斂錢為新官贄儀以為舊例者君偶語及之新官謝不知即行禁止卒七十餘家咸德君儒士談師韓疫死殯城東水暴漲漂其棺將入江立捐金募善水者以紼維棺于樹疫平語其子葬焉其急義如渴有如此者烏乎隱君大致倣佛槩見他多殆不勝書余與君為同學友情誼篤至獨所慨者俱不利場屋以老君常在場中見有不能舉官題注中者君為誦説敷陳無遺然君迄不偶將非命耶第君仲子洪武五年進士惜君未之見爾君娶劉氏生宦族有賢行繼謝氏尤淑慎執婦道子三人長謙辟不就官次晉由進士官永豐教諭升朝為中書掌記再調寧晉知縣次升女二長適楊自立次適蕭伯徽孫男三興吾興讓興文生元大德五年辛丑終元至正二十五年甲辰葬千秋鄉四十八都龍門楓山之原葬後十七年謙等以教諭廖謙行狀請銘隱君於豫五年以長兄也誼不敢辭銘曰老於窮經曾不得夫一命也勇於見義實存心於愛物也行隆誼篤直求之於古也江華浚其源寧晉楊其波入世莫之京也逺矣哉君子之澤也羅大可合葬墓志銘羅恕記憶其世系世德約略請曰恕生不辰遭亂轉徙犯瘴毒竄龍南幸不死不死而家譜亡逸墳墓不治先美弗彰猶死耳惟我考妣實忝姻婭宜在紀述㒒奚容辭按泰和羅氏五季繇金陵逮徙宋徽宗大觀間資産甲戴分財以祭田為先契劵立戶致政具可考數世至吉成府君諱克昭生三子伯英伯夀伯霖皆讀書知名倫魁張槐應與友善伯夀工八韻賦有聲場屋嘗刲股起親疾於埀死事聞于朝授某縣主簿官易其所居坊曰旌孝士大夫榮之伯霖諱國雨娶康氏有淑德生子二見可大可吉成死伯霖走名地師司馬頭陀得吉宅于千秋鄉牛耘田師云法當退十年大進且生賢嗣果八年生見可又云後十年再見果生大可諱德生未五嵗而孤母刻苦守志訓育成人娶劉氏能執婦道柔慈貞潔相大可奉母備極孝養母七十七而終喪葬靡悔憾夫婦辛勤營家資復纍千金居城東善居積篤倫誼厚親姻施貧窶遇丹青名迹不吝以蓄之延納應接賞弄忘疲絲管之聲恆溢闤外豪俠狎經倒屣傾蓋挽不聽去為别墅占龍洲勝處嘉葩異卉春敷秋啓時節嬉逰前賔從後伶歌扶携雜遝日一金費不屑也可謂太平幸民善樂生者矣生丙戌某月終某年月夀七十四妻劉氏生某年月終某年月年六十二合葬龍洲之原手卜之藏子三長惠次忠次恕女二恕字寬則粹表溫克處盛不浮居窮益堅其眷眷刻辭用意久逺克念爾祖足稱令子銘曰大觀之間勃以興旌孝表樹聲繼騰青烏白鳥神依憑二惠競爽季逺承賢哉伉儷福是膺刁間已矣奚足稱唯勤唯施昌雲仍令子紹述善日升刻此貞石來者徴袁寧窗墓志銘大明洪武二十年丁卯正月二十五日居士袁公寧窗卒是月某日將葬其孤子務敏以其壻劉允文來請銘豫辱交深厚不敢辭按公諱澄字以寧生前元大德七年癸卯正月十二日享年八十有五父得雲祖川量曾祖山則髙祖士表登嘉定戊辰第初任夷陵尉五任至建寧府通判公賦性純厚敦尚禮法衣不貴華食不事希篤於姻族義於朋友處家毅以和未嘗聞叱吒之聲教子孫勤以儉胥為良善之歸平居暇日園涉成趣蒔花藝果移接必時溉養愛護不煩不略得槖駝之術性不嗜酒髙堂廣席必為尊賔但濡唇而已然至其調笑以遊賭棊握槊尤善取勝不可第二其風致可想也允為太平之幸民矣娶劉氏生子三人長務本未娶而卒幼務學嘗試吏亦先卒存而備養者惟仲子務敏而已務學娶胡氏無後務敏以次子睿後之公生女五人允文其次壻也孫四人恕睿謙勤孫女四曾孫男七慶倫魯愚彬偉俊曾孫女五卜兆嶺岡之北坎山午丁向銘之曰袁氏之先顯于大唐宋三百年科第相望蔚為名宗冠于西昌有元盛時隱德韜光享有福慶實為寧窗一子送終諸孫成行體魄之安惟嶺之岡以相後人其藏允臧元故隱士怡如曾先生墓志銘隱士諱説字怡如考素先生世居吉之泰和城西為儒宗生子三長申如次恂如皆為士次即君幼從鄉先生嚴偉齋授尚書壯遊場屋不偶於有司科廢乃薄遊漢沔間為人尚節氣有膽量論議無所顧忌常傾其座人性嗜豪飲不善治生或勸之輒曰業一經足矣達觀物變脫略形骸尤樂施豫嘗恨力弗逮偶蚤出城南橋拾一囊揣之楮幣也藏而微步江滸果有倉皇來者迹之至橋上悵然不言色慘戚甚君問故其人泣告乃核所遺數幾及私何印而後衆啓囊驗之良是悉還之其人三一以􅒜一不受其為人立心大率類此壬辰淮蔡盜起癸巳大飢雖崎嶇而不失其正甲午夏得疾忽召家人無少長咸萃取酒饌屬别或戲曰公既别死在幾時曰將不及芒種節家人恐索治命第曰吾有子更何言飲以藥叱怒唾罵至日又問己時及否衆紿以明日不信力疾杖䇿至厯所跽而觀之衆曰公真狂邪曰不狂視官厯得不敬乎還寢搖首而逝生大德戊戌九月二十五日殁至正甲午五月享年五十有七娶程氏己亥三月七日生辛丑十一月某日殁距君死八年享年六十有二子二長曰學程次曰學曾女二長適士人次笄而殁余丙午始旅韶州復與程會程旅韶已四年由孝亷茂材膺部使者察舉將由韶入京乃泣血請曰程不孝不天父死時方負米興國二百里外及得報歸稿葬已七日罪一也母死時流寓章貢道梗不得歸不克知罪二也今將合葬於馬􅀈岡先塋之原然後如京幸哀而志之銘之庶異時為曾氏裔者得有所考而程之罪亦可自白余與程戚姻家於其祖子孫三世契也其何能辭銘曰人之所難非義勿取孰拾道遺必訪其主人所尤難視死如歸孰能觀化先處其時其惠也曾不廣其智也曾不施種而弗食孝亷是基馬􅀈之岡玄宅孔宜人曰幸哉有令子噫徐主簿旅殯志丙午九月既望韶曲江主簿徐君清源卒于官翌日旅殯于水西之原廬陵陳謨志之曰君浙江嚴州人以家學春秋為時明經師既取科第會世變隱居教授從者日益衆金陵建都以文學應辟授曲江簿即日就道訖六月到官令尹謝君彥剛自慶得賢二太守朝陽錢公待以客禮過郡治為下榻焉君為人氣直而言毅朋友言笑少不可意面折不能容又自金陵隻影冒犯炎毒水陸數千里入瘴鄉不習其土宜視事之初率書空咄咄大非畎畝所存未幾得疾三醫狎至衆藥雜進君亦自可否然後御猶日對客力疾不倦然食日益寡體日益浮調護百至無如之何韶府參軍王公眄睞尤篤是日需大藥通市無有參軍急送似已不能言猶強曰惟簡夫知我太守臨卧內淚雨落不自勝問所欲言不能應但搖首拭淚而已是夜三更卒殯之日太守以少牢躬奠城外令尹以下悉為位弔哭嗟乎士嘗以得一命為榮幸若清源者其榮辱得失何如哉得年五十有四别字艾軒數四介余為之記余有諾責愧負矣乃志其旅殯而銘之曰嗚呼艾也畜之奚翹於三年而越人之不期嗚呼艾也服之芳烈於椒蘭而靈均之不知獨移根於韶石望重華其逺而為龍為光彼菉彼葹嗚呼艾也而止於斯而止於斯天實為之墓表謝烈婦墓表金華吳頴侍其父德基之官南康遂遊于韶州亟亟會于朝陽錢史君家泣誦其母秉節投崖死時事繇戊戌至今九載凛然如生史君悚異之既又出宋濓陳樵所為墓銘若傳請曰傳以藏於家銘既納諸壙而墓門未有表也敢泣血以請史君嘖曰表之實甚宜乃表之曰母謝氏名黻奴既歸吳食貧能力婦功奉尊章節蒸嘗不愆以恪相夫教子悉有恆凖戊戌三月建業出師取睦州能先事熟慮謂取睦必窺婺與其夫決去就誓必歸母家葬池魚腹中決不受汚十月見潰軍血衣東奔不絶夫又逺外即携季女從一婢負幼雛以逃及入金華山婢與雛俱失獨手牽女且行且泣曰死而死耳身不可失也會遊兵四迫度必不免捫蘿而上臨壑谷深不測擠女先墮而身隨之十月七日也浹旬頴蹤迹得尸靣相向色不變生某年某月年三十有九男五人曰頴曰稚亡其三女二人亡其一一適張道三尸同椑祔於向嶺先塋之原則是年某月某日也嗟乎黻也安能與夫處其死危能同其女踐其言社稷封疆之臣反愧之可謂烈也己銘曰是為金華謝烈婦之墳毋觸爾塋毋樵爾薪爾閭必旌世萬子孫哀辭張氏四烈婦哀辭韶陽教授張克讓出其叔父家問示豫具道二十年中險阻艱難死生契濶之故而可嘉可傳者則乙未金陵城陷一家妯娌四人各赴水死曰俞氏葛氏劉氏向氏葛則克讓妻也今十有二年恐來者無聞求為書之嗚呼城陷家破玉石俱焚者可勝道哉若四婦人可以為烈矣嘗讀遼金史當其國亡時婦兒能引決者居多豈具秉彝乃爾偏厚耶歐陽公作五代史載一婦人携其兒暮投村店不能容苦求寄店主怒牽其臂而出之婦泣止道傍曰我為婦人而此臂為人牽耶即引刀斷之遂名千古公蓋為馮瀛王發也先正有言慷慨殺身者易言丈夫死易而義難耳若乃丈夫猶以為難婦人顧有以為易者不亦可嘉乎豫既書四烈婦使傳又從而哀之曰皇天平分四時兮群芳以敷妍風佳時兮出其闉闍式金式玉兮如舜如荼誰實為此罪罟兮赤狐黑烏太行嵯峨不可躐而躋兮又孰決漭而馮虛從饒娥闕妃兮何必懷此舊居世短年長兮將焉識夫毁璧而棄瑜矢余詞以重些兮詔來今其忘諸蕭晉兄弟哀辭晉及其弟履自上世皆居西昌州城之東匡山之下科第簮纓厯唐宋相望不乏元興晉大父始徙居城兄弟幼爽慧稍長即治家核以勇及壯有大志視鄉里齪齪無可語至正十一年所在兵起晉履謀曰自為一國以待四方之清徐擇所歸豪傑見也遂受監州達侯命入匡山起鄉兵得自制州之地三一焉起援傍邑若大府若外郡無出不捷晉濶略任俠尤鄙小亷曲謹遇不可意愛一茗一勺至急義即傾家為之諸有警苐承州府命朝至夕行軍賞餉需並出已無所軒輊是時有仕而不得上者侯以西鄉委之費一毫以上皆取於州以故州之常賦義財盡歸西鄉而晉僅得擅有東鄉兄弟常以私帑足軍用州之屢危而卒賴以完者晉履力也嗚呼孰知侯死而晉竟以是顛覆其家耶髙昌全普庵薩里奉旨征袁次泰和用怨家言將奪晉産而殺之晉先幾遁去逮捕履及晉二子殺而有其財賣其孥嗚呼晉又安知後禍之酷乃爾耶自晉之遁姦貪者蹤迹萬方莫獲最後以為瘦死信州則晉既死久矣雖其孥若家人若親懿亦皆死晉必矣獨時時南北行道之言猶不忍死晉或曰晉在某所會或曰晉官某郡噫鬼耶夢耶豫重哀晉尤不忍死之行道之言無恩讐也其信然耶昔者東鄉保晉而安民不見吏今山寨誅求十倍於前民思晉德不忘何啻螟蝗蔽野而念雪藜藿不茂而懷虎也然則晉宜不死昔者嵗大侵吉郡飢晉以府公命泛舟之役往餼不絶蓋至今有泣下者曰比荐飢死孰有能粒我斗升如匡山者乎然則晉宜不死髙昌奪晉産才二嵗今漢王靖亂南服晉妻携二孱孤哭訴寃于庭王義而惻之立還其産復其戶厚衣以布雖陷虎口旋遇父母豈非天哉然則晉又宜不死晉於防禦封疆外有宜不死者三嗚呼孰為不憖而死之耶死而死耳其不死者果隨以泯耶豫雅知晉其不幸而遇禍也夫人能哀之其尤不幸而不遇於今也則獨豫哀之耳若履者大致皆同獨死生異身後異蓋不忍言不忍言者是為哀辭辭曰孰為亂階而使汝匡山摧孰為旅墳而使汝魂不歸待時之清兮時不及而孔悲人皆謂已死兮豫將然疑獨復不死兮誰生之汝有嗣兮不死在斯得之於楚兮不猶勝失之於齊耿中閨以寂寂兮眇相待其猶婺嗚呼自有古義士兮胡為鬱鬱不得施時無馬伏波兮飲恨當告誰魂魄而茍毅兮尚其茹此辭黃巖知縣袁君哀辭余讀豫章丁子木所製袁禮亨墓志何其悲也禮亨士人也洪武十五年詔徴賢人君子共論治道以安民生天下雲會應響凡被試用者七十餘人率授各道提刑按察司僉事禮亨得試杭州府錢塘仁和二縣分司任是職者率新進驟升多不稱選未幾例革去而禮亨改績獨優得改除黃巖知縣在任能首正版籍分為九等而賦役不至困窮民能掩捕海島私販盜劫之尤者二十五人而海邦以寧有承差李甲持布政司檄督運秋糧揚揚坐堂上摧拆良善勒取財物君收治下獄然後申稟而一縣股栗君起家任僉事一年任縣尹一年洪武十七年正月五日朝京死矣在官之日常淺志蹙蹙不獲伸然設施已可書如此抑不知七十賢人如君者幾過於君者幾而君已九泉不可作矣君死京城公生街南旅舍從吏告諸給事中遂以聞土怒其必有故命御史鞠之得君長子務高首實病死乃免嗚呼不惟眷顧於身前將有大用尤能憐恤於身後懼其不白可謂兼盡其寵矣哀之以辭曰悲哉乎生非不逢辰兮雍熙文明非出小試用兮分司持衡期年而考績兮庸劣亦其雜紛夫何君子七十而升兮而君也軼乎其群超獨尹乎黃巖兮將漢史之所謂能僅一載而入覲兮胡為遽殞其生給舍以聞兮當寧為驚令子首實兮天威以澄嗚呼悲哉兮是亦顯榮歸骨以卜宅兮嶺岡之原矢豫辭以寓哀兮亦將有感於斯文海桑集卷八
