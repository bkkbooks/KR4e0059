body:
  text: 海桑集卷三明陳謨撰表箋韶州衛賀表伏以金莖瑞應開寶厯於千秋玉陛班齊效華封之三祝神人攸慶海宇同歡睿哲超凡英雄卓冠勵精圖治法乎天地之大日月之明逺近歸誠沛乎雨露之施江海之潤都虎踞龍蟠之形勝集文韜武略之俊髦定律書既以制百姓於刑之中興國學又以育羣才為治之本赫然王業之盛實惟天運之新臣某等馳賀情深守邊道阻嵩髙呼萬嵗莫陪抃舞於端門簫韶奏九成嘉樂升平於率土韶州府賀表伏以天生明聖應五百餘嵗之昌期聖夀齊天埀億萬斯年之正統日甫躔於房次電正繞於斗樞英略如神仁威無敵江東王氣指日戡定於中原海隅蒼生厚澤涵濡於率土恭儉優於文帝功烈盛乎太宗喜溢臣鄰春融中外臣某忝居司牧深戀闕庭曰壽曰富曰多男敢效華封之祝宜民宜人宜受祿載歌周雅之章江西省賀正表月上元日羲和之厯萬斯年時乘六龍春秋之義大一統神人同慶中外交歡文武兼資英雄冠世眷命所在宗廟社稷永有依歸天戈所揮華夏蠻貊罔不率俾矧恭儉有加於文景宜雍熙自復於唐虞臣某等分閫大江之西馳心魏闕之北承恩孔厚報效無庸十部簫韶知舞鳯凰於丹禁九重閶闔阻陪鵷鷺於彤墀賀王后箋人時肇紀集嘉慶於新元王化由基資玄功於內治厚德以載率土攸歸順德配乾昌期符泰娥皇正位贊虞帝之雍熙太姒徽音啓周王之聖武宜茂膺於多祉益𢎞暢於皇風臣某馳賀心長守邊地逺銀屏珠箔遙瞻象服之輝鳯吹霞觴敬上椒花之頌賀皇太子箋問寢龍樓正雞人之送曉朝元玉陛喜鳯厯之迎春運式啓於三元歡逺騰於四國前星應瑞文德重華日月緝熙受文皇之帝範英雄韜略披神禹之輿圖茂介春祺允膺天祿臣某深慙戎服莫侍青宫每依韶石之雲第專防禦遙想秦淮之水倍切朝宗韶州衛賀表乾元位九五風霆神於八區天子夀萬年日月煥於四表神人同慶中外交歡文武兼資英雄冠世法貞觀之政要永成貞觀之太平考職方之貢圖必復職方之土宇紹百王之正統埀萬代之𢎞規臣某備守南荒遙瞻北闕效封人之三祝奚罄頌言堅外閫之一心豈勝攀戀中宫箋上帝赫靈誕生聖主周邦隆化尤頌后妃當三呼嵩嶽之晨應千嵗蟠桃之瑞徽音夙著懿德允孚正位中闈著母儀而育物早朝珮玉順地道以承天椒房之譽載興麟趾之祥斯著臣某瞻依宸極阻賀闕庭紫府蓬萊遙上長生之籙金莖沆瀣同為萬夀之期東宫箋少昊行秋玉露散金天之彩前星從帝龍樓移鳯輦之輝仁夀同躋堪輿均慶德由至聖武有雄才師傅之隆所講者帝王之事業軍國之重所植者天下之本根當北闕獻夀之祥正東宫侍膳之禮臣某極深雀躍莫遂鳬趍守禦韶陽功無能於分寸瞻依建業天豈逺於九重東宫箋聖主御天上千秋之金鑑儲皇侍膳觴九醖之紫霞海宇歸心神人交慶主震之器應乾之剛天縱英姿佩服帝堯之言行日新大業躬修神禹之儉勤本支實隆軍國攸重臣某欣逢景運叨守殊方莫陪金殿之班惟伸祝頌遙望龍樓之曉陪切瞻依中宫箋王道大成已詠周詩之麟趾天顔有喜載觀舜樂之鳯儀軒轅之厯萬年金母之桃三實中宫內治天下母儀德合無疆應乾行之中正禮嚴助奠茂宗慶於本支屬兹獻夀之辰敬上齊天之祝臣某等承恩有幸治郡何能犬馬驅馳薄效勤勞於韶石鴛鴻翔集惟深攀戀於瑶池頌鄉飲酒頌并序邑之三老人以書抵余曰太尹郝侯既修文廟又即學宫與士大夫髙年行鄉飲酒禮吾三人位列衆賓思有以詠歌德化自附於康衢擊壤之謡徒填臆莫克宣也先生今奚斯幸賜頌焉余逃虛空谷灑然欣乃作頌曰思樂泮水其宮有曄顯允郝侯允恭允烈冬日載陽年登既穰惠我黃耉偕之樂康維此官刑自彼虞夏漢增唐密靡隙靡罅大明造邦刪定廣施隆之約之與時宜之凡我編氓毋或罹罟讀法斯警飲酒斯譽顯允郝侯惠我以安載詠載歌雅頌不愆侯政有成侯德孔碩敢規頌魯用贊無斁于太守頌并序吳元年僕歸自韶陽抵南安始識太守于公民安其政士頌其德今四年矣僕與王君子與俱受廣東校文之聘舟次九牛驛驛丞王叔衡拜且請曰太守初度猥以下僚將躋公堂祝夀幸乃拜先生先生知太守政若德焉願賜頌聲用侈太守才賢永永有耀其請勤甚作頌曰於惟邦基實重守令慎簡惟賢由天子聖顯顯于侯母育此民靡霜靡雹胥為陽春冰蘖之操四年一日官無逋逮萊變禾稷太守燕喜天錫難老乾豆麟脯加籩瓜棗大庾有巖橫浦安流孰如我侯三夀維儔我興作頌其聲肆詡罔俾奚斯專美於魯樂丘頌朝列大夫江浙行樞密院判官張光弼先生營夀藏於西湖赤岸名曰樂丘自為志銘手録以示余因作頌于其後先生廬陵人在前元時自命曰一笑居士入新朝嘗就徴被溫接以老辭歸採天語中號可間老人其出處大致如此其受學出邵庵虞先生之門故其詩超邁卓絶髙出一世云頌曰達人大觀物無不可豈惟忘世兼亦忘我猗嗟先生顯榮既極贊畫浙省判機樞密功成名遂退然不居一笑居士名下匪虛大明啓運勉就徴辟可間更號天語寵錫昔者一笑今者可間五福兼全湖山之間湖山赤岸營此樂丘有馮有翼以遨以遊趙岐東漢陶潛東晉夀藏聿興挽歌繼振古今賢達光照汗青孰與先生自志自銘猗嗟先生邵庵門徒驚人之句嫓美於虞照耀乾坤黼黻山川我頌樂丘何千萬年論通塞論知通而不知塞貪寵之民也知塞而不知通執一之見也然則孰為近曰塞而知其通焉不膠於塞通而知其塞焉不流於通斯近矣昔者周時未至殷祀未殄微子殷王元子也非殷士比又非商孫子羣庶比而不待其亡先抱祭器適周由昧者拘者之見則以子不得為孝以臣不得為忠而孔子顧獨以為仁又以為三仁稱首然則孔子非歟微子惟知殷之必不可諫知殷之必亡此知塞也於是去之以存宗祀其心誠有不忍者不謂之塞而知通者乎箕子比干其為紂諸父一也知塞之不可復通一也比干以諌死為仁人箕子以佯狂為奴為仁人亦一也其後箕子為武王陳洪範洪範者堯舜禹湯上自羲農相承之大經大法也天將使自我而傳不可自我而絶使武王而不傳則無可傳者矣微子誠不忍殷家宗祀之無傳箕子誠不忍羲農堯舜禹湯道統之無傳其心一也不皆謂之塞而知通可乎箕子封於朝鮮迄不臣於武王微子建上公於宋於周為嘉客其事又相類不皆謂之知通而不流於通又可乎或曰伯夷叔齊如之何曰夷齊三仁之節同夷齊之非周猶三仁之悼殷其節同其心同而事不必同也後世拘儒曲士髙揖遜之水下干戈之粟不知微子之宋箕子之朝鮮夷齊之西山猶得為殷之土乎抑周土而殷人食之也甚者以謂不死敵不為節不罵敵不為節不引決自盡不為節夫是數者與將死鼓士死綏社稷之臣死社稷封疆之臣死封疆者同固臣子之大分天地之常經也然而不皆盡然也聖賢不非也孟津之會諸侯不期而會者八百皆有社稷封疆之守牧野鷹揚前徒倒戈者皆有死鼓死綏之責此人倫之大變古今之通義也是故比干死於紂非死於周為髙節夷齊非周而不食周祿亦為髙節微子以存殷祀為髙節箕子以陳洪範亦為髙節不必皆死孔子不皆韙其死通謂之仁仁者全體而死者一節也故知天地之常經斯可正臣子之大分知古今之通義斯可處人倫之大變此惟通而不流塞而不膠者能之吾故表以為論以告夫今之貪寵與執一者真率論君子之為道或出或處或默或語從吾天性之自然安吾素履之坦然如是而已從吾天性之自然則自耕桑漁釣達之圭冕軒裳各一其天不必齊同而各極其趣皆有可悅由妄者之見則謂之真安吾素履之坦然則自素富貴貧賤達諸素患難夷狄無入不自得若履平地然略不經意由矯者之情則謂之率真與率固君子之道也真者其本率者其用真者去妄率者所以行吾真也古之人未有樂其性而不安乎素者亦未有素履坦坦而汨陳其天真者自夫俗流失世敗壞於是乃有蔑禮法踰大防自詭為真者其言曰桀紂性也堯舜偽也又有託意傲物為踈為狂為簡為暴自詭以為率其言曰靈均獨醒懷沙孰與伯倫荷鍤自隨也則是反中庸無忌憚之尤者而世道何賴焉今有人焉當草昧轇轕之殷智能奮庸之會策元戎則折衝制勝壯其籌佐大藩則盤根錯節利其器賔相幕則大小材器囿其鈞受無不達施無不應人知之者此焉止矣乃其存心殆不止是故扁其燕處之室曰真率齋深寓志焉彼為踈率為狂率為簡率為暴率者措之於其躬則災出之而為用則敗人家國亦惟喪其真故耳昔者范忠宣公司馬溫公諸賢謝事居洛為真率之會以自陶寫諸賢勳庸紀于太常德澤被乎庶類文章昭乎河漢行義隆乎人紀亦從其天性之自然者安其素履之坦然者庸有二耶徒知諸賢不刻意於飲食燕樂或者意其甚有心於功名竹帛亦烏足窺古人之心哉君之名齋意嘗考於此乎諸君相與賦詠之者亦必出此而後為得余故發其所以然者而記之海桑集卷三
