body:
  text: 海桑集巻二明陳謨撰七言律和蕭廷菊海棠紫綿帯露裊髙枝折送窓前看絶竒春色仙家分已早金波賔館賞何遲錦裁半臂初成後鏡照新粧正就時聞道隣翁工炒鐵請君莫負數君詩題蕭廷菊中書傳蕭郎巧智似蒙恬兎頴狸毫健且銛能掃萬言資李白曽探五色借江淹匡仙洞府家偏逺丹鳳池頭跡漫潜咲與中書新作傳虹光清夜映書簾雨中登舟柬渝景明市南買舟苦未得感君髙誼最殷勤衝雨上山行虎跡褰裳度水散鷗羣干戈滿地身長寄花栁一州春自分待把隂霾都掃却與君琢句染晴雲别竹逸極初歸錫洲十載飄零偶此同明朝判袂各西東來時梅浦分新白去日仙壇掃落紅得句每裁雲五色挑燈常近鼓三通兩賢總是金閨彦善保興居錫谷中方丘生隱居𤣥洲題曰小蓬萊𤣥洲故是小蓬萊鰲背烟消五色開月鼎雲中分藥送蓬頭海外寄書來晴沙金屑眠龍子芝草瑶芳養鶴胎已辦逰山青竹杖還能酌我紫霞杯别曽秋月提㸃諸公暮年有意欲聞韶不計闗河去路遥暫别𤣥都行紫陌迴瞻玉樹隔琅霄丹成鼎内春難老天入壺中日易消細裊爐烟頻煮茗緑隂濃處好珍調樵閑爲蕭紹宗賦之子採樵何所之樵閑倚石復移時忽逢鶯語思求友偶值仙人還看棋山中亂雲如雪屋松下清風多紫芝袖有長書君莫上祗今且可醉吟詩至南安和知事陳雲壑祠龍母韻貝闕珠宫仙樂舉盈盈初日碧波間眉如王母三千歳鬂綰湘娥十二鬟榕葉春濃僧院寂木蘭風細釣絲閑渚蘋薦罷騷人醉老我何能一叩闗和指揮蘭花韻二首名花消得玉爲堂别占薫風六月凉西子冰肌微帯酒素娥翠袖冷含霜相輝喜接貂蟬近共醉宜同錦瑟傍制使髙吟清且麗綵雲散作滿城香臨風玉立自堂堂肯爲榕隂借晚凉瑶柱葳蕤疑剪水銖衣蕭颯自凝霜操琴好在虞韶後紉佩還思楚澤傍曲江祠下違心賞千古空懷是國香次謝令尹喜雨韻曲江六月有新凉令尹彈琴不下堂河陽豈必花成縣彭澤由來菊是糧桑樹連隂馴野雉馬騣滴水舞商羊豐年好冩歸圖畫爲覔當時顧長康重陽前和王叅軍二首叅軍公館竹爲扉遥對貂蟬逸興飛李白題詩行處有王𢎞送酒近來稀錦糕時節思何極綵服興居願不違回望青原一千里黄衣想見照苔衣蒼烟鬱鬱集郊扉吹㡌風髙鬂欲飛君喜慈幃清且健我憐家問逺常稀茰鍾芳烈當誰並菊抱幽貞與世違丞相祠庭榕葉底不妨人咲芰荷衣次周翠庭感懷韻故園囬望草成丘客館新添雪滿頭已向昆明看刼盡猶思滄海借桴浮昻藏可愧嵇中散欵叚那從馬少逰邂逅蒲衣成一咲覔牛元只是騎牛憲使張虗舟謁韶陽文獻祠敬簡小詩隨車清雨洗邉塵散作韶陽十月春累世風霜爲閥閲一壺冰雪是精神民沾德澤安生聚君遣皇華徧度詢此日貂蟬輝繡斧千年風度儼相親簡二憲郎金玉科條兩憲郎滿空霜氣集韶陽九齡祠下聮圭璧五色雲中覽鳳凰嶺表寒梅迎使節海隅秋草借恩光繡衣報政烏臺表定自聲名動建章追挽劉養直校讐天禄去無日藏書善和歸㡬時殷臺落日塵杳杳象山宿草春離離玉雪未曽瞻道貌梧桐今已識孫枝斯文不朽應無憾刻石埋名有楚竒戲和肱道人道人連日醉如泥應愛銅泉浸鹿蹄内景新將丹鼎煉麗詞常展錦箋題迎春處處經行遍餞歳時時舉按齊只恐夜深歡寢後不知雞向五更啼人日登風度樓留題憑髙弔古想開元風度誰知相國賢八柱承天埀日月千峰列㦸擁貂蟬龍乘海氣窓間過鵬息天風雨下眠忽憶重華増悵望蒼梧渺莾暗荒烟乙已除日次蕭極初韻歳寒不作還家計倚遍仙人十二䦨霜殘臘梅殊草草苔深墨竹却桓桓時彈焦尾清還絶不酌流霞興自寛二友風流知我者恥將心事學馮驩九成臺韶陽太守臺成日玉局仙人海上歸萬籟盡如韶九奏五雲遥見鳳雙飛蓮峯隔浦浮春色武水澄波漾暖暉錯把滕王江閣比鳴鸞歌舞是邪非葛仙祠留題思憶仙人葛稚川舊祠冠服尚巍然羅浮自愛留丹竈勾漏空聞有洞天江右蛟騰青草裡淮南犬吠白雲邉嬉逰得似無爲好冷眼乾坤八十年三月二日爲叅軍介夀瑞氣濃薰海色晴非闗上已與清明橘中人獻龍根脯鶴上仙傳鳳翼笙入幕叅軍多節槩能詩水部㝡豪英一千二百年如戲自是空同舊廣成叅軍庭前水香花一樹夏月取葉薦湯者三月花開如粟􅌽共賦之玲瓏琪樹出髙墻豈逐殘香媚景光翡翠屑金分戸映木蘭墜露拂衣香濃隂逺有秋風操清味尤冝夏月湯倚得叅軍修竹好共將嘉實待鸞凰贈别錢太守夜光明月廟廊珍五載騰輝武水濵祗有雙魚新改郡素無一鶴可隨身儀韶鳳已翔寥廓别駕車猶望後塵千里江東春樹緑懷賢長有夢相親别郭宗玉還鄉故鄉索寞久離羣邂逅韶陽復論文緱嶺喜逢王子晉㶚陵誰識李將軍來尋錦石看丹茘歸釣清江卧碧雲應共髙人川上樂題詩煮茗到宵分榕樹下别叅軍再賦就簡指揮榕隂翠盖倚重重相送城南復向東上將故多黄石畧叅軍况是紫髯翁重題錦字雲生紙獨轉滄浪月滿蓬徙倚松根看野色青山縹緲意何窮泊古羊渡望貂蟬峯有懷諸名勝猶見香爐紫霧妍還隨鳥影望貂蟬舟移岸岸皆竒石雲起山山盡瘴烟紅蓼水生連夜雨白茅露冷近冬天舜峯九日登臨處吹㡌無由侍晉賢題常方壺所藏易元吉蒲萄上有徽廟題識畫圖驚見龍鬚長猶帶宣和御墨香玉蕊冝歸甘露瓮金莖偏潤紫荷囊移來上苑恩光異拆寄文園渇肺凉曽侍宮壺沾御宴令人苦憶賀蘭莊蒼雪軒爲南雄貳守劉可與賦蒼龍噴雪滿幽軒坐使氷壺六月寒紅袖觧移青玉案素娥清映水精盤興來剡曲餘孤棹老去磻溪寄一竿何日江隂來步屧相從終日倚䦨看小姑嫁彭郎窈窕仙姿勝藐姑彭郎故是子南夫鮫人爲織同心帶鳳使親傳五色書曾共湘妃逰洛浦不隨河鼓上天衢祠庭此日瞻環珮千丈風波鎮小姑彭郎憶小姑青山何事翠如顰應惜紅顔鏡裏人枕轉珊瑚空託夢杯傾鸚鵡嬾濡唇行雲仙袂逰何所拾翠芳期誤此春隔花流水何由見莫自陳王賦洛神小姑寄彭郎平湖黛色照晨粧只見風波不見郎已織迴文成錦字莫貪結綬綰金章馬應得意春風裏花不知名官道傍杜若芳洲誰共采枉教人斷九迴腸次韻雪用白戰軆晨霜暮霰作威嚴觧送瑞花拂㡌簷漠漠汀沙成海水娟娟蒲席是氷簾寒深頓覺龍鱗小烟重兼迷馬耳尖明日臺城春色動爲誰寂寞爲誰淹蘆管制笛旋將蘆管裁成笛若比柯亭别出機數㸃殘星分逺近七均古調按依稀吹斜月影潮初上轉入梅花雪更飛歳晚江空聽㝡好夜寒吟句不思歸歳除大雪二律怪底推篷重不開千巖萬壑白皚皚山隂乗興那無戴梁苑多才想有枚碧落空濛龍偃蹇黄蘆淅瀝鴈堆魁上人制笛翻清思春向梅花調裏回孤篷莫歎淒凉景一雪翻成富貴年兎迹盡迷三穴外獸王誰幻五臺前遥知淮蔡平元濟莫管峨眉冷謫仙此夕金吾驅逐罷鳳䘖春色下丹天戊申元日次韻午夜朝回歳亦遷一蓬殘雪入新年寒雲宿霧晴猶積翠壁丹崖曉半鮮淡淡春生黄葦岸沄沄波泛白鷗天蔣山風日應妍美到日同叅不二禪二日喜晴過采石次韻推枕鳴鴉喜報晨忽聞佳句倍怡神雪迷采石渾如臘日上天門早是春一斗青錢沽客酒半簮華髪减年人二三禪友爲知已相對迂踈興頗真閏五月二十七日發金陵簡同舟者半年塵土滿征衣悵望闗河賦式㣲楊柳磯頭悲昔日鳳凰臺下送斜暉潮來城闕鱸何在火裂秋雲鴈不飛幸自故園松菊美還家莫遣賞心違弔賞心亭火賞心亭上通宵火萬里秋天駕祝融國内焚萊知有禁街頭舞馬竟何窮秦淮浪赤蛟龍怒王謝灰飛燕雀空徒想詞人懷往代繁華想象畫圖中天門山巨靈擘石鎮江干縱有丹梯未易攀雲黒蛟鼉騰出峽月明虎豹卧當闗稍驚灔澦波濤壯宛似峨眉翠黛寒上有飄蕭兩黄鵠凌風隨我振歸翰題吉文費太守巻桁楊卧地庭無謁禾黍連雲里有歌召父著聲先豈弟陽城不擾是催科神逰華葢紅雲島興在文江白雪波試問三窮誰第一萊蕪轉覺甑塵多寄項如山伯仲更無塵土到柴門還愛踈髯㸃雪痕鷗鷺江天新保社桑麻春雨舊田園堯民擊壤應同樂魯殿靈光讓獨尊况復惠連羣從好詩懷濃處酒盈樽寄陳衡山荅其金陵歸臨貺朱雀橋邉㡬夕曛興亡燕語謾紛紛悵望謫仙墳上草低囬蔣帝廟前雲征衫塵土鄉心共歸路秋雲鴈翼分枉沐光臨到蓬蓽無由傾盖一論文追賦聞人州判赴京一蓬白雪上京華五鳳樓臺是帝家定向天官書上考還隨御苑簇輕車秦淮栁色皆金縷吳越山光遍綺霞小邑三年勤撫字月明應念白鷗沙徐韶州追和僕叙别韻見寄用韻答之别來只憶韶州景忽枉佳章寂寞濵太守襜帷三載舊侍郎官誥五花新枌榆社日家家酒鶯燕江亭在在春苦恨雲山迢遞隔無因晤語樂天真答南雄劉别駕見寄瀟灑雄州别駕尊公餘攬勝出松門㑹稽山隂逢賀監丁卯橋頭尋許渾文豹何曽迷霧雨蒼龍應自長兒孫何時容我來驚座更看優人舞白猿簡劉子卿謝其得謬藁送至二律神螺之山江水東娟娟玉樹梅林中自慚晚識青雲器多謝時臨白雪翁舊藁飄零隨落葉餘生放浪逐賔鴻江臯步屧頻來往更待藜光丙夜同一片停雲咫尺中似應秋水隔芙蓉槎横銀漢三千尺桂鎻蟾宫第㡬重原色又添新雨潤藻情還似逺山濃多時謬藁勞收寄免作人間醬瓿封别馮寅賔逰吳越逃虛空谷絶過從驚見虹光射牖中定自陸雲逰洛下還尋李白過江東山川草木浮佳氣星斗文章属至公丹鳳樓前回首處金蓮夜照玉花驄寄劉永泰新堂燕處獨超然釀有香粇釣有鮮九日黄花猶似晉西風白鴈總辭燕揚雄草賦甘泉逺劉向窮經太乙憐一自秦淮同載後停雲悵望忽經年戲贈歸洪江總還家白髪新樓卿老去五侯貧㡬經紫陌看花處憶著金龜換酒人舞雪廻風歌窈窕登山臨水意逡巡東湖烟栁西山雨還有髙車訪隱淪效謡體小池未雨蛙先閙矮屋非貧燕不過老馬反駒徒苦耳􅊝蟲維鳥定如何漆園夢斷悠悠蝶南浦風迴漫漫波靣似靴皮猶有笑才如襪線絶須歌次别駕劉宗弼詠韶石韻縹緲湘南接海邉奔波聳漢翠爭妍烟生萬壑熊羆伏日射重巖錦繡連泗水磬材天下少韶州響石後來傳世間信有愚公智未必山靈未許遷秋夜燕集示諸友金風吹盡燕梁塵公館林踈爽氣新露泛紫㣲香拂酒月將仙桂影隨人叅軍最得詩中趣文士冝多幙下賔百罰不辭慙潦倒苦無佳句答情真葛洪丹井豈復風流似葛洪尋仙還到紫陽宮遥聞環佩鏘雲表尚想丹砂浴井中白髪那能生羽翼蒼生坐待起疲癃銀瓶素綆中宵汲怕有蟠龍觧噴風和友人韻二首霜林紅葉有妍華出郭幽尋興自賒蒼耳草深非故道牽牛花好是誰家雞羣野褐嵇中散鶴背天風蔡少霞邂逅平川同逆旅時時晴屐響晴沙劉郎清賞何乃違休日復自扄柴扉橋邉無人禮黄石天上有星尊少㣲薜茘暗侵揚子宅鵁鶄長占子陵磯日斜桐葉題詩罷頭戴寒鴉緩緩歸方壺爲常太守賦神山秀出空同表却笑蓬萊失巨鰲未許安期閒種棗詎容方朔去偷桃金天白龍草間伏瑶水翠禽花外髙我亦四明狂客者登臨覽勝一揮毫用方壺韻題曽子元晴雪軒聞道幽齋傍雪成六花飛舞集簷楹天逰杳杳虛生白雲卧沉沉夜自明氷繭寒光冝客賦陽春古調待誰鳴烟波却有𤣥真子時向城南問獨清題哀節清靜一軒㡬度來尋羽士軒白雲無語客忘言吟風不憶三生石醉月長留太古尊碧落逰絲那有影懸崖枯木只餘根白鴉來往芝田熟應是黄庭内景温吳元年丁未元日即席和韻金旛㣲動綵雲偏夀祝南山與百川律轉東風遍南服天開大統建元年舜峯渺渺貂蟬外淮水悠悠魏闕邉早晚蒲車催入覲衰遲那得共輝聯次王竹逸韻聞聽爆竹知新歳坐對缾花憶舞筵隔屋馬蹄歸醉客中宵環佩起羣仙道存竹簡韋編裏詩在茶甌雪乳邉送故迎新君莫笑旅中别自一壺天次九日登武山韻三首寸懐能着㡬多愁每向登臨歎謬悠黄菊翛翛冷彭澤蒼烟莽莽暗齊州光隂祗是留連客酩酊何妨斷送秋有約不聞空悵望來詩多趣苦爲酬丹梯髙處是青山曵杖無因一破顔仙境不藏雲有路天逰長阻虎當闗懸崖果熟猿公笑深洞花開武姥閒寄語王君須再約頑夫老矣更能頑村家酒熟三家香只與詩人浣繡腸充庖野鴨無雙腯入網池魚過尺長老婦瓦盆殊罄竭迺翁客位更徜徉不道諸生虛講席從來雅俗故相妨次蕭子所至日懷京國二首梅梢綴玉似凝旒楓樹揺紅見舞優化日緩隨龍馭轉祥雲長繞鳳臺浮當年法從陪華貴此日山杯笑濁流應自家人記膰爼時時舉按説郊丘綵筆何人動藻旒南郊儀禮若爲優明時鼎鼎風雲㑹載籍茫茫烟海浮璧水育材須妙選鍾山應制豈凡流徳星聚處還知否别有風流陳太丘辛亥元宵和王希顔韻二首隔窓風雨送元宵自種花燈慰寂寥隣舎已添榆社鼓江亭却憶酒旗招閙蛾簇粉寒難整浮蟻吹波暖易消梅蕚那分花市燭雲頭虛度鳳臺簫喜君連日情相厚貺我華星句每饒流水浣花工部興春山啼鳥買臣樵桃枝削杖隨商老筍籜裁冠托漢朝雙劍雪霜深閟匣莫將虎氣夜干霄别郭思信望望沙園鷺渚邉綵雲忽到九州前春山步屧尋前度夜月停杯説隔年局上蒲翻梟雉采琴中徽按鳳皇弦河橋折栁難爲别更約看花句共聯秋日用劉子彦韻二首秋氣一日即爲深雨餘山翠何崟崟梧桐暮看不如早稼穡昔豐那似今漢詔賜租成樂土堯民擊壤得初心石床數尺長松下卧聽風蟬足好音六月秋生喜閏年故因凉早景多妍燕鴻物外同羈旅清濁杯中總聖賢南畝桑麻差足樂西江雨露復能偏二間茅屋清溪側時有詩朋送雅篇題平原曾光逺所藏先世墨竹靈妃娟娟湘楚濆三三五五乘緑雲雜佩倚風疑有韻舞衿如水自成文深林㑹待晉賢賞蟠石今看蔣徑分春蘭秋菊各天趣未若此君髙出羣贈雲心醫士白雲與君君莫違不令塵土上君衣曉隨斸藥霏霏出暮逐懸壺冉冉歸勾漏巖前尋葛令長沙道上識張機蹇予獨向青原下七十卧雲今是非和楊少府登快閣用山谷韻長嘯城頭天宇平碧山濃處看新晴過客㠶檣烟霧重傍人鷗鷺畫圖明浪花細逐金魚起沙漲還添玉帶横物色分留歸少府千年太史有詩盟平逺圖爲祝驛丞賦貳令新圖少府題驛丞風致罕能齊逺岫㣲茫南斗外平川迢遞楚天低已編茅屋依埀柳更買漁舟度隔溪爲待樵風清唱客乗風鼓枻到江堤次仲氏以靜客龍湖見夀二首長庚殘月曉西東枕上吟餘響石淙凉雨踈桐過末伏小亭幽徑長芳藂季方難弟龍湖逺老杜狂夫飯顆同秋月華星雙入手更攀菡蓞映杯紅山城望見鶺鴒原衣錦鄉中草樹妍鐵笛誰當吹舞鶴銀槎我欲挾飛仙蘋花數剪微波浸桂樹三更片月懸老去揆初仍作客諸生鄭重秩初筵寄劉孝亷芝蘭香霧隔晴軒圖史虹光自歳年漢殿每需方正策楚江猶滯孝亷船鵞羣暖戯池中墨藜杖寒嘘閣上烟試把月儀臨數帖因風寄向白雲邉同子與入院時就文廟開試院與諸公同止雲章閣上一相南來建大藩金湯千里虎牙閑綵雲騰鳳迎科詔珠斗埀虹動海闗入院恭陪車馬盛序賔媿列鬂毛班寧知交廣非鄒魯已有彈冠早出山次子與入院宴集韻荆交風氣自天開魏晉詞華有體裁石髓凝脂歸木彈桂香吹露送螺杯雲章華構文星聚海嶠名邦俊士來燈火下簾思報效聖心虛佇待真才老榦詩爲周中丞賦昻霄聳壑三千尺若比莊椿别自竒氷雪每堅金石節風雲長遶鳳皇枝武侯古柏神明力召伯甘棠豈弟思却上烏臺凝望處棟梁材是廟堂姿八月十五夜宴明倫堂前榕樹下舉杯待月月苦遲金天一碧寒玻瓈雲升復隱榕隂外風送俄經泮水西丹桂子成金榜動紫薇人醉玉繩低鵾鵬萬里非難事安用人間八駿蹄八月十七日開榜公宴科詔賔賢兼百粤省闈開榜秩初筵塵飛車馬羊城外鼎沸笙歌海角前進士褒衣班席左陪臣軟㡌揷花偏曲江鴈塔題名處爲問何人最少年送叅政周公赴臺中丞任省垣榕桂青復青紫薇花發秋㝠㝠雲收瘴海懷霖雨月滿烏臺候法星五管山河歸節度百蠻草木被威靈還朝先把賢書奏榜下懸知有九齡黄仲𢎞捧詔至平川却回贑兼懷諸友崆峒山翠似金華坐使初平不憶家香染紫泥隨綵鳳花簮白髪麗烏紗平川對酒松風薄貢水看雲鳥道賒痛飲讀騷空有約長歌伐木興無涯望蒲磵懷安期生欲採仙人石上蒲常思雲外借雙鳬童男已逐樓船逺使者猶煩海道紆花下金丹煎白石海中𤓰棗獻清都時時飛珮商岩去咲殺園公定漢儲驛舟囬寄楊子敬長司陳國玘知事韶府才猷属兩賢愛予枉騎數相牽江山悵望一千里金石交逰五六年載酒問竒官舎冷看花賞勝舜峯妍東還却有南飛鴈遥寄新詩武水邉題朱雪巖小影圖文公之後居南雄者一鶴傳書海上回氅衣正對雪花開燕雲賦罷空前席粤水歸吟但廢臺遺像有神看畫史諸孫傳業待春魁考亭雲谷髙風在長有書香付後來七言排律清江阻風訪劉起東茅廬中十年再見東海公夫妻賔敬茅廬中不計有無心淡泊難忘故舊日從容陽春白雪何求和漆髪紅顔似返童鼎煮䝉山雲細細盃傾桑落緑溶溶市朝雖近塵還逺絃誦常聞道罕同重話桃源真隔世獨行客路况嚴冬一川雪景惟飛雨三日江船尚阻風苐覺久淹成愧負寧知相厚轉情濃故人谷口歸耕處安得扶藜訪有熊煩君問訊須珍重早晚徵車起卧龍元日觀燈復陪指揮廵城東同行諸公遥聞太乙下清都五夜香風溢四衢楊栁連營埀虎帳芙蓉壓水引金吾蟾宮送月雲頭淨相府延春夜禁無粉扇榴裙歌下里雞皮鶴髪舞寒胡花枝挿燭頻頻換泉乳澆茶細細娛假面拳毛獅子嘯散花烟火夀星扶興䦨更自廵城鑰時泰還欣絶警枹逰騎追隨雜耆老吹笳激烈混笙竽飄飄吟句㕘軍送落落神情長史趍自嘆衰遲多白髪苦無錦句付奚奴次姪孫士瞻韻我家都榦舊徵君五百年中逺有芬宗譜太丘前史美科名南渡近時聞人言閥閲星之斗代有雲礽鼎出汾吾子翹翹雄作士英姿了了幼能文他山有石能攻玉惡草雖蕕不亂薰十年叅晤窮經苦一日梟鸞戰藝分鶚薦已追雲表鵠錦還仍采泮池芹波光皛皛鷗同社松頂昻昻鶴不羣珠浦别來秋洒洒㶑江吟斷葉紛紛投桃多辱諸賢句報玖空慚五色雲五言絶句秦淮詠古不曉秦淮水秦人苦浚之亂來波浪作猶似祖龍時題墨竹四首清風滿竹林酌酒薦鳴琴懸知大小阮於此開塵襟靈雨何從來脩篁有妍色憶在逍遥堂寒更聽蕭瑟千霜與百霆沉沉自寒碧春雨復驚人龍孫長三尺裊裊炫初服鏘鏘鳴瑶琨美人隔湘水君子在淇園題畫鷹二首天風振枯梢獨立何所營愁胡休側目海宇已清平枯榦立亭亭由來愛鶺鴒何當草間奮相逐上清㝠西林八景鳳凰峯青峯初㧞地丹鳳倐沖霄仙人明月夜於此聽雲韶琵琶洲春水抱芳洲宛宛紫檀槽羽人歌洞章不省鬰輪袍偃月岡蒼松寒翳翳瑶草秋埀埀平岡如偃月偏與落星宜落星石星君避太空入覲太㣲中如何化貞石奠此髙明宮流虹岡湧月散金波流輝動神螺海翁逐鷗戱孺子濯纓歌噴珠泉滿地碎珠璣向日騰光彩昨夢窮河源天澄萬星海藏蛟室福地穴難藏真人劍拂霜還歸賈傅井應作少年郎伏鴿塜伏鴿守枯塜黄金骨似沙化爲雙白鶴飛上太清家秋林秋林本自萎朔風勞爾怒客子賦無衣哀鴻夜中度次郊行韻煮茗樂濃春看山日日新遥知獨醒者却是太平人懷泮池諸友幽懷落泮池古栢守朱戸美人秀䟽髯望望隔烟霧答送暖枕軟履二首暖枕便衰老尤冝雪夜吟邯鄲官道上誰識呂公心軟履䝉佳貺平原客未知下邳圯上去長有一編書七言絶句快閣脩篁古木圖二首老去張騫両鬂華乘風曾記到天家回看粉壁千年樹還是銀潢八月槎風流貳令寫蒼筤判簿題詩白雪香太守公餘時倚檻滿天風雨起瀟湘酈彦誠蘄州二首青原山下客思家喜有淮船載月華湖口晴雲收雪浪蘄陽春雨長萱花酈生風采故依然奉母還鄉鬂尚𤣥升堂喜見髙都䕶對酒應懷葛稚川題吳推官江山覽圖四首憶昨蓬壺鼇戱翻盧敖入海澹忘言祗今亂定看圖畫㡬處樓臺㡬曲村汾水秋風草木䟽龍門山色秀芙蕖巖扄容有文中子髙卧白雲閒著書萬竹沉沉山下屋千波汎汎石根船逢迎沙岸飄蕭者不是𤣥真定謫仙江南秋色鴈來歸林壑風烟草樹㣲公退展圖頻北望太行山上白雲飛鄢大善胡琴歸宜春求題三首白下磯頭緑樹肥宜春臺上白衣歸山童把得琵琶在惆悵開元舊譜稀上國春風馬上郎花間絃索斷人腸願留一曲清平調别有知音在太常馬尾蛇膚氷繭絲能吟觧語意遲遲彈到天髙雲淨處秋江唯許白鷗知題曲江春逰圖沙明竹軟曲江橋折水花枝挂酒瓢指㸃杏園飛赤驥惱人應是董嬌嬈題漁樂圖柳下漁舟小亦寛兩家十口共團欒醉來唱徹漁家傲千丈風波冷眼看題孫竹圖贈黄道士歸山金華仙客此幽尋爲愛瀟湘雲氣深醉騎白石還山去一箇蒼龍伴獨吟次十四夜望月值雨二首雲翳深深掩玉輝故飄香霧洒蕉衣竹林莫道蟾宮逺已報郎星入紫㣲曾共仙人蕚緑華雲中手弄金背䗫嫦娥偏愛清塵雨徐舞霓裳下漢槎次茘支韻賦四首猩紅染就錦苞肥觧映金袍與繡衣㡬度醉吟芳樹下渾疑夜燎續朝暉海山仙子玉肌肥故著輕綃紫霧衣猶記紅塵飛騎去昭陽宮裏媚晴暉磊落華堂火齊肥佳人爭比茜紅衣瓊枝笑把銀缾挿絶勝春紅粲曉暉正賞端陽茘子肥珊瑚清映雪羅衣誰向樽前揮綵筆只今容有謝𤣥暉次叅軍偶賦韻三首花底壺蜂報午衙枕前莊蝶未知家驚人忽聽尚書履唾玉長吟學士茶燕鶯好語傍南衙櫻筍誰人似故家頓遜并無花上酒南華還有貢餘茶老我猶堪屈宋衙才名苦憶建安家枯腸文字搜都澁恨殺松花雪乳茶無題只合長庚伴謫仙清吟酷愛夜如年五更鐘動無人喚飛步松梢看月圓爲知縣謝實林題紅梅二首孤山傲雪壓芳凉換得東風到玉堂更聘海棠為侍女桃花馬上少年郎逃禪染白能爲黒爭似王家一剪紅憶共揚州何水部醉吟身入綵霞中題畫龍長吟噴薄浪生花碧海銀潢處處家有客抱琴天上去迴看鱗角似仙槎題畫竹鳳尾翛翛雨外分武公風致少能羣七賢最有山王逹底事延平詠五君題周知事雙竹圖一徑清風兩玉人畫圖疑在渭川濵石根細長濓溪草寒翠滿庭長是春題青山白雲來訪仙人問白羊小橋流水繞㣲茫白雲滿谷青松暗定是金華是括蒼焦磯寺過盡三山見翠屏金銀􅆊刹接青㝠江心磻石何年化亦恐飛來是落星題赤壁扁舟圖霜清水落不容刀山石奔雲作怒濤海上仙人歸玉局又隨孤鶴過臨臯題曽秋月提㸃夀竹圖羽葆霓旌翳石根蓬萊雲氣伴朝昏仙人細酌長生酒閒看蒼龍子又孫題周草亭枯木圖雪裂懸崖墮一龍槎牙長礙九霄風若爲借與張騫去身到銀潢咫尺中題王子賢雲樵山房二首官閒日日逐樵蘇心寄浮雲樂有餘谷口歸來身未倦下簾細讀買臣書王質當年底事癡斧柯爛後覔歸蹊君歌一曲下山去不向仙人局上迷題竹贈石城主簿倪仲威越王臺下送飛艎折贈琅玕百尺長歸到石城官舎冷月明四壁動龍光題墨龍贈化州經歴徐子重徐福仙人海上家蒼龍相對卧烟霞乗風欲向丹霄去還是張騫八月槎南康仙臺觀吕巖嘗游焉觀中人不識也死𦵏其山後一道人來尋師啟棺惟二白石化爲雙鶴飛去今所畫巖像特異所見手持錢一文賞遍羅浮度庾闗仙臺重訪羽人閒已收白鶴歸天上猶把金錢翫世間風樹亭臨江經歴潘德全進士其父塟海寧之彭坡待制趙仲睦爲書樹亭賦二絶得禄其如退飬何海寧墓木拱彭坡清江碧嶂官居好時聽悲風響樹柯墨妙誰題楓樹亭翰林待制有儀型九原含笑應無憾更待焚黄換刻銘題四皓圖卧聽松風行採芝人間那記有秦時安劉調笑髙皇帝何似山中一局棋海桑集巻二
