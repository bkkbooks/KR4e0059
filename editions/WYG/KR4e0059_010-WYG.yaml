body:
  text: 海桑集巻十明陳謨撰祭文祭先賢文吳元年二月丁未朔越十一日丁巳曲江縣丞某偕郡士某某謹以制幣牲醴敬祭于濓溪先生周元公惟公接洙泗之淵源埀洛建之統緒萬世正學萬民綱常維兹韶陽寔惟仕國罔極之恩存於從祀仲丁之日祗薦苾芬敢以明道先生程純公伊川先生程正公晦庵先生朱文公槎溪先生廖公配尚享祭蕭繩武文嗚呼自古亂離之世必資卓犖超群之才以保障其鄉鄰盖郡以之而郡邑以之而邑緩急相須倉卒馳赴以待夫烟塵之清當嵗壬辰林嘯谷聚獸駭鳥驚自達官貴人閭右族姓靡不奉頭而䑕竄㡬越人之視秦人獨君伯仲辛苦植立堅壁匡山之下屹澄江之砥柱而藩落乎鷺渚之濵千金毎聚而恒散一劔獨鳴而群譍故雖四郊多壘然大夫不辱恒倚之以為重輕夫何丙申之秋大盗由贑而至利君之財蹙君於死使君掃境内於四三年之久乃不得少待須臾以迎天兵嗚呼自君既死雖怨者忿者猶能稱枉不獨所與若所親至于行路嘆嗟無論識與不識又不獨平昔之所感恩嗚呼夫孰知天道好還天網不䟽彼大盗者亦既就戮于南兵矣今君伯仲英聲凛有餘烈復何異於生存又不獨青氊盡復閭里以為榮嗚呼君厚施不食其報不在其身在其子孫後君者井實磊砢而英匡山之青嶄絶倚天其元氣未可量也而况於蕭氏由唐以迄今嗚呼李德裕冥報之論其詳尚可得而聞君聰明特達人也外形骸㳺汗漫其能忘情也耶其不能忘情也耶庶有監夫斯文為孫景賢祭楊彦中墓文嗚呼婚姻之故死䘮之感尚忍言耶昔君不幸遭亂兇余僅能視殯塟余之嗣君之倩復不能嵗時以麥飯灑松楸而徒屯種於濠梁始者葭玉之因依豈謂萍水之荒凉耶余自華容再旅西昌始克携君外孫拜于隂堂嗚呼余視茫茫余髮蒼蒼來奠鷄絮㡬何星霜獨所幸者君之令女與半子皆無恙也嗚呼其存者長尚鑒此觴祭四先生文惟公伊洛正宗建安粹學發遺經之秘奥啟群生之昏䝉惟此韶學元公過化仲丁明祀報罔極也大牲之禮嘉栗之薦表誠䖍也禡旗文維吳元年嵗在丁未正月戊寅朔越二日己卯同知贑州衛指揮使司事守禦韶州張某謹以大牢清酌致祭于軍牙大纛之神惟國之大事莫重於軍旅而軍之節度莫重於旌旗師行之際四方之星各司其局招揺在上急繕其怒惟爾有神實司厥職方今嵗事更始天運一新永惟粤尉佗之境土未復漢伏波之功勲未建行將率厲兵甲憑藉國威報效萬分惟爾有神式克相之雜著松雲山房答問青蓮居士金粟如來后身也嘗欲巢雲松於廬山金芙蓉佳處又嘗於嵩陽玉女峯寄萬古宅於東溪松間司馬子微稱其可與神游八極之表信哉復初上人有志兹事結屋松雲中以逍遥肆志焉一日邀海桑外史外史欣然入室分其半榻而髯龍雲將皆在二子者得上人為依歸色甚矜奮髯龍曰吾長過千尺賢於丈六金身逺甚吾故偃蹇飄蕭自全其天彼蹛林十八公僻居朔漠徒擁腫猥大無所用之若五大夫者又低佪伈俔詘汙秦爵置之不足道也雲將曰吾嘗超鴻濛混希夷則莫我敢凌吾能翼蛟龍升之天蕰霈澤降之地倐與忽吾其御冥與昭吾其握頃刻變幻萬莫端倪外史猶然而笑曰二子志則髙矣然以誇詡於上人之室毋乃癡乎夫上人者卑卑而莫之抗故髙矯矯而守之愚故剛小江海於一勺大毫芒於無垠來而未始至去而未嘗往有子之孤堅挺特而無頑鈍有子之虛徐巻舒而無杳茫子而得列其徒者侈矣較輕重形彼我猶有人間世之累焉惡睹夫上人之所存哉於是二子爽然自失傾禮上人曰鄙人懵於至道外史教辭昭若發矇矣願卒為弟子因請書之俾勿忘答或人或問詩至唐而拘四聲始有律之名律者取其可歌也今人律唐之律若填曲腔然亦皆可歌乎曰曷為而不可也夫情發於聲詩言志也聲成文謂之音歌永言也五聲依夫歌之永十二律和夫聲之依詩歌固有自然之律而聲律縁以起也李太白清平調詞李龜年歌之王之涣二友不相下三人者入旗亭中約曰勿多言第聆妓歌則聞多唱之涣涼州詞者久之又聞連歌之涣他詩而二人者各一詩而止之涣大笑二人始服又如東坡樂府才大不能束程度歌者猶檃括入調矧詩固古樂府哉矧唐律哉曰或命唐詩為音可乎曰可曰謂中唐無盛唐之音晚唐復無中唐之音然乎曰非然也朱子論風雅頌部分盖曰辭氣不同音節亦異論風雅頌正變盖曰其變也事未必同而各以其聲附之盖變風風之聲故附正風變雅雅之聲故附正雅時異事異故辭氣亦異然而以聲相附者聲猶後世所云調若腔也盛唐中唐晚唐律同則音同謂其辭氣不同可謂其音不同不可况盛唐亦有辭氣類晚唐者晚唐復有類盛唐者乎嘗欲取盛唐諸家和平正大髙明俊偉者不分古體律絶類為盛唐詩其辭氣頗類晚唐者類為晚唐之祖合為一巻中唐晚唐各為一巻其辭氣頗類盛唐者則類為各巻之首中唐晚唐盛唐所謂係一人之本者詩之正變則詩人之性情而辭氣不同耳使學習之審如是晚唐可入盛唐不如是盛唐則至晚唐靡靡而後已亦少補也問者退因謾書之石莊對盱永年胡子所居溪澗皆盤石㠝峭因以石名莊石生夜見夢曰渾沌鑿麻姑立號稱勝絶其下為徤湖為䨇溪我石氏族居之子幸卜鄰焉子無我漁我不子嫌子實華謏我保孱顔以墨為莊樹桃李也以畆為莊豐黍稌也􅊝李樹而私恩榮黍稌豐而家力饒不是之從將必有故我族類至貴孰與萬石君至富孰與金谷園堆簮笏以為庭藂寳翫以為室下者金帛視猶塊礫子如彼取彼不尔嗇若乃侈軒楹之華充耳目之娱張承吉植筍成林番禺輦珍牛僧孺譜第甲乙刻畫名姓米南宫朝衣肅拜不恤物論無不可求求無弗獲而何辱於予前所云云予一無當請必更諸胡子悚而驚灑而悟長揖石生上坐賔右而復之曰夫取衆棄者物莫争達人之髙蹈也保無用者物不忌全身之善智也生宅是間厥有嵗年霜霰氷雹不爾變濤瀧湍激不爾泐烏獲賁育不爾遷精衛披以靡愚公望而走而秦皇盱睢莫能鞭也鈍而挫銳頑斯逺姦重厚以鎮遏静貞以定堅若此者生所謂全身之善智也吾誠取焉取衆之棄生亦無損無情之逰其逰乃天無味之㫖其㫖也淵若夫為米為牛為張皆玩物䘮志也至貴之極鬼瞰其室至富之餘必與禍俱而况崇私恩以植黨與饒家力以愚子孫吾必不爾也吾方傲璃素之樊圃生胡不明哲以要我顧時俗以探我不金石以固我反邊幅以拒我乎生躍然起謝曰鄙人失辭始虞子之侵軼我今乃不足以辱子粤若有初知我者稀自今知者非子其誰繼今定交欽予無斁生既退胡子乃請次第書之又命工啚之以與好事者觀之賛自愚賛天下之智者莫如龍天下之愚者亦莫如龍興雲致雨以澤萬物智莫大焉涸潭洞以自晦制螻螘而若無愚莫甚焉昔者老子之道以之故曰老子其猶龍乎髙士蕭德周甚好龍而以自愚副其字盖徳不周者常自眩求其能愚者鮮矣德之周自無適不愚誠愚乎斯知矣髙士有得乎是而寓興於畫龍者亦求老子之似耳昔葉公好似龍而真龍降焉乃駭而走彼不知老子之道故也髙士於老子深矣吾知真龍將降爾室髙士且飲其珠光而拊其鱗髯也以為愚可以為不愚亦可賛之曰學天道猶夫龍不能如龍智斯愚之不足不能如龍愚斯智之未充必周于德必脩乃躬至於變化飛騰絶溟涬而超鴻濛則子之道吾盖不知其所窮某太守畫像賛中牟尊魯渤海懷龔史傳其政未覿其容闕不視此天球金鐘陽和外舒神明内充望而知其被日月之光華儼廟堂之肅雍霜栢讓其清操雲松引其髙風斯所以豈弟令聞而福禄來崇也夾谷同知畫像贊烈烈神彩堂堂粹容亷以律身而堅守勿易勤以蒞政而允得其中寛裕不遺於細務嚴明一出於至公暫淹留乎貳守實簡在於宸聰軾乎宜刺史之熊馬乎宜御史之驄蔚蔚乎古名臣之風楊主簿贊舟崖倚空碧澗流雪天賦之䫉既峻而潔春日載陽藍田暖烟天禀之性既粹且温其守身也如城其子民也如母鍾乎天台之英遊乎群玉之府蓋不獨友天下之善而尚友夫千古參議余慤菴畫像贊温乎春陽之煦物澹乎秋水之澄空也奕乎棟梁之與柱石粲乎禮樂之與文章也勤乎藩屏之寄肅乎朝署之容也鍾乎山川之間氣蔚乎朝陽之鳴鳯也昭乎明體適用之學沛乎致君澤民之施固將輩稷契而友夔龍也文興國勸農文國家疆理南服一新版圖乃頒印章明法律以與民更始爾贑一府十城獨平川最先被化城以安堵縣令於撫綏德恐未至然心乎保障亦孔之厚矣爾父老耳目固習知之今東作方興土膏脉起劭我農而朂之耕寔政務所尤急者我農慎無以大兵之後自怠譬猶水旱不測乃天之所時有也瀦防蓄洩在人而已一稔補三㐫昔固有之安知大兵之后天不惠我以豐年哉今嵗元日庚申晴越五日甲子晴春日晴元夕又晴越二十日田家最占晴則又晴凡此皆豐兆决可騐尹與父老同致喜也爾農侯主侯伯侯亞侯旅侯疆侯以夫耕婦餉皆悉力可也或㳺惰逐末尚氣忿角闘争以妨務不可也或不孝不友為姦為惡凶而家賊而鄉動干新憲尤不可也昔時山有寨寨有主驅農入兵誅求供給困苦不可言新朝首罷寨兵使爾得盡力於􅅵畆以奉公上事父母育妻子德至渥也於是而􅅷不􅅷尚誰諉㢤嗚呼其明聽之其允廸之韶州府勸農文春序既半田務孔殷郡守歸自京都親承戒飭遵劭農彝典嘉與父老民人宣明國憲俾爾灼知謹守庶幾保生聚以力耕桑也國家肇造基業深懲近代覆亡之故皆縁失於寛縦故禁宻而罰峻者周禮刑亂國用重典是也當之者靡滅慎之者曲全爾其敬㢤郡守子育爾民于今五年爾民幸生嶺外邊鄙不聳年榖頻登賦外徴需又以逺見優今兹天時已兆泰和盡力南畆嵗必又豐唯當長㓜相告語畏法奉公斯可樂其樂而利其利爾其敬哉戒賭文友生某請曰生故家也先生嘗辱與先祖若父厚善生今﨑􅋂厯落可咲迺爾盖有不齒之習多而慱為㝡下今雖悔何及然猶時往來於心敢謁文示戒掲諸座右得朝夕目在之可必改無過曩生大父承家業完富以慱為㳺朋徒從之直戯耳其慱也微及生之父家口益落乃肆焉以慱為真其慱益甚其身益貧而終莫省悟生今遭大亂出百窘無一瓦之庇一壠之植缾不宿舂箱不貳襲然視乃父之慱又大甚焉鄉之賢人士不與齒親戚不與齒久矣盖方慱時目不覩山嶽之嶙峋耳不節鐘皷之髙下身不知寒暑飢飽之御宜又烏有夫所親所知禮文還往緩急酧應㢤其不為人齒宜也不惟不見齒又加怨隙焉夫今乃知慱之害而家㐫而身如此將痛懲而力慙之惟得文以示警幸甚余聞生言既嘉其知悔能改又嘉其尚文悉書其悔辭而祝之曰人孰無過作妄為過而懲其過而斬其妄君子所貴也昔周處能除三害史稱之後世以為賢夫南山白虎沔水饞蛟生之力亦末如之何若夫為鄉里之患生則素未嘗有所患者獨慱耳改之不難誠改焉脩身慎行讀書務業孰不稱生之賢乎然則生不賢於周處矣乎其勉旃毋忽殤解御史王君子啟改廣西僉憲再調守蜀重慶州謫淮西香泉監年過五十無後大懼不孝在監時洪武十二年生一子不以被謪為不淑而深以有後為榮慶孩而名之曰淮西奴十三年夏四月役滿抱嬰還鄉六月襁褓得疾嘔泄死以槥易瓦棺堋于祖塋側伯父子與銘其磚甓而子啟哀涕不已㡬致子夏之過㒒解之曰未三月不成殤四月至七嵗為無服之殤無服而哀踰時非禮也不能無哀而有節焉斯禮矣魏人東門呉年四十僅一子䘮之而不憂曰吾嘗無子今子死乃與向無子同吾何憂焉夫子夏之䘮明過於愛東門之不憂過於達皆不能以禮自制而子啟無是也則既㡬於禮矣而㒒尤欲解其哀者殤子出於晬試之後不得為無知昔顧况䘮子非熊哀悼云老人䘮愛子日暮泣成血老人年七十不作多時别非熊地下聞之泣訴冥官得復為顧家兒三嵗即具道其事嗚呼死生往復如履康莊庸詎知淮西奴不復作御史兒邪子啟為政豈弟而神明所至能其官庸詎知天之報施善人不在是邪故曰天不可必乎仁者必有後作殤解海桑集巻十
