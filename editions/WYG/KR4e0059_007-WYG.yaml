body:
  text: 海桑集巻七明陳謨撰記堅白齋記三衢徐公炳文繇明經起家為國朝藎臣當肇基之日征謀治法拓疆取亂飲至䇿勛是不一見入則典司政本出則父母羣黎乃若守令之職民之師帥尤上所躬親簡拔非賢不銓公自内出知彭澤知分寧皆不踰再期而調政用書最民戴猶所生去官日攀轅泣慕至新任境上不絶改知韶州余獲拜焉韶支邑四地方四百里入新朝幸得沭寛政聞公先聲長老秀民咸致慶幸以為輟禁中頗牧為渤海龔遂用意深逺公既視篆按韶之故更其所宜更飭韶之吏律其所不律寅而入酉而休率以為常公上之應必務先期庶政之繁無㣲不理属縣之承風采為新曾未三月紀綱悉振公曰讀書之齋扁以堅白子為我記之余復曰公所立有古良弼之風皆堅白之用也堅白其本也昔者孔子生於春秋固以天下無不可為之時無不可改化之人盖生物之仁體道之權也子路不察而不悦於佛肸之召故以堅白不磷緇者教之又以匏瓜不飲食者警之夫心有主而不動擴然大公物来順應憂樂行違確乎不可抜者堅也清明在躬氣志如神皦然不可泥滓常與日月争光者白也磨湼不能變也非聖人乎如是而後無可無不可君子之學之用斯其的矣堅不足者磨必磷不足與有立白不足者湼必緇不可與有明若公之介介傑特奮義不回耿耿玉雪潔身保素其行無隨其色無絢叅議台鼎樞謨宥宻芻牧邊郡眷倚深重聞望表暴非堅非白曷以濟此若夫其磨其湼不磷不緇充之極之四輔之班九命之制五院之憲無所不可者又詎止五馬之榮一麾之重而已哉韶州重建府治記韶為粤壮郡秦属南海漢初属桂陽三國入吴爾後析置不常其得成州而以韶名則自唐武徳四年始盖析廣之曲江始興樂昌翁源置焉貞觀初又析置湞昌仁化二縣統縣六乾和四年割湞昌始興置雄州迄宋元豐間皆統縣四乾道三年又析曲江樂昌置乳源至元間又析曲江置新民併翁源歸曲江皆統縣五今新民廢所統者曲江仁化樂昌乳源而已以廣輪計實周官方四百里之地誠壮郡也嵗在癸卯古復錢侯朝陽来守兹土既浚隍髙城民以奠枕乙巳嵗則大熟乃相府治敝陋弗稱謀撤而新之若貳及幕議以克合侯曰属邑疲瘵役不可加即捐俸鳩工掄材通守郭飛幕長程玘併力一心役以丕作得木率異材其尤異者雙幹共根干霄百年絶崖礫壑致之若夷雙梁天成若有相焉以待興者底法基構悉増厥舊既其竣事髙明有顒盤盤焉皇皇焉古諸侯外寝殆不是過經始扵乙巳九月落成丙午四月前為儀門三間中為設㕔五間東西廡為吏舍十二間前曰麗譙之樓仍其故而奐之后曰燕處之齋易其構而偉之旄倪族觀咸嘖曰由至元丙子一炬至大間重見今九十載未有壯觀若斯者扵是昔之湞武二水紆徐演迤肘腋夹流又若決而駛若䟽而湧以襟帶㑹同乎郡之南昔之韶山諸峰如盖如冐如怒猊渇虎如芙蕖出波者又若騰起於羅浮馳騖扵衡桂以羽翼張皇乎郡之左右噫㣲太守孰臻兹哉太守樂公宇之成嘉民俗之熙端居黄堂無訟之可聴第佩服圗史以永終日而已彼漢衛颯茨􅂶遺愛扵粤宜不多讓乃耆俊士民合辭来請文勒石余属筆不愧者錢侯守官亷待物惠飬民裕興學嚴昔固稔知之暨余過南雄入學宫讀錢侯碑其父老曰錢侯我慈母也當韶欵附日韶父老遮道願得南雄守撫我即安矣軍師如其請奪我慈母者韶也迄今四年韶多惠政以此兹不悉書者記為建郡治作也然韶多先賢遺跡諸所宜起廢滋多侯皆次第圖之繼是將不一書矣竹間記嘉植之類其清者三曰竹曰梅曰松而已松之清以直氣梅之清以雅韻而竹兼之有直氣而無其偃蹇有雅韻而無其姢妍者也故竹之間尤至清所在而君子尚之然而日至乎其間者寡矣不日至乎其間而以號扵衆曰友竹友竹者是友其外也名也與竹而二竹莫之愛也必常處乎其間然後竹與我莫逆斯心也非名也而我與竹一矣晉唐来友竹者是不一二止吾獨取王子猷焉子猷所居所至毋論淹日月乆近即命種竹或怪之則曰何可一日無此君是斯湏顛沛不離其間也或植嘉竹則未問主人徑造竹所是心乎其間而忘乎其外也古今賢達髙致尚有若此者哉聞子猷之風而興者吾得王簡夫氏其為已處官有直氣無偃蹇有雅韻無娟妍凢比徳扵此君者實盛似子猷無地無竹無時不在竹間而簡夫如之又甚稱吾聞南華之山九成臺之下曲江之墟以仙隠則宜以吏隠則宜以大隠則唐相張公之宇也簡夫植竹焉日與賢人大夫嘯咏其間海邦之民䝉安静之政樂豈弟之澤得與優㳺扵陵谷谷陵之外者又子猷之所無也因為君記竹間迺併書之翠庭記韶州指揮張公月山有幕府知事周君景宜余至韶始相見即相知且知之深其世文儒也其宦學才能吏也别字翠庭指揮大書掲之属其記於余余諾焉乆而未有以復景宜也盖自濓溪夫子庭草交翠至是二百餘年無論方内外門地問學髙下皆知尊慕以為字若别字不可一二數故吾不敢輕為景宜記者有待也一日偕景宜指揮所見砌下草深至膝勿剪指揮曰草猶民焉得雨而滋長不擇地淺深踈宻各光潤可愛吾故不欲剪之嗟乎是足以記翠庭矣景宜常以公命撫鎮贑之平川浚濠崇城修學校鑄祭器善澤民民至今歌頌盈耳及從公扵韶又五年公有熊虎之威有陽和之煦君一切奉承惟謹寧其身一布其飯一蔬而民無間焉彼其賊民如割草菅芟夷藴崇勿俾能植而常以加扵善良與無􅇳者亦獨何心哉君思指揮存心而觀扵其庭之翠焉即濓溪奚逺且濓溪不嘗為提刑於韶乎遺澤洋溢殆千嵗未憖皆其不除草一心充行之也固宜尚服之無斁君故汴開封人曽大父宋南渡仕至南雄通判大父志學延祐初為贑儒學教授因家焉故占贑籍云交翠軒記僕客韶陽冄嵗稔聞南康知縣周侯道和政治居最恨不得一靣暨出􅊐抵蓉江謁侯扵交翠軒其容也徳其服也士其言恂恂而其神采朗朗如明月之入懐也周觀其邑郭氓恬俗熈貨阜於往時物賤於他郡詢其田里無惰農譁徒公租不逋私蓄自餘昔之窮山負固環二鄉連十數嵗不受約束者皆凂首庭下樂侯寛政嗚呼斯實行仁心者之效哉侯盖學問根於天性讀周元公書玩太極圗達隂陽五行萬物生生變化之妙壹始扵四徳之元而在天之元扵時為春於人為仁元天徳之首春生物之始仁衆善之長也萬物各具一太極而物各有初即物物可以觀仁元公玩庭草交翠而樂之意盖出此學於元公而洞見道體者程子也程子謂雞雛最可觀仁雞雛之初生可愛猶草色之秀潤可玩也古人稱欣欣物自私又稱花桞更無私語皆近道無私者物各付物自私者各全其元公之不剪草者不忍傷夫草之天也不忍傷其天者使其欣欣焉得自私也推是心以父母斯民安有疾痛疴癢不切吾身哉周侯取扵元公以名軒可以觀侯之心之學而軒之所有第古今名畫法書諸賢記詠而止可以見侯之清侯復審其義焉僕以為觀交翠而得元公光風霽月之宇者有矣因交翠觀仁以識元公之心與元公之政者不多見也南安為元公仕國前史班班異績不嚴以威人不忍欺所在化服及為韶州提刑撫良鑄頑控交御越海邦以寕充是心之仁形是政之仁跡其愛民猶愛草焉周侯為南康美化善政不勝書既得民之歡心矣名軒交翠孰曰不宜詩不云乎髙山仰止景行行止敢以為侯勉又云惟其有之是以似之敢以為侯頌上池記天地間陽氣為輕清為髙明隂氣為重濁為奥渫故陽仙道隂鬼道服食之士煉形至於純陽則仙矣史記稱長桑君出懐中藥與扁鵲曰飲煮以上池之水三十日當知物矣註謂水未至地承取竹木上露也夫上池者天地也雨露霜雪皆本於天地然固不若露之尤清故上池之水陽也地上之水與凡溪流井竇皆隂也方士教武帝承取金莖露和玉屑食之長生即長桑君説也而武帝多欲不能蜕隂濁雖服而無騐不若扁鵲服之超然物表達乎聖入乎神遂能隔墻見人五臟為人起死而發其秘扵内外經以為萬世民命計皆長桑君之教也廬陵鄒君舉世為名醫家以避地寓韶陽有年研精博究存心愛物不擇貴賤髙下悉與善藥累累竒效人服其精而徳其仁故廣東憲副楚之竒劉公扁其室曰上池大書掲之盖納之於輕清髙明之域而欲其盡神聖工巧之道也余来韶君舉求記焉余復於君曰扁鵲至矣不可以庶㡬夫聖與神上智之事工與巧君子所宜勉也能盡扁鵲之法以活斯人是亦扁鵲而已矣不然竹木上露今猶可飲也不得長桑君懐中之秘烏能知物哉吾又以君舉一身亦有上池存焉蘇長公所謂下湧扵舌底上流於牙頬白而不汙丼而不壊宜古之仙者以為金丹之祖長生不死之藥者是也惜余不遇長桑君而質之君舉以為何如邪自然堂記士有不樂於時棄軒冕珪裳外託於黄冠草服而内存其憂世之心者因别字曰自然以質扵海桑散人散人曰子嘗然乎然不然乎不然以為自然乎曰然散人曰然乎然非自然也不然乎不然亦非自然也然適也不然莫也君子無適未嘗然無莫未嘗不然故未嘗然而嘗然然未嘗不然而無不然者天下鮮矣然則孰為近曰道所貴者中中所貴者權然乎然者衆人之然非吾斫謂然也不然乎不然者衆人之不然非吾斫謂不然也以是為自然豈其至哉且子嘗奔走扵名利之區顛倒扵是非之數今而得飬真扵韶石正淵明所謂返自然者内觀静照可也槁木其形死灰其心不可也静亦定動亦定可也静而無動動而無静不可也卧起云為順適其常黑白薰蕕不迷乎中坎止流行無繫乎外如是而已老氏盖無為而無不為此自然之至也彼或㝠然悍然自以無累隨俗脂韋自以有經衆之然然所不然不然吾惑焉耳矣君曰子之言博哉願誌于室或曰君方從事於丹砂秋石以利人惡乎自然也夫利人固君子憂世之盛心丹砂秋石特其小者耳焉足病乎自然姓鄭名某韶州人仕至英徳州棄官學道盖徧叅諸方晚乃遇方丘生指視要歸躍如也駸駸乎自然矣吾故喜而記之玉齋記韶郡幕得賢侯程君國玘番陽人也由雩都尹改南安幕長入王朝調韶州知事所至皆有惠愛剛不折柔不廢君子以玉扁其齋盖比徳焉其嘉賔楊子良從侯雩都及韶雄最乆具道侯意介予為記按字書玘佩玉也玉之為器至貴其大者蒼璧禮天黄琮禮地珪璋琥璜以方祀天子執瑁而公侯伯子男各執其命圭也其最近人而不可斯湏去者則莫如佩玉在禮凡帶必有佩天子佩白玉而𤣥組綬公侯佩山𤣥玉而𤣥組綬大夫佩水蒼玉而純組綬士佩瓀玟而緼組綬豈徒取其進退抑揚左右宫商周折規矩而已哉昔子貢問於孔子曰君子貴玉而賤碈者為玉之寡而䃉之多歟孔子以為非為䃉之多故賤之玉之寡故貴之也盖玉温潤而色光澤近扵能柔玉亷隅而不傷劌近於能剛剛義也柔仁也其文瑕不掩瑜瑜不掩瑕忠也其采孚尹旁逹不有隠翳信也天下之道孰有大於仁義忠信者乎夫玉偹仁義忠信之徳以形扵珩瑀璜琚之用君子佩之孰有美扵此者乎程侯繼今以往將佩水蒼焉則命為大夫艾服官政時也主此忠信由此仁義也又階而陞之将佩山𤣥焉則侯執信圭公執桓圭時也亦由此仁義主此忠信也徳與玉相輝年與徳俱劭事業埀之無窮焉有非克自好修何以致之經曰玉不琢不成噐又曰他山之石可以攻玉不然玉雖有相而無文何以為佩故以石攻玉猶人以患難成徳也以玉人雕玉猶人取諸人以為善也侯􅆒厯險艱以有今兹其成器而貴重宜矣不尚有可朂哉請以是記于齋焉居南記往年王霄翁由翰林提文印出江西風流篤厚見者心醉其談笑筆墨人至今傳誦寳愛不替贑平川亦其㳺衍嘯歌遺化處故老往往能道翁狂嬉狎酒韻致姚君可發侍翁時年甚少翁頗嘉之為扁其室曰居南以可發居縣南涯去縣不里許而逸蹤塵表故自可尚今可發年八十年華屋落兵燼為草墟舊扁不存僅僅葺環堵狹扵漁刀而想見翰林如故時時肅容禮客苐言言居南居南真若不負當日賞譽期望者余故心敬之邑大夫朱君又為大書居南二字存之髣髴余嘗坐室中䕃百年之嘉樹玩五畆之丘園俯仰感寓竊計海屋添籌凢㡬柴桑甲子殆不勝書而余與君白頭如新相對如夢承平不復見矣苐逍遥水竹間狎魚鳥伍樵牧以永昕夕耳讀圬者王承福傳亂来何地不然獨幸君居南基址固無恙計自今以往子孫孫子䋲緝蟬聨殆百世保此南而居之也則是南之無恙特存乎其世而不係乎扁之存亡其世常不替焉而扁與之俱矣凢君之後人誦斯文者其不油然動扵其中乎如是而不興起大其家者未之有然也梅坡記贑貳守楊侯廷舉由蕪湖令七年政成遂遷是職傳曰君子學道則愛人侯從安慶郡将余公廷心學有用之學飬之者素定故吏為亷吏官為能官宜也别字梅坡用以自况僕記之曰夫溪澗之植未離於奥渫亭軒之種或近扵䙝玩深山窮谷又至扵荒寒非梅之佳致也坡雖髙可親梅至清不雜質之清居之髙不雜扵衆而可親焉其惟豈弟君子民之父母乎彼繁華所都衆芳所在非無幽人之貞處女之静飛仙之綽約節士之夭矯然而混混於春風爛熳之塲其皦然不滓歌舞之塵者㡬希此清而病其雜也彼蠶叢魚鳬之國龍門鴈蕩之髙崑崙天柱之頂黄鵠不敢度􅆐猱莫能飛徒使孝子迴轅而顧惜忠臣叱御而骨驚者此髙而病其不可親也楊侯吏為亷吏節儉而矜嚴玉潔而氷瑩其不雜也如此楊侯官為能官母愛赤子飢者哺之寒者衣之疾病呻吟者惠鮮之其可親也如此是坡也委虵起伏平岡逺阜長洲茂苑散見層出映帶参差而横枝却月直榦凌風車馬冠盖童兒艾耋掇芳襲馨日往来㳺衍其間佳致為何如哉吾以章貢所見扵侯者如是為侯記焉而侯學扵余公者不止是也風霜之餘華者就實然後為不負所學異日尤當不一書之中庸齋記清江碧嶂之間余得有熊氏族裔名中而字克庸穆穆乎識時達政之才賢也入其齋扁曰中庸之齋凡所僑寓即掲以自厲且介余記之予因得至交相朂之誼焉昔者往聖先哲或出或處殊蹟而同歸素富貴則道行乎富貴素貧賤則道行乎貧賤素夷狄患難則道行乎夷狄患難道者時中而已時中所在即所以為庸㣲之為寝興服食大之為車馬戎兵恒之為九法三綱變之為禅授放伐各一其時則各取其中合焉而安榮戾焉而危辱孰非平常不易之理哉克庸修之身有學有守用扵時有猷有為孝弟隆扵家忠信孚扵人即其言恂恂以慤與之居栗栗而温而當夫天造草昧四郊多壘時出其才而小用之施足以徳鄉鄰力足以援檻穽殆不勝計使在春秋戰國彼諸侯之大夫烏足以辱君哉吾固知克庸厚積薄發可以富貴貧賤而安可以夷狄患難而宜亦要其適中能庸與否何如耳是齋也載籍前史以實之名畫法書以鏝之江山風月以藩落之直諒多聞以匡翼之而滋蘭樹蕙含英咀華塤箎翕如也菽水歡如也所以張皇榮寵扵是齋者靡不畢偹吾夫子盖曰君子中庸又曰民鮮能乆矣夫凢民之所鮮能而君子之所獨能也豈易及哉余故樂為克庸氏記之且将復焉以自朂云篷窓記夫坐鑒杯水而江湖百川不為大者善言天下者也善言天下者天下小扵一室夫豈必登魯泰山而後為真有見也友生某扵其書室之側啟窓焉従廣度之僅僅函丈許時時與客嘯傲其間扁曰篷窓吾常過之坐我扵篷下不啻濤掀浪蹴挐舟入港子而風馳雨突舟人各歛袵跼蹐畧不見偪仄窘態苐覺折旋俯仰更極中適及其語劇興移軒軒出篷外䄂拂飛鳥平臨大江㳺而上者為嶺嶠為海瀧為島夷洄而下者之淮之漢之衡之荆車帆無時烟雲互吞苐一送目頃而可意得之則皆吾篷外物也忩果小乎哉曰篷忩云者寓也亦所以志也吾不得時坐忩中請約法焉凡過逆旅而斗酒濯足造竹所而不見主人與飢而釣跛而度者負薪而行歌騎牛而讀漢書者皆善言天下者也生審無失士而謹識之異日取其竒言以告我樂志山房記孟子論曽子之孝其親盖曰飬志而曽子論君子之飬老則曰樂其心不違其志夫飬而未臻其心之樂非孝也欲臻其樂然或不能先意承順一志茍或違一心之體戚焉烏乎樂也故志者心有所向往未形扵色辭凡人子所可知者也扵焉弗有違亦焉往而有違焉往而不樂哉此飬之至也吾友楊允恭孝扵事親力非甚有餘而飬必致其樂飬必常豐而常必適其宜亂来避地村莊飬志復如城居掲其讀書之齋曰樂志山房予嘗過之望其垣殆儒有一畆之宫歟入其樊翳然林水木殆泌之洋洋可以樂飢歟休其䕃有青青者焉有如簀者焉殆武公之淇澳歟履其畆禾役斾斾然黍稷翼翼然殆豳民之本富歟扵是室家攸宜而芋以寧也塤箎如貫而翕且孺也入厨具甘㫖上堂問起居而其親不知塵埃之眯目風流之隔代也竊獨悲夫曩者運昌時泰家肥屋潤位髙祿豐者能飬志使樂曽㡬何人哉不以遺體行殆而貽其憂則以壊名灾已而致其辱亦常不為少彼孝衰於妻子者要不足論反不如窶夫傭奴軰僅僅飬口體而其父母常自慰悦且誇詡之盖終身焉無他于其窮且賤而直情能之而此顧戾焉耳嗚呼允恭誠所謂加扵人一等歟如之何使余一過山房而油然孝愛生扵中也允恭當鄉邑亂時嘗奮抜民伍接戰城西獨挫敵鋒以完郛郭人服其義勇然不願仕進故奉親避城以老有如漢興舉孝亷力田鄉大夫署行義年而上之其焉避邪非樂志之尤者耶吾記姑為子願之東湖隠居記出贑江東下有洲焉曰雲洲嘗聞五雲見其間故至今其邑稱五雲凡贑之山崖嶄壁削者至是而坦迤贑之灘峡束石盤者至是而舒夷又循州而東有市曰金灘半百里而遥而坦迤者盡廓舒夷者亦徐厥土利陶厥田上腴江廣之徼舟車之隘以砦以驛故居之者與城郛無異而蕭氏又擇灘之尤勝者築室以居之因其地有湖池焉其清可以濯溉其肥可以釣漁其潤澤可以灌焦稿化瘠以為沃遂扁曰東湖隠居而介其友謁予記之余重其請則復之曰夫蕭氏里居金灘而家有東湖灘動而湖静蕭氏其樂静者歟灘流不息而湖止不盈蕭氏其知止不貪者歟灘磯之石則怒鼔之颷則號風霜髙潔則其底立見而湖䕃之以榆桞植之以渠荷禽魚且有餘樂澄之不清撓之不濁冬夏靚深不竭以充軒楹耳目之娱果孰得窺其底裏然則蕭氏之居外侮不能侵殆所謂風雨攸除鳥䑕攸去者歟凡出贑抵雲洲而險漸平抵金灘而險悉平蕭氏既處其平又擇其勝豈易得哉吾友吟咏倡酧其間足増東湖之重然則其雅尚斯文又可知已殆蕭氏子孫孫子八世莫與京也以是記于壁逺徴于方来龍山小隠圗記雪竹之溪金龍之山有隠居者焉曰蕭君福可氏福可生長承平時既壮而浮㳺江湖未老而逍遥泉石崇本而謙撝家和而身潤田園約而子孫蕃莫年不出户庭而交㳺風月無虚日及是世亂且一紀入其境復如未亂時嗚呼可為福也已渝川孫君碧霄避地焉依君一見知為竒士即避堂以舘之孫君忘其覊旅居間嵗則取幅紙為君圗龍山小隠盡用郭熙家法而以趙千里逺景參差映帶咫尺而有無窮之勢將持為君夀辱先示余曰積日而成之殆天機所到也吾未嘗為人作及此也先生其為蕭君序之余諦觀不忍釋手嗟乎福可也能使碧霄每况益清如是其髙自標致詎有涯哉是圖也層巒而疊巘奔濤而湧霧其間有若神仙中人騎驢渡橋者非青蓮居士則浣花老翁也有長松落落四五如虬如龍而兀兀一茅亭其間囊琴而坐者其昭文氏之無成虧與有瀑布千尺起而引睇者有瑶草黄華赤楓丹桂心賞而神融者非劉柴桑陶隠君所託而寄歟文鹿也濠梁之所逐與馴鶴也孤山之所放與祝雞也尸鄉之學仙歟垂釣也桐廬之客星歟古之君賢其人而不得見則或圖其居而觀之圖固甚有補也為蕭氏族里者聞福可之風而興按圖而得龍山之勝槩讀吾文而想像古之数君子者茍兾及其一焉皆足以垂光無窮此碧霄畫中史筆意也福可有賢孫曰魯者從予學經術志昻而才逸必將擴大其家聲其福盖未艾也然則是圗愈逺而愈耀矣㤗和縣新修城隍廟記洪武三年六月皇帝若曰載稽祀典城隍廟貌宜從改作廟在府者如府治之制在州若縣者如州縣治之制舊有土偶像設者胥毁為塗塈在両廡者還以塗両廡壁在正中者還以塗正中壁而圖畫雲山扵壁上凡神座几席悉如官廨儀署其主第曰某所城隍之神大哉制乎一洗末俗之陋以從祀典之正扵是省部斟酌格式移諸外省外省欽承惟謹下諸属郡㒺不䖍奉泰和令尹嘉議大夫前御史劉公宗啓政肅人和令行衆趍刻日庀工暨厥僚佐縣丞陳君舉善主簿楊君禹鼎典史許君宗禮相恊後先度地之宜而斥大之取材之良而謹施之量氓之任而分􅂌之旦省而暮程寛撫而嚴督縦廣崇庳纎悉如法門廡庭室幕舍靡不宏偉軒朗上以稱睿㫖下以悦輿情逺近聳觀嘆未始有盤盤翼翼羙輪美奐實為廟貎之甲豈直一邑之鉅麗而已哉亦既落成耆老祝史等来請文刻石僕常讀吴文正公廟記盖曰城隍亦后土之類也古者八蜡若水庸若郵表畷莫不祝而報之况城與隍域民而衛物捍外以集内厥功懋焉不有以嚴祝之可乎禮雖先王未之有而可以義起者城隍是也其所以廟而不壇者又以棲配享之神昔漢髙祖以灌嬰下江南而江南祀城隍類以灌將軍配是也文正公之言淵博明通足禆禮典之未偹而我聖天子㫁自宸𠂻黜剗昬俗致城隍之神有髙明穆穆之居無淫瞽屑屑之黷誠曠世之盛美也抑傳有之先成民而後致力扵神民和而神䧏之福邑長貳有焉盖其勤宣上徳茂植民功殆與廟貌相為乆逺而神之䧏福斯民永永無疆者孰非惠化之所敷遺乎皆不可不書以是刻于石用昭示方来初堂記凡物莫不有其初萬物本乎天天者萬物之初也人本乎祖祖者人之初也尊祖故敬宗有百世不遷之宗則百世一初也有五世則遷之宗則五世又一初也學者嚴明初名其書室曰初堂自其髙曽大父以及祖父兄若遺文若出處行已之跡若奔竄艱難之故靡不記憶不忘時時誦道之若子誠能念厥初矣猶懼後嗣之或昧焉謁予記于堂中余聞宋季年有以中書校勘杜門隠居慱學善鑒喜好清事交㳺巨公者山􅋯翁也翁生長扵嘉定中至淳祐丙子嘗作春窩記以見志讀之槩可想見其人焉有元盛時有以布衣㳺京師挟倚馬萬言之才負麾斥八極之氣公卿交辟之而性特骯髒不屑常調輙云非御史不為故獨以古文馳譽於朝野者校勘之孫吾廬先生也先生二子孔陽膚敏膚敏隨侍入京筮仕為翰林銓冩㑹亂不知所終孔陽不務榮達鄉稱善人是生明初年今且半百五世止一身又似續未有嗚呼安得不重念其初安得不重記扵斯堂哉孔陽吾朋也明初吾徒也吾老且七十尚安得忘情於斯哉吾又以明初苦學強記覽治尚書食舊徳雖間闗亂離奉二親處深山如平居其不忝厥初如此既嗒焉喪偶又為逰兵掠其二子夙夜慄慄常憂無後為不孝之大其務永厥初如此吾安得不為明初記之哉又安知天之報施善人春窩冲氣元貞貞元不自今始毋徒曰孑孑一身而已有不五世其昌八世莫與京乎傳曰必復其始此初之説也明初其俟之三顧書隠記夫隠者君子獨善之名也茍達焉斯無取矣達而欲兼是名則或肆為瑰辭以掔取之大朝市小山林以歆動之使人哆然日趍扵大而鄙其小然則去隠則逺矣隠固有大小乎哉甚或立乎両間自名中隠不夷不惠非狂非狷可貴可賤君子盖滋惑焉陳君守道讀書三顧山下味貧之樂飽徳之腴若將終身故名其室曰書隠斫司以賢良強起之徴試考功優合榘度論定且入官固辭老疾願返田野當道可之㑹稽許如珪又為作三顧書穏圗以華其歸歸以介余記嗟乎是山清節先生讀書䑓在焉先生真隠也非招也以春秋授忠簡胡公今其遺書具存守道熟復而精察之有立扵身有埀於後如是而已其為隠也不亦大乎鏡湖書隠記古之君子窮而處扵下以求其志謂之隠達而用於時以行其學謂之顯及其澤施扵民物功銘於旂常辭榮去寵以飬其真全其天則謂之歸隱焉隠與顕非二致也時焉而已矣後之君子達焉溺而不知止甘受妨賢冐祿之戒隠焉絶人以逃虚恒召捷徑盗名之謗斯二者皆過也㑹稽古名郡鏡湖實天下竒勝在唐賢有若賀知章躋位通顯而老扵其間在宋賢有若陸放翁隠處山隂而大顯聞於時自餘若二賢髙躅者宜亦多矣葉君叔昻讀書鏡湖得施翁宅西之湖塘居之靣山臨水鳬鷗出沒漁樵往来逺城市而閲煙霞賀陸之清風雅韻隠約具存及其筮仕司征於西昌乃介余記之余惟知章開元盛時為禮部侍郎集賢學士天寳中乞歸田里為道士御制詩送之詔賜鏡湖剡川一曲自號四明狂客見李白即解金龜換酒放翁豪邁冠時任至秘書監志復神州北望慨然長歌鏡湖中嘗夢與蓮華博士㳺月給酒千壺二賢皆天人也邪不然何磊砢英特軒軒物表如是哉叔昻所讀之書所隐之地皆賀陸之遺也今兹發硎未展素藴行將受民社獵公卿立言立功以與二賢相輝赫然後返乎書隠千秋觀之荷花無恙也劔南集之藻詞可賡也不亦隠顯一致流譽無射乎是為記梅澗記大凡負異禀者脱畧乎其羣雖草木亦然夫草木而負異禀必浩然竒芬瑰然碩貌發於名賢之詠歌方青陽展和髙下𤨏尾無不散柯布條眩彩矜馥而牡丹獨殿而王之此異禀也及朱明司暑榴蹙葵傾蘭葩芷榦而蓮獨出淤泥濯清漣天然去雕飾比徳扵君子此異禀也秋則小山藂桂擅扵淮南冬則孤山寒梅傲於幽朔細不踰粟而根柢月窟誰能弟之皦然不滓而百卉盡廢誰能魁之凡此非負異禀而能然邪物且然矧扵人乎故以人而自况於物者有矣况於物不况於常物則亦取其異禀而相類者耳平川周景元夙負異禀其執友别字之曰梅澗况其丰姿雅度言貞而氣温也復介予為記勉其進修不于其名于其實也余聞昔洛陽賈侯為縣時雅與士人㳺暇即衣冠揖讓分題角賦而閲試焉矜其不度而指授焉景元以諸生在列侯每進而詩好即譽道之不置未至則改定以成之夫㓜而得於師友之薰陶若梅之有本澗之有源長而成於賢大夫之追琢殆梅之夭葩澗之文瀾矣其出羣也則宜或曰梅澗信美抑熈明之時衆芳之㑹桂列明庭蓮在靈沼牡丹榮上苑尤為脱畧草木之羣者而梅顧獨在澗得乎余曰然有異禀者有異施也景元其益勉於學乎安晚堂記興國貳令沈侯司平言於僕曰家有嚴君踰七望八夷曠以永日清狂如少年燕處之堂題曰安晚義本於老者安之其自命也僕悚聞焉而侯具道之僕曰乃今識尊公請為之記以冩侯數千里之思乎夫公前朝之耆夀俊也晚而全五福於湖山形勝之間超然月露烟雲之表安孰加焉夫晚者天之嚮晦者也人之所同有也而適所安者寡矣經營分表以求安者累其天者烏乎安日暮途逺倒行而逆施之者戕其天者也滋不安矣故不知安之為安而行乎吾素貧不加戚富不加欣者安晚之尤者也知其為安而苟止茍足一介不妄取予者其次也沾沾而求鼎鼎而獲一飯不啻多者又其次也若尊公者勑家事如向子平稱善人如馬少㳺東山絲竹如謝太傅出入左右車中長文膝前文若又如太丘之與朗陵所謂忘其安之為安非安晚之尤者乎又其雅好種菊菊有雅節能大耐淵明愛之公亦愛之斯亦安晚之髙致也客曰子論愽哉抑見公之跡未覩其心也盖公安於晚者以有令子能以志為飬也傳云子之能仕父教之忠今貳令逺違色飬第以意問為起居而公嘉其居官能貧常致伏臘之贏堅其氷蘖之操公之心為何如邪僕曰此安晚之餘事也然則足以見公翛翛物表夫豈㝷常世故可芥蔕其胸中哉竹坡齋記清江鄧飬吾齋前植竹一坡因以名齋其僑青原也謁僕為記僕聞之君子比徳扵玉玉者天下之至貴也唯竹亦然君子亦比徳焉故竹亦玉也若尚論其世植物之類莫尊於竹當黄帝時命伶倫取諸嶰谷以制律律成而度量權衡法度之器皆縁以起禹時制貢篠簜與瑶琨並命周之符節亦與玉並行而周人美衛武公凡三致詠於淇澳微武公之徳不足倫儗嗚呼竹之世與貴孰得而尚之後世或下以為揵瓠子之歌所以興也或䋲以為橋蜀道之險所由越也其遏衝制潰濟深利涉有類夫君子之大用而幽人野老託以吟咏而翫適七賢六逸託以陶冩其憂憤則皆竹之流風餘韻也奈之何聖賢之嗣不保其不落君子之道不保其常伸氣化人事或不相符人或一不幸而物從之矣然則清江之上有竹一坡託根於子之齋與子同閲甲子同傲霜氷視橘踰為枳荃化為茅相去萬萬不以用之大小介乎志而以不適於用全其天雖自嘅亦自慶也僕與子髪皆種種視皆茫茫僕有竹無坡託記於是齋亦以寓吾坡也凡我同志翫記猶翫竹焉伶倫武公如可作也亦必油油然憫扵吾與子矣嗟夫尚有如渭川千畆其人能與千户侯等者乎尚有一窠數尺寄諸童子寺而綱維日報平安者乎彼其視清江一坡為何如哉雪隠記士大夫出處不同轍情性不同嗜而其歸不殊致者傳曰是則同又曰皆是也夫同且是天下之美豈復有加於此哉宜春朱侯志徳氏出處情性皆不異扵人人至其髙自標致託興於雪以隠獨異人焉不知者類曰隠非志於濟物者雪非隂陽冲和㑹合之所存也於侯絶不相似其知者盖曰侯工冩梅竹梅待雪始英竹冒雪逾勁皆隠於雪而極韻度朱侯特寓焉耳僕曰嘻近之矣然猶膠乎其外夫隠有小大惟隠於市朝謂之大隠又與顯對君子有隠斯有顯謂之中道豈絶人逃世者所能専哉夫雪天地嚴凝之氣之積也雖非冲和所存而冲和之氣常由雪以固則其暢達化育也孰禦是故春秋書無氷謂冬温也閟藏之不宻而翕聚之蚤發也唯雪尤然故三白兆豐深尺書大厥係之重若是然則朱侯托於雪而隠殆比徳扵玉之類歟古今窮而小隠者姑勿論論其達而大隠位極人臣者鹽虎盖深玉龍擎重魏國公之相業也雪隠也平治險穢潤澤焦枯勢合則色地功成則回春荆國公之相業也雪隠也二公誠異於人者而孰識其同哉亦容有議而非之者而孰究其壹歸於是哉易曰君子以同而異先正曰不能大同者亂常咈理之人也不能獨異者隨俗習非之人也要在同而能異爾以是為雪隠記其庶矣乎髙一步軒記金魚之南株林之浦朝舉羅氏擇勝而居之余每造焉恒由客位延致堂之西偏厯階而陞曰此髙一步也因以為扁蘄余發其義余乆負諾責盖莫適其所歸也一日過之欣然為之記曰古之君子不欲多上人然亦不肯甘為人下而不辭故易道隆謙謙則尊者愈光卑者亦不可踰此唯操無欲上人之心者能之然君子以同而異則於暌見之獨立而不懼過涉滅頂而不可咎則於大過見之此其勵志又豈肯少居人下也哉朝舉故閭右名族自其大父父與余有通家莫逆之好予每見之如見其前人任侠而隆交急義而善謀處困躓不辱挫強禦不懾遇勝時知己縦酒諧謔岑牟摻撾袒跣梟盧以為樂可謂得賢達之髙致矣此髙一步也韜跡扵園田全身於草昧自至正末運大明新造昔之田連阡陌谷量牛馬者或無噍類矣權行州里力折公侯者㦯淪徒役矣而朝舉嘻然桑麻之間翛然軒冕之表仲長統之樂志榮啟期之達生盖庶㡬焉此髙一步也余方佚老時相從笑歌輸冩故樂記之昔夫子稱孟獻子曰獻子加扵人一等矣夫獻子豈欲上人者哉不欲上人而自然居人上者加一等之謂也此髙一步意也君子人也朝舉勉之秋林軒記武畧將軍守禦吉安千户所顧侯文質别字秋林且以名其軒余記之曰夫秋行為金其象為兵其在物也歛華就實壮羣材而堅百榖微而飛走水陸之品莫不豐碩猥大而尤於林木乎見之傳曰風落山嵗云秋矣我落其實而取其材是也夫林木嘉植也其施大用也起尋丈以干霄漢飽千霜百霆以竭萬牛千夫之力使非秋令之肅則春和之煦何以臻夫大成哉然則顧侯取以名其軒宜矣侯凡両膺誥命曰爾自常熟效順俾戍廬陵能效鎮禦之績再命曰爾戰勝攻取多著勤勞命爾官居列衛俾爾子孫世世承襲嗚呼秋林之中長材出焉其簡在上心也如此其器而任之也如此其欲所永保祿位也又如此夫豈場師之樲棘漆園之樗散所能彷彿其萬一哉抑又論之錯舉四時曰春秋約言四徳曰仁義非春無以為秋之歛非仁無以為義之制侯之守正不阿亷介不隨勇㫁不滯皆得夫秋行之正也而扵孝友㝡隆温良如玉敦詩書而悦禮樂重然諾而子困窮則秋林皆春意之蓊勃也人亦罕知之矣余故記之云飬拙齋記衡州茶陵令之𤣥孫楊伯友請曰宦譜荒矣惟前聞人敷遺之休不在書乎因外氏故基葺數椽容膝圖史以為佩服花木以暢性情名曰飬拙之齋先生幸辱為記文得朝夕朂勵焉余曰子将慕潘安仁閒居乎曰安仁不妄馬安巧宦特賣拙耳石友之同歸則巧之禍也抑将為柳子乎曰柳子乞巧誠忿嫉耳終黨王叔文不悟豈抱拙誰愓哉夫潘與柳才之雄文之宗也吾敢窺其藩乎吾惟春誦夏絃三冬文史足用以求鄙志庶㡬不辱而已余勉之曰飬拙莫如讀書書者天地聖賢之心古今人物之鑑也其中有大巧拙存焉天之於衆形匪物物刻而雕之也果巧乎孰尸之果拙乎孰加之聖賢亦然孔孟當春秋戰國轍環天下所如不合拙亦甚矣然而不枉道不從時未始拙也潘桞誠拙乎哉聖賢誠巧乎哉故世所云拙者皆希乎巧者也伯友以是自警則㡬乎道矣是為記存心堂記廣東布政使黄州徐侯驛駐快閣登覧之暇時時為士友用小篆作大書極飛動森嚴可敬扵是郭子善跽曰先人有存心堂以遺後不得紫薇香露揮灑以顔之堂雖構與未構同雖奐猶未奐也布政嘉而與書焉既顔之矣亟請於予曰不得先生記文無以發前人幽光侈布政榮寵堂雖顔復與未顔何異余亦嘉之則復之曰若知爾先人之存心乎其要在扵子孫之昌且蕃耳今子襲箕裘守桑梓楹軒之間嘉花異草清泉美石所以娱玩其耳目色飬扵慈顔者無所不偹可謂昌矣佳児立竹其吾伊者琅鏘梨栗者嬌癡襁褓者姢好可為蕃矣先人以存心遺後者逺而子善不替先人之存心方興而未艾是乃為善之福抑宰物者實相之哉堂雖舊而扁則新不辱夫大人君子之黼黻有如此者雖然扁既新矣而堂之故尤有足書者盖藥市存焉子善之先人元亨甞曰處卑而思利物居約而務廣施獨醫藥為近狄梁公之籠貴賤苛細靡不儲韓康伯之價權豪窮困靡有貳吾將㡬焉積之之乆求善藥者至自旁邑飲良劑者上至王公鼎鼎乎必郭氏焉歸於是存心扵一堂者不獨以遺其後嗣又推以利夫多人此其先徳之美而子善佩服之有加無損焉益知子善之存心即其先人之存心其嗣世之蕃且昌宜哉是以記扵堂中列扵布政篆書下方嗚呼又將八世莫與京乎東陽讀書處記邑庠生劉仲賢從余學易扁其藏修之所曰東陽讀書處而請記以自朂余嘉其志卓則記之曰邑城門東出者扁曰東陽門生讀書城門内故扁書室亦以東陽掲之夫東陽之義稽諸大易最著而扵生之年徳為最似於生之學問為最切也昔者伏羲先天卦位離居東大明之所由生也文王後天卦位震居東萬物之所由出也離居東乃扶桑之旭震居東乃青陽之春故說卦曰帝出乎震又曰震為大塗言品彚之衆林林緫緫下至飛潜動植勾萌甲拆莫不胥此塗出皆青陽之春實鼓動之然萬物既出於震得扶桑之旭以麗之則幽隠者無不燭鬰結者無不伸已發者暢茂欲舒者條達生意勃然莫之能禦矣吾故曰東陽之義扵易最著其不然乎而生英妙之年如東陽謙和之徳如東陽不獨以其居近之也雖然學在是矣東陽者天地温厚之氣所存也扵天徳為元於心徳為仁元者衆善之長仁者五常之君聖門之教惟在扵求仁而已茍能用力於仁由一事以至於事事由事事以該夫全體全夫心之徳即所以全夫天之徳也故顔子之為仁乾道也冉子之為仁坤道也乾道奮發而有為坤道静貞而有守生必從事扵斯尚加朂哉法兩作之離使知無不明法洊雷之震使行無不果擇善而固執之君子之事偹矣尚加朂哉以是記扵讀書處有以日自省焉其必曰古之學者為己雲松山房記給事中羅子實世本長沙人其父㳺仕吉安因占籍焉子實讀書青原山下取太白巢雲松之句扁其讀書之所曰雲松山房洪武十四年以才賢選入京二月授給事中小心謹畏以恭其職夙夜不怠以精其能實稱上㫖九月除蘇州常熟縣丞陛辭以年未登學未優大懼弗堪任以速官謗懇懇具陳上甚嘉之特放還鄉使得卒業子實既獲如志念長沙之宦譜仰廬陵之文獻而益追太白廬山攬結之勝若將終身焉夫五老峯之髙標金芙蓉之秀色千古猶一日太白往矣而其天㳺觀物者猶可想其振衣於千仞之岡也夢寐風采者猶疑見顔色扵屋梁之落月也超然天地之間可以不死豈不表表愈偉哉夫何所獨無雲松雲松何所不可巢然巢之非其人雲松如將凂焉巢之必如太白斯雲松有耀矣子實讀書於山房歛在天之雲歸諸叅天之松日蔵焉修焉以傲乎墳索之樊圃息焉㳺焉以尋夫簞瓢之樂事車服器玩不萌於所思狗馬聲伎不牽於所好澹泊以明志寕静以致逺可也如是則雲固上下而相從松亦茂悦而願交矣雲蔵乎松也松津潤光澤上䕃乎百尺之絲下資乎千嵗之苓君今日之涵飬以之松承乎雲也則雲蓄聚汪渟固将為霖為雨育萬物而漙羣䝉君異日之發施以之然則雲松之巢殆君子窮飬達施之地乎聖上特放還鄉者欲俾子實極其窮之所飬然飬之而充抑豈終窮而已哉尤将大其達之所施子實必慎朂之故余為之記以徵於来日壺隠記仙人有經濟有窮達皆其所自為㳺戱耳出而為天子外臣若張子房陳希夷軰道濟天下而不居其功夫是之謂達隠而為方術技士起人疲癃殘疾而徳不勝計夫是之謂窮窮達雖殊致其為經濟則一皆其所㳺戱也廬陵有隠君子蕭與恭氏慕仙人之窮者也寄興扵藥市别字曰壺隠夫壺公者天上之謫仙人也謫之扵天而隠於一壺謫之於天其来也髙明隠扵一壺其藏也㣲宻收歛其髙明獨天知之發舒其㣲宻則天始露而人或窺其一矣然惟費長房獨能識之世人見之者獨見其壺耳壺之所有天地萬物皆具焉其大無外其小無内放之則六合充周歛之則大千毛髮也攀而即之者長房也玩而樂之者與恭氏也與恭氏美鬚髯如銀雪秀眉宇如紫芝孝友隆乎人紀信義孚於朋友其蓄善藥不貳價不規利賢於宋清其與物慈惠急人之急甚於韓康伯故能與壺公長房神交於物表天㳺扵人間雖不必達而在上而經濟之體用具是矣余往来蕭氏之壺天日乆狂嬉醉賞分壺中風月實多故樂為之記云順信堂記臨川呉君元祐掾韶陽幕有年以才能書最仁恕著聲軍民和豫邉徼寕一充其所立為名公卿不難属余扁其所寓之堂余告之曰君名祐而字亦以之非取諸易乎請名之曰順信之堂昔者大有上九周公繇曰自天祐之吉無不利孔子申之曰天之所助者順也人之所助者信也履信思乎順又以尚賢也然則天人所不能違者順信而已君子自求多祐孰大扵此今夫百川者溪澗之積也其勢順趍其積之盛為江為河萬折而不逆萬支而不窮一波一勺紆徐淪漣不達不止此天下之大順也今夫四時者寒暑之變也變而有常雖一氣一候升降磅礴扵三十八萬七千里之外分至啓閉必循其軌生長收蔵不戾扵物長短盈縮消息往来亘古今如一日故曰信如四時此天下之大信也君子之學思夫順必底扵大順履夫信必成扵大信信之極順之至出處語黙烏有不吉不利者哉元祐善扵其職不阿不激必公必是持於身雅飭以良制夫事詳閑以達可以為順矣謹然諾而必踐樂朋㳺而必敦可以為信矣然而詎止爾哉國家蒐獵崖穴需求才賢矧如君者素席上之珍乎百川達海謂之朝宗四時成嵗允資調爕亦充是順信以施之耳自天之祐孰不其然吾固記斯堂以俟焉禮庭記讀翰林詹公同文為其徒劉禮銘其禮庭盖以君子之學勉之也禮蚤負才諝從事天官者垂四年操几杖以從公殆無虚日故有是銘其省親而况予也復求餘言乃廣其意為之記曰禮以謹節文子聞之熟矣翰林進其學於成余則期諸用之大載稽諸經小而教訓正俗分争辨訟非禮不備不决上而班朝治軍涖官行法非禮威嚴不行幽而禱祠祭祀供給鬼神非禮不誠不荘禮之用復有大扵此者乎子之職階而升焉責而任焉講之不貫習之不狎達之而易窒矣守之弗嚴出之弗端感之而難孚矣尚朂之哉且夫儒耻一物不通而禮三千三百䆒其大不忽其細通其變不戾其常亦曰節文則日謹其所未謹耳子歸而質諸翰林不其然乎蘭桂山房記蕭君孟章顔其隠居曰蘭桂山房取晉熈郡王結幽蘭抜芳桂語也晉熈梁武第二十子賢而文遺落紛華聲利其言曰知止知足澹然無慮北山之北棄絶人世南山之南超踰世網清􅞅盖可想見蕭君名山房以蘭桂殆尚友千古者君服則儒隠則吏時可為即蕭規曺隨吾不溺時不可為即計然陶朱吾不汙洒掃室庭玲瓏軒窓童丱誦絃朋徒觴詠挹青原之朝爽冩螺子之夕清亦非必絶人間踰世網固已澹然忘慮知止與足矣夫蘭有國香服媚于人桂性馨烈卉木所忌滋之九畹楚之三閭所好修也樹之小山漢淮南所招隠也孟章慕晉熈不徒結之援之而又滋之樹之嗚呼賢矣哉余髮雖種種尚能相從山之南北乃為之記且長歌之歌曰有美一人兮盤之阿傲世態而睥睨兮其嘅也歌襲芬芳以永齡兮抱堅貞恒不磨山海祲而霧潦毒兮夫孰能浮湛以媕娿蘭申申兮桂娑娑天潢肆其清潤兮卿雲被其光華彼椒佞與荃茅兮孰為少多結佩纕而援觴酌兮其如子何嗚呼静與晦而俱寂兮動與陽而同波順時㡬樂夫天命兮其如子何雪篷記士君子托物自况以名其齋而交㳺尊其徳亦因以為别字其来尚矣托者興也凡有形色性情無逺近鉅細樸野華麗皆足以寄興得其神不必泥其實㑹諸心可以忘乎言至使不識其人者猶想像而慕藺焉斯不亦美乎今陕州知州事聞人侯彦芳佐太和時飾所寓東偏斗室堊以塗其壁而蘧以帟其上因扁曰雪篷盖蔵修之所托以寄興者侯與僕㑹金陵時與僕曰雪篷需子為記僕敬諾焉于時侯奉命赴汴京僕亦次第還鄉始得坐雪篷齋中乃記之曰篷盖舟所藉以庇覆其所載者賢才亦國家所藉以庇覆其赤子也篷之上惟雪焉至清至白可以瑞稼穡去螟蟊且篷戴雪又勝重也篷譬則侯之一身而雪其徳歟士君子以身許國不能表裏澂徹潤澤枯槁凛烈自持則不能以任大事果其徳充耶小之簿書期㑹大之禮樂軍旅外之刺史守宰内之元勲碩輔無不優有餘智顯有成績譬篷之扵舟穿溝港出陂􅆜蹙灘石鼓濤瀾然後平臨大江迅達黄河而人與物俱䝉其䕃不病厥載也不然夏暑雨驕陽冬祁寒烈風舟非篷頃刻不能居與行也或曰侯嘗駕雪篷轉輸於㐮陽今兹艤雪篷布政於河南篷亦勞止矣噫是求雪扵太隂之庭求篷於氷夷之都也名齋之意殆不其然書曰若濟大川用汝作舟楫𫝊説為商哲輔佐興令業豈嘗屢濟川而病其舟楫也耶學村記友人易君别字學村蘄記扵海桑子子嘉焉或曰是矯也君豈甞能村乎村貴真不學而能昔王建張籍同時同以樂府著聲評籍者曰其不及王建者村不盡也謂其不皆自然未極扵真耳村固易學哉予曰不然傳曰蛾子時術之志曰人皆作之作之不已乃造自然范蠡平呉變姓名鴟夷子皮始學賈嚴光避漢披羊裘大澤中始學漁梅福上書歸隠呉市門始學卒郭解晚而折節始學儉非不學而能也朝野之相形即野名村士農之相訾即農名村而堯時咨治扵在野周時烝髦士扵我農后世目咲為村者在唐虞成周不爾也不當學乎世益降澆益滋鄙先進曰野人髙後進曰君子文之敝也乆矣夫子從先進禮樂夫固野哉學之固可議乎易君學村學之誠是也彼不學而能者野人不辨菽麥寒暑者之為耳野人之所為村非君子之村也如吾所云唐虞成周時君子者之村也雖然又有下流之村焉凡流俗人所尊崇慕倣者皆是也而易君無也君去榮就晦學村宜無不侶吾懼其淪野人之村欲納諸君子故樂告以斯言君曰吾既甘守環堵浮湛閭里臺笠緇撮賢於切雲之峩峩縞衣綦巾侈扵象服之委委調笑乎蜡賔之儀崛彊乎樵夫之拜田子方貧賤之驕固多陶徵君桑麻之趣不少也若是何如予曰其然乎㡬㡬於達乎村乎孰過是乎書以掲諸座右凝霞樓記鷺渚之西螺山之隂有樓巋然扁曰凝霞者郭君思誠所築也曷為築之將以極髙明覧髙山樂賔友也曷為以霞命之神觀澄朗心宇明達晉人盖云軒軒如朝霞舉也落成之日徵予記焉遂記之曰夫室居之華因人而華人品能超由天賦故超君金相温潔玉立姢妍自為成童從其先大夫萬户侯出入弓刀裘馬間意氣横逸及周旋達官名卿雍容禮法雖王謝家児猶病其或踈弱冠應門世變轇轕善應能定履險若夷致大夫遂懸車之志髙門絶鳥䑕之驚可謂令器者矣斯樓光華詎非以其人哉集斯樓也翫斯霞也寒暑候易而錦綺恒張圖畫不施而生色無晦雨晴殊致而翬飛不移春華披而騰映夏隂結而透明絢煥汎金莖之清飛陽麗𤣥冥之黯赤城之標九屛之疊羅立宇外文爛之縠晴沙之金閃爍眉睫皆與斯樓相暎發焉君伯仲間如圭如璋如塤如箎勝時嘉集憑髙眺逺樂化國之無虞念先人之敷遺納江山於俎豆冩風月扵弦匏其福未有艾也古人喻人品况其髙為孤雲野鶴况其英為瑶林瓊樹况其重為金鐘大鏞况其朗為光風霽月然則况以霞其翩翩濁世之佳公子乎思誠有之似之吾固樂而記之南康縣復秀公㙜記秀公臺者南康貳令吴公徳基父所復也曷為而復之從民志也古者大都小邑胥由卜定然山川形勢風氣之聚若舟瑶以陟巘降原升墟而望楚與京類可徵已南康其壮哉縣乎覽厥治所中髙四隤若𤣥武狀堂後西偏隆然特起成墩又若其曵尾然因墩以為䑓而臺自宋丞相秀公以陳旭升之景祐間以校書郎出宰民徳之不忘遂取其謚名焉臺非徒勝槩是都抑形勢攸繫哉洪武二年著令中外諸府寺並環築公舍長貳史胥族處繚以髙墉固以緫門縦廣崇庳㒺或超度縣尅日攻位適䑓直少府聽事遂夷之􅄗前豫樟十數圍寺門古桕一株無烈風迅雷同日應聲自拔衆駭愕然業已建不可渝已三年秋縣老若士并力一辭懇告貳令自臺之夷狺獷胥慶縣既卑矣㒺可畏忌訐誣蝟興赤子焉所芘寧縣官獨憂耶且縣有故易此必戾木有知而既告之矣明公幸復之哉若曰豈其然乎吾達子之志亦大有理乃遷少府聽浚池之塞隆臺之平民歡趍功不日而復崇加其舊又出俸錢買亭卓而覆之用慰悦民情抑以時觀㳺節勞佚禮賔客焉僕適道廣省校文還君引坐臺上觴酌無次指南山曰滃然翠浮爽然氣蒸非南中所可儗又指北山曰此九日嶺亦因丞相名而命之前宜𤣥武首起新亭扁曰夀龜池左右嘉木扶踈清風徐飄翛翛冷毛髪四序迭乎前萬景赴其下䑓奄而有之不尚可記乎僕曰然此一役也有規有頌古不容輕廢規也復古之舊嘉與民同休頌也匪鑱金石莫惠乆逺吾見公盛徳美政與秀公遺愛欽于世世矣虚白記海桑子歸自羅浮抵上清宫息焉二子者方論道其一崇虚其一尚白咲于列者曰聖人崇誠而子崇虛君子尚𤣥而子尚白得無戾乎夫虚而不白巖洞是也白而不虚玉石是也子各一焉而可乎二子爽然自失請業起拜咲者曰此非吾所能子往質諸江先生二子往焉先生曰吾不知也吾聞諸漆園傲吏傲吏聞諸七聖七聖聞諸天向子所聞無一可也今夫日月者司視之官不煜扵晝則天者盲不煜於夜則地者㝠嘗試有一物梗其中一塵滓其外哉今夫水洞鑒毛髪泓泓渟渟不測不極實之泥沙土石壅其行㳺其泠豈其天邪今夫鑑之空也的的兮空青之剖而金莖之凍也熒熒兮珠斗之芒而頗黎之浸也剗隆平䨟磨垢刮翳而虚之體始全虚體全而静照出焉日月水鏡其形其質虛室也日月水鏡各一其照生白也其扵人也亦然肖天地之員方具日月之精華萬物萬象吾百骸也江河百川吾九竅也所以成吾體者皆實也所以主乎吾體者皆虛也虛所宜虚而勿實所不當實其光明也孰禦是故耳虚則生白而聽聰目虚則生白而視明彼實其所當虚者榛蕪髙扵靈臺糞壌瘞其丹府靣墻而已耳屋漏而已耳楊子云自以為𤣥可也烏乎白哉二子躍然起洒然悟願卒為弟子因祈海桑子叙之以為先生夀先生字中吉積書盈車律己以法學超詣徳粹謙海桑子廬陵陳謨也悔閒軒記里士蕭執求得國子先生景濓宋公篆書悔閒軒三大字以遺蕭日宣氏日宣掲之觀者嘆賞有李陽氷之風咸詠歌焉属予為之叙嗚呼日宣能守先人闔閭於城郭兵燹之中良不易得而得此篆書張皇於軒楹俯仰間尤不易得也他人華構髙堂寧有是耶吾聞諸老子云知足不辱知止不殆方代更時戎馬被郊豺狼在邑國家用重典䋲之日宣故名法家嘗事邑之賢大夫長義兵皆以才聞年埀知命獨能知四十九年之非自悔自閒儕軰皆咲其怯因鄙之目為村則咲曰吾不村也遂以不村自命而以悔閒名軒殆所謂知止知足者與學名法知名法之隠禍優㳺自樂且十餘年殆所謂不辱不殆者歟人患溺而不悔斯有苦無閒鳥不悔扵髙飛而悔於網羅魚不悔扵深入而悔扵釣餌名者誘人之網羅也利者忘身之釣餌也易曰無咎者善補過也又曰震無咎者存乎悔悔之於人大矣能悔則能動其補過之心斯為無咎之民又豈特閒而已哉然則翫斯篆也讀斯文也凢升君堂者有不悠然動扵中乎南軒記夫君子所以敷遺其後人者無所不至也而居室為重後人之所以保守者亦無所不至也而不失其基構為難能不失其基構則能廣先業矣崇禮曽氏自乃祖乃父世有積慶號稱名家所居據白下之東清平山之右得地之勝矣而當前朝盛時豐亨豫大民安物阜有樓觀之髙明園池之映帶衣冠時集俎豆常陳其樂盖無涯也運往代更華屋丘墟蛙啼他沼燕失舊栖所餘者芳草而已耳青天而已耳崇禮適丁是時辛勤拮据次第規復雖未還舊觀而已復南軒扵是以南軒請記焉南軒者其先君子所扁也崇禮因其地不易其位新其搆不改其度掲其扁如見其親而又蒔花木以偹㳺衍之觀畜圗畫以供舒巻之娱具弦匏以悦嬉賞之情廣舍舘以資往来之適無不宛然舊觀藹然新致者扵以見前人之所敷遺者忠厚之澤愈逺而不冺後人之所保者勤儉之積日益而月増豈偶然之故哉扵是廣東布政使黄州徐公道經快閣登覧吟咏之暇復揮洒篆書有騰蛟起鳯之勢而崇禮所親為公請書南軒二大字公欣然援筆為書崇禮装潢掲之而余則記扵下方嗟乎崇禮仰而瞻夫布政之特書俯而思夫先人之遺教其扵立身行已出入起居有不油油然自得兢兢然深省者乎鳯首記余觀曽子元記鳯首何其異邪云河南王文獻得之慶逺安撫司掾劉明善所始至正癸巳峒氓以獻於莫安撫莫怒氓不生致鳯而徒貢首擲於地犬啣以往劉奪扵犬口以歸又蹤跡峒氓問故氓曰天河縣大王村山中樵童見百禽喧啾如織以石擊之隨斃得禽甚冨扵是一村盡往每擊每獲終不散隨有禽補立獲處衆恠其異取毒矢盡驅衆禽則見中有二禽髙可丈餘五色奪目射之斃其一其一冲舉而去衆禽盖隨之其立處鳥羽覆地廣一丈厚可二尺如茵藉狀烹其肉食之甚香意山多竹殆是鳯邪故珍其首以獻然劉雖得實終不敢真以為鳳後以示南安監郡呼哩木呼哩木駭曰此鳳首也往仕于朝外國来獻大類是見蔵秘府但差小爾王既從劉得之常函以自隨子元見時頂與咮尚㣲紅頂后數羽文彩尚燦爛可觀殆誠鳯矣余因記数年前有五色大鳥從以禽數百集太和州西豫章上東西無常衆族觀聚駭無敢彈射一二日徑去不知所之嘗疑豈鳯當亂世而出邪今得所記足證為鳯不誣然其出必待聖人在乎位且不免弓繳之傷又何取其為鳯也將世大亂賢者厄運而鳯亦爾歟嗚呼西狩獲麟而夫子反袂拭面稱吾道窮有以也夫菊潭記按風俗通南陽酈縣甘谷中潭水甚甘潭上山多大菊故潭以菊名而谷中居民飲菊水者多夀上夀百三十中夀一百下者七十八十焉夫菊金行之英啓秀於揺落之後故騷人飡之而薦以木蘭墜露所使雪澡滓穢通逹神明歛華腴於百體道貞元於本初也甘谷之民僻在寥閴嗜欲既淺天機自深其致康強宜也金精王侯以菊潭自况其友趙仲敬求為記之既辭弗獲則告之曰金精之山仙聖所都其靈卉異葩皆足以為長生之資十倍於甘谷然而王侯不改其初服者誠以菊抱幽人之標堅晚彫之操非瑶林瓊柯蘭芽芝葉所可倫儗也王侯飲潭水不徒夀其身將以夀其民不徒夀其民将以夀其國盖夀其身而外天下國家者絶人逃世者之所長而非君子之所務也且人情莫不欲安欲富欲佚欲夀為之父母者不能節其力而貧之不能扶其困而危之不能時其使而勞之則必夭傷其天年矣烏乎夀乎民者國之大命也民心既揺國本難固烏乎夀乎今王侯以菊夀金精之民何如哉其飲徳者詎一二而止傳曰不有君子其能國乎詩曰樂只君子遐不黄耉侯尚勉乎哉又何羡扵南陽之人邪澄懐堂記記曰張而不弛文武不能也弛而不張文武不為也一張一弛文武之道也夫君子之學有藏修必有息㳺故有張無弛雖文武不能者言不可無也然一扵弛而不張則或蕩而無守茫洋忘歸故文武不為者言不可有也是以洙泗之教必自志道㩀徳依仁大本既立然後能㳺扵藝焉能㳺於藝斯一張一弛文武之道偹矣太守常公方壺名其燕處之堂曰澄懐之堂而堂之所有則師㐮之琴軒轅氏之律吕三代秦漢盤匜彛鼎金石遺文晉唐以来法書名畫耳山海之珍蔑如也公之所以澄其懐者乃其所以㳺於藝歟士大夫鍾竒藴智秀出等夷天豈徒然生之哉窮之飬飬之充豈無所施哉有一日民社之責一日致其憂有世道無涯之感無涯以為戚其懐抱宜何如邪公雖在田野一飯不忘君猶在朝也賀蘭之山瀛海之州焄蒿悽愴之心常著存也烏得不時一澄其懐乎嘗試升公堂鄴侯牙籖夜光明月錯落其間唐閻立本宋李營丘諸賢圗冩粉墨蕭瑟氣韻飛動一舒巻卧㳺千里一咫何如其快邪晉王右軍破𦍑帖真蹟米南宫所題誌寳惜者周唐人冷金硬黄時一臨摹又何適邪或乃酒家南董来商古今較治亂如戰如訟命桑紵翁與之解圍猶然罷去而南海之香尉巴卬之橘叟輞川之摩詰浣花之少陵亦時時追隨几杖若公者真無懐葛天氏之民歟是豈有豪傑芥蔕以滓穢其太清哉昔人美衛武公有曰寛兮綽兮善戱謔兮寛綽無歛束之意戱謔非莊厲之時而道存焉武公盖善扵澄懐者宜其年八九十而徳彌邵也夫武公之學即文武之道而常侯所勉焉者也余故始終叙次以為記且以自勵云後隠記唐之季錢鏐有羅隠字昭諫者累舉不第事呉越王鏐為給事有詩名讀其曲江春感知其骯髒一世不可覊紲然卒以是窮韶陽羅徳存仲素先生嫡系先生三世曰海者為韶校官郡志學碑具可考徳存距海六世家學本仲素風致慕昭諫别字後隠言後於隠也數介予記且曰曲江義學生徒嘗數十吾不擇薄厚教之如一有弗克行十脡脩而成而去者多亂来廢義學即㕓區為家塾教亦如之兹所以為後隠先生不與記将無知者僕曰子先賢之世也冝以道徳尊嚴貴冨賤貧勿論昔仲素問道扵河南以授延平再傳扵建安端緒明白子嘗言仲素有遺書散失不存最可恨然其存者茍能真履實踐以淑韶人將商者去商吏者去吏頑鄙者革善良者薫而况韶有張余侯麥文武忠孝遺烈固凛然哉子毋以昭諫之不遇坎坷嘗戚戚扵世道昭諫隠而名垂子後隠而教行其鄉不尚賢乎哉厥今昭運褰開義學興有日為國育才子亦逺有耀焉實林記造化之運不消則無息不屈則無伸伸者息之積屈者消之萌日屈扵夜而伸於晝月消於望而息於朔四時以冬為夜萬物以春為晨不消亦無息缾水是也不屈亦無伸崖石是也君子之道詎爾耳哉曲江令謝彦剛别字實林盖陶元翁盧起先趙子威諸公命之相期逺且大者取諸姓以立義以為不謝則不實包括宏深願望篤厚今夫百卉千葩各天其天各一其元亨利貞榮扵朝必歛扵夕歛於夏必榮於春萬寳告成於秋而復有花焉者盖以秋為春也萬木歸根於冬而又有花焉者盖以冬為春也一榮一歛一謝一實榮者其伸歛者其屈謝者其消實者其息也故元生而亨長利向於實而貞乃實之成實成斯可復為種而生生無窮焉陶元翁觀物於物外趙子威輩識盈虚於萬變是時彦剛英鋭之年卓犖之器金玉之相杞梓之章故期之以實者將欲歛其華也彦剛以才選試用皆大藩大府或氷霜栗烈或煙雲清潤或日星炳輝其榮其歛其謝其實凡㡬矣金百煉而成剛水萬折而必達最后由兩府出尹新建再調曲江得百里之地而弛張翕闢之惠化流豈弟令聞暢逺邇公庭之暇考古今發嘯咏有益扵身心甚大謝扵彼而實於此一何盛歟雖然百卉千葩莫不有實獨梅實為鼎鼐之用以其調和􅅅比諸爕理隂陽也嗚呼君之實詎止形於曲江邪盖跂予望之予是以記之君姑孰人郡之山曰青山山有謝公池齊𤣥暉隠處也盖君始祖云蔗境記瀛海之間齊州之内有佳境焉其地曠而平無堆阜崖岸沮洳之險其民樸而茂無詭怪城郭刻薄之為其四時之氣淑以清無震凌凄惨炎歊之毒其俗禮譲而無争其耕桑畜牧蕃植猥大而無蟊賊瘯蠡其花卉常春其烟雲風月常妍媚其魚鳥忘形常近人不驚也古今名人韻士無論隠顯貴富賤貧茍有志者皆能入乎其境伊吕以耕釣入焉夷齊以采薇入焉寗戚叩角而来㳺顔子簞瓢而徑造曹參清净以常居汲黯卧治而獨往若此甚衆董生以下帷劉伶以酒徳建安七子以詩竹林五君以逸而顧愷之以飡蔗入焉晉史稱愷之癡絶為桓温叅軍多才逸氣每食甘蔗恒自尾至本人或怪之云漸入佳境盖由澹而入也諸葛武侯曰非澹泊無以明志愷之殆得之夫蔗本天下之至甘愷之目為佳境信矣然興也寓也豈誠㫖於物耶誠癡耶推其志殆吾前所云云者良是其心固泊然與神明居蔗尾云乎哉同愷之著姓千載之下為吾太和賢太守光逺自號蔗境翁僕不及拜風采然令徳令望得諸曲江令謝彦剛為多實豈弟父母及韶太守堅白徐公上官僕拜焉語僕曰顧太守在疚甚為太和民物致其憾僕第太息下州寡徳如此哉既而朝廷強以墨縗起視事於是徐太守及叅軍王簡夫而次相與歌詠蔗境以為好咸羡公之才之志所立卓卓如是即一動静一服食一出處皆佳境所在夫志於愷之是亦愷之而已矣予遂為之記嗟乎公尚能一味之甘分之否乎桞溪漁隠記白下之西桞溪之上有隠君子曰楊子良氏託扵漁以自隠焉扵是毗陵池海𤣥為圗之同里海桑道人為記之曰古今之漁皆寓也昔太公漁扵周一漁而得玉璜子陵漁於漢一漁而得客星玉璜以佐文王造宗周客星以相光武表一代名節其為漁隠也大矣然其初皆寓於隠也寓於隠而不滯於隠斯達士之髙致而庸衆人所望洋而歎恍然以驚者也今子良氏之漁將取玉璜乎鼎彛旗常之勳非大賢名世者孰能為將取客星乎絶人逃世之事又君子中道者不屑為子良氏之漁直漁於江湖之崖渤海之島耳直漁於風月山川以相賔主蛟龍罔象以相娱戱耳賀知章之酒船日相往還陸龜䝉之筆床釣具無不自隨張志和之青篛緑蓑桓圭衮裳不與易也此真隠也雖有玉璜數十事曽不足以勞眉睫而申申焉屈伸脚於篷底客星亦終古安敢動耶是故五嶺之南一漁両淮之間亦一漁也北平盧溝之上又一漁也将無所不漁何漁非樂題曰桞溪漁隠夫孰謂不然海桑集巻七
