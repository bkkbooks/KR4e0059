body:
  text: 海桑集巻九明陳謨撰題䟦書唐令公鍾紹京讀書巖圖邑庠生丘子萬命工寫唐中書令讀書巖成圖其友為作詩且求余志之詩不云乎髙山仰止景行行止平川之所仰而行之者孰如令公之賢乎巖在邑東二十里前有石截焉而中分上有飛泉百尺下埀如練小舟縈石甚險兩旁壁立不可徑水流石罅間若玉繩焉舍舟躋石磴百餘級度畧彴僅容足乃至巖中寛可坐數十人靣一峯竒峭如筍竒松異果交其上一石如覆舫倚其傍巖水由靈湖來有巨鯉帶銅環相傳令公所養或禱致雲雨焉嗟乎巖之景趣今古不變逰者觀者孰無髙山景行之懷夫令公大賢也名臣也功在社稷名勒鼎彝唐之所以爵賞恩數極矣公之所以敷遺後人逺矣雖在睿宗時不為薛稷所知在𤣥宗時不為姚崇所喜或由工部尚書刺史彭州或由太子詹事刺史果州瑕瑜不相掩益足為白玉之美而嵩髙之難處賢者之責備亦不容辭矣嗟乎今人其難哉觀是圖者思其所學思其所立而思其所蔽斯可也矣因子萬初度日出此故志此使藏之䟦廖自强名二孫說君子之名其子也必有記焉以寓其無窮之意若稽於古自左氏傳子同之命無以加矣尚論其極至雖一言隠約而終身係之則未有如老泉之名二子者逆知長公天下不可無此人而懼其不外飾逆知少公得禍必輕而能免皆騐於數十年之後嗚呼知子莫若父殆不可改也廖先生名其二孫其一曰龍而字潜仲其二曰鸞而字停仲誠知夫龍之必潜鸞之必停也先生命其孫如此其所望者深矣然龍之潜豈終潜哉淵泉而天飛鸞之停豈一於停有不覽德輝而下之㢤繼今以往潜者升而停者奮則先生命名之初意與老泉殆不相倍也余老矣心乎愛矣跂余望之書子昻墨蹟憲史楊敬宗示余子昻延祐五年所書坡公煙江疊嶂圖詩逮今洪武己未六十一年絹素雖舊墨蹟如新風流醖藉沉著頓挫甚可寳愛抑公所題乃王晉卿畫而王定國所藏也今不復可見但詠坡公之詩則有聲之畫皆在目前翫松雪之書則銀鈎鐵畫復與詩而争光雖晉卿圖畫何以加此嗟嘆之餘敬題其末䟦昻霄妻唐伯貞哀辭後項君昻霄况予寂寞之濵令其子拜且曰斯子也當龍泉亂時其母抱以投江為左右奪去今長矣傷㢤其母之貞且烈也將無知者焉余因得詳問而悉之既而又遍以告諸士友辭㫖凄婉凡能為古文者皆為文若詞以寫其悲以傳諸方來而有為棄人之論者則曰亂離來四五年若此衆矣寧獨昻霄妻伯貞氏母女為貞烈獨可表哉余曰不然死等耳然死而可名烈者焉盖不多見夫死兵戈死盗賊死水火或盡室死或全艦死或暮夜倉卒死或穴窟摧䧟死或飢凍流離頓踣死死等耳最悲憐尤獨婦人免被汙辱以求生而卒死者呼天觸地而不得其死者失其身而追悔以死者死亦等耳若此甚衆彼其初心豈嘗一願死哉雖死什什百百可得名烈乎今伯貞氏不然禍變起縣城而已盡室在舟迺逆計將及與其母分自引决且併欲勿辱其弱子至亂少紓項氏有盡室以舟免者而伯貞與母已矣獨其子以奪僅存嗚呼伯貞其死傷烈耶使其不傷烈雖至今奉白頭母撫綵衣児無恙或未可知也然一或不幸亦未可知也語有之慷慨殺身者易從容就義者難伯貞可為從容就義者矣彼什什百百死相望者尚不得為慷慨殺身安敢望伯貞聲景乎今之時某婦以汙辱死某女以兵燼死而其夫若子百喙以號於人曰是不屈死也是先事死也然卒無騐人亦莫之然聞言者苐掩口胡盧耳又有女若婦贖而歸者其欲誣人尤甚嗚呼人亦焉可誣哉顧獨深詬伯貞氏是倡家而譏周人大昏之禮也伯貞姓唐氏父仲文為廬陵丞㢘公有威遺愛至今伯貞偃蹇不輕許嫁有年得門地才望如昻霄迺許其婦德母儀睦婣範族具如陳公甫氏楊公平氏哀辭所述余獨為棄人之論而辨其獨不然者書而繫諸哀辭後以歸項氏藏之書鍾實可墓誌後儒與醫同軌而異戸醫特儒之一技耳恥一物不通者儒也達人身天地五行者醫也然而各造其極厥難其人焉長沙太守張機抉内外經秘要為論欲人易曉今儒流讀且不能句矧醫流哉故儒不精則醫不神余讀翰林王公相為處士鍾君實可志銘又讀潯陽張羽撰實可哀詞摸寫其人如生不獨能儒而醫又能奮儒者之勇以除鄉隣暴客行儒者之仁以拯鄉隣飢溺此其用心皆儒也其庶矣乎王公之志稱其潜心於醫益造乎㣲遇疾不以貧富與成藥不責其償大疾疫則躬視而治療之貧者併遺之薪米此龎安常之所以為仁也張君哀辭稱其尚義賤利茹强躋弱忘生捐軀急人之憂衆圜我觚樂於齟齬此漢士之所以為俠也凡若此者夫豈尋常庸醫師所及哉吾故曰其用心皆儒也因王君子與以二文見示故書其後如此云書文丞相燕南感興集杜四絶句後劉君子髙為北平副使得文丞相集杜四絕句以歸筆勢飛動與蛟龍薄日月伏光景者争雄可為希世之寳子髙已矣其子士鴻出以示余且求為志之嗚呼丞相自祥興元年十一月被執于潮之五坡嶺二年崖山破宋亡張𢎞範䕶送丞相赴燕京博囉與語不屈遂囚之月餘再見之益不屈乃釋使自便留燕三年坐卧一小樓足不履地世祖皇帝百計欲顯用之苐乞死而已最後以閩僧上言土星犯帝坐中山狂人自稱宋主欲倡亂嫌疑之間始賜之死丞相臨刑謂吏卒曰吾事畢矣南靣拜而死年四十七數日其妻歐陽夫人收其屍靣如生當其三年不下樓從容自得天性澹然其集杜句盈帙神動天放非鍾儀可儗一皆耿耿精忠溢於言外其流落毫芒者固自有神物䕶持之吾友聞子髙在北平鼎建丞相廟此為萬世人心世道計也北平之人口而祝之飲食必祭水旱疾疫必禱是則宋祚既窮元祚亦往而丞相之福乃與天地相終始不其偉歟謹志于集句後士鴻其世永保之書靜安劉氏族譜後沙溪靜安劉君與余盖數十年之交自至正之季淮蔡倡亂余嘗以沙溪為桃源託以避者數年無恙無何逰兵四出沙溪不支余又走興國為桃源迺桃源復不在興國於是以聘入韶州焉與靜安䟽闊盖久矣暨余旅韶歸復與靜安相見相勞苦外且審靜安巋然如魯靈光之獨存復能保障其鄉鄰屹然如中流砥柱嗚呼賢矣哉暇日以其手編族譜示余曰疇昔避亂出走懼斯譜之不保也爰取塹以累墻而以譜置諸塹内及事定來歸毁墻碎塹以求之幸而得存然破爛剥蝕則命館人補完而詳勘之又命改書而齊慗之於是十五世之源委備録於今而可傳於後志亦悲矣先生忍能不為之述其槩耶余閱譜自一世九承事為君始祖十世司閣為君髙祖十二世梅軒為君顯祖十三世榮為君顯考皆隠德弗耀而有光於承事者也嗚呼劉氏之顯近而論之則更生天禄藜光精忠耿耿當為稱首而厯代聞人表表史傳亦何可勝數為其族子族孫者可不自勵㢤此余所深望於靜安者也抑余與靜安賢姪百川氏有筆墨之好有骨肉之情而百川髙蹈物表不與世事接者十餘年殆仙也敬叙兹譜幸以示百川焉䟦賜楊棟以下御札宋理宗皇帝景定三年壬戌二月特詔禮部尚書楊棟等知貢舉事盖穆陵試士於春官自寳慶二年以始至是凡十有二詔而終得人之盛有足論者雖然由景定壬戌至祥興己卯為至元十六年而宋祚終訖至正戊申凡八十九年而元祚亦終入本朝洪武十三年前後通百二十年矣尚書諸孫子初藏景定御筆如新足稱傳世之寶併與尚書謝表及帝錫燕進士詩及狀元方山京陳宜中張槐應謝表具存副墨當時文物盛致槩可想見彷彿微子初不及此嗚呼帝自即位黜王安石而尊崇濓洛表章朱吕使後世知理學足以復古帝王之治甚盛心也故此詔不許勦句斷章以命題牽合破碎以害理與夫言理不切乎事論事不根於理皆必無之大哉王言誠足以正人心變士習示萬世之法程也抑是科得人陳宜中最顯不十餘年遂登樞密及德祐元年遂與留夢炎俱相並兼樞使都督諸路軍馬兼資文武榮莫加焉第與文天祥不合數沮忌之耳是時當至元十三年國事已去始則附賈終則擠之二年元兵去都城三十里則棄位夜遁又奉景炎帝入海則如占城起兵不返遂死於暹嗚呼不亦羞科目而負國寵也哉必若忠塞天地光照日月其惟文丞相乎亦帝丙辰狀元也帝十一詔得文公且為宋三百年科目國體之重謂非帝尊正學而得正人不可也嗚呼盛矣書養䝉劉先生墓志後北平副使劉君子髙志其從父養䝉先生之墓自㓜至老出處風槩備悉其苦節堅志甘澹泊如飴處貧素如裕盖其天性則然而學問之力足以行之殆逸民而獨行者歟志稱其嘗以易經一試有司弗合過東湖拜徐孺子祠而歸即掃除科舉習以經學教授鄉里髙山仰止景行行止為何如耶昔湏溪先生記孺子亭有曰孺子東湖之孔明也實千古名言由今論之殆躬稼南陽之孔明歟方其隠南陽也有桑八百株蠶而衣雖百口無寒有田十五頃耕而食豈止一家無飢詩曰彼君子兮不素餐兮盖不稼不可得禾不狩不可得貆孺子非其力不食其心盖出此也先生築書樓曰勿髙大令子孫可葺也人以輿馬相候曰吾安於徒歩何有貴習也人有談仕進氣燄者輙掩耳曰無汙我也此其去東湖孔明豈逺乎㢤先正曰孺子東湖之孔明余則曰養䝉西昌之孺子惜子髙死莫可吾言姑志于墓銘後以歸其令子䕫藏之書劉子卿詩藁歐鄉代有聞人今年識劉徐子卿年甚富氣甚張學甚劬而尤善工詩間適其館几上太白集也自言於詩人酷慕是家余惟詩各一悟解各從其天分審慕是也即天分已近充以問學斯成名家朱子嘗言太白詩非無法度乃從容於法度之中聖於詩者也慕之者徒狂嬉怒攫顛倒叅差無天分固不可無學力尤未易郭功甫尚未自然矧李赤軰哉為太白有道涵養以昌其氣髙明以廣其識汗漫以致其約脫畧以通其神夫然故其論超然其趣淵然其韻飄然縱不踖其奥亦不辱其門魯人善學柳下惠是矣嘗觀廬山夾秀堂帖刻太白稿數葉其竄改處一字屢易者甚不茍至天若不愛酒一章則全改定宜其精絶掩出今古非率意肆口所作也益見朱子之言信哉讀子卿擬古樂府數篇風氣日上咄咄逼人盖太白髙古逼漢魏而子卿擬之好之異時奏黄鐘而破瓦釡斥翡翠而掣鯨魚非子卿而何吾故書所聞以致願望子卿幸自愛也書王伯允詩藁伯允茂才以其録稿介余評之余吟多率且日就退茂才殆將起予者乎輙以鄙見間評一二而復之曰學詩必自擬古始雖李杜亦然擬之而不近未也擬之而甚近亦未也初若甚近則㡬矣其終也甚不近而實無不近則神矣茂才負銳氣不可第二出一語不肯尋常録稿中選體唐律思致清聲調熟三婦詞蠶婦吟兩漁歌等效張籍王建得其風骨極可諷詠樂府自尊酒行至闗山月諸篇足稱擬古者乃若諸七言長歌氣猛語激憤嫉多而雍容少畧收歛涵蓄則尤為佳也茂才由此其軌廣學以大之精識以超之何患乎不成也哉起余既多因書以志巻末書謝子良詩軸後右諸賢題詩一軸為淘金驛令謝君子良賦也子良鍾清江碧嶂之英覽青原白下之勝所交行人過使非名卿鉅公則智勇禦侮之才能識時練事之俊傑也無簿書之繫供億之勞而有從容暇豫之適恒有益於身心而恒不得怨於上下在百司獨驛令最優故子良自况為清隠信哉客至談笑觴咏鷗鷺風月無時不在水木清華幽思入㣲又得蔡君謨法書酷意臨摹揮染大字終日忘倦可謂知所重矣驛令云乎㢤諸賢賦詠咸美子良質厚而文深近求而逺到僕以為知言不贅賦獨題其後云䟦梁仲文昔逰行巻仲文以公瑾英發之年將北逰燕趙之都則以國歩多艱而阻及王氣在南馮唐易老又不得與江左夷吾並驅徒感今懷昔時時記憶往者名公贈言長吟朗詠以自慰而已雖然逰以心不以跡以跡者窮年而不周未老而已倦以心者古人觀畫卧逰千里一咫是也豈特觀畫為然地志山經之所載稗官野史之所出山河皆可目睹形勢皆可意㑹第一舒巻而得之此亦卧逰也雖老而徤行風為輪而蓬為蹄矣即漆園吏天逰何逺仲文尚儀圖之書蕭執所藏名公詩文巻後國録蕭執集其在成均時所得文苑諸賢詩文下至數字手筆亦不敢廢類而成軸既藏以自矜耀亦時出示朋徒誇詡之可以為好學尚德之士矣古之君子或聞名不識靣則夢寐之間如或見之或不得及門受業則私淑於其徒若此甚衆子適幸同時有所尊者焉有所狎者焉有宜友者焉有宜師者焉一展軸槩得其韻度如聆其謦欬視彼私淑與夢寐不尚優哉若其中禄命辨則宋公景濓先生以示劉仲脩者也先生以碩學古道為一代文宗㒒毎得其文晝夜而讀之又嘗辱先生温接懷不能釋古人云心摹手追此人而已又云粲然繁星麗天人所敬者五行而已其先生之謂乎昔嘗謂信國公文山集見其前後兩為白鶴山人序其論禄命正如此以為以有窮之數係無窮之命一日之分為時十二一時之分為刻八生人之品止有九十六舉天下意之一日之生同時刻者貧富貴賤夀夭賢愚何啻億萬不齊豈局局於九十六品者乎積日而月而年其數皆可計也其騐皆可同乎猶恨白鶴山人不得宋公之辨而讀之豈小補哉豈小補哉䟦蕭夀椿菊隠說後余既為蕭夀椿書此說又求識其後夫淵明之愛菊無間於幽顯觀其自癸巳為州祭酒乙未距庚子為鎮軍叅軍乙巳為彭澤令在官八十餘日自免去職始終官途纔十三年爾顯之日豈多於隠之年哉性極冲澹有大志官居何啻野處悠悠然萬物之表慕榮啟期之能貧田子泰之能俠揚子雲之能酒而尤慕諸葛亮王佐之才惜無其時耳視州縣勞人直何足道斯誠真隠也已故周子云菊花之隠逸者也又云菊之愛陶後鮮有聞殆謂菊抱幽人之姿惟陶有之似之故深愛之非陶而愛者宜亦衆矣苐不知菊視之如陶否乎夀椿讀其宗丈之文宜以真隠為尚可也䟦毳馬圖後畫焉貴得其神駿氣骨固為上毛色即次之盖神駿之表也古今畫史著色者多散毛者少殆可畧略之然韓榦畫肉不畫骨忍使驊騮䘮氣肉不可忽而忽其毛可乎魯人頌僖公牧事有成别其群凡十有六品而古人吉事尚文率毛馬而頒之毛色之可貴尚矣吾又意畫者之於毛或詳或畧各極天趣亦由工書者為正為行短長肥瘠神妙自然政未易優劣之爾吳興趙公畫太宗拳毛騧毫忽入微殆有古法今王傳王起宗倣吳興筆為憲副劉君子髙作毳馬圖神駿氣骨復溢出於毛色之外信佳製也因志于其後余又聞腹間旋毛為一日千里之徴而此畫槩見之惜余不善相然亦可見毛之不容忽畧如此㢤䟦嶺南録古稱信史疑史信固史也疑亦不可不謂之史然有疑而可傳者有疑而不必傳者則係乎其人焉余觀劉君子髙嶺南録殆信者必可信疑者必可疑可傳者固多出前志之外而不必傳者有以破千古之謬與訛以俟來哲豈有涯哉如潮之盈虛消息一之於月月之所臨則水往從之而東海之候異於南海欽㢘之潮朔望大潮謂之先水日出一潮謂之小水瓊海之潮半月東流半月西流且不係月之盛衰此可傳之疑也辨銅皷斷不出於馬伏波辨陳雷公之事以正丁謂之非辨蔣炳文之承誤而知以雷名州乃取於雷川辨龍母祠謂本祠秦媪而斥其五龍天妃之為妖此不必傳且足以破千古之謬與訛者也他多有之姑舉其大者一二以見志嗚呼安得言史皆如是哉昔太史公尚不免寡識輕信之譏使盡如子髙豈有好竒之過㢤嗟咏再三聊題其末題七賢圖後右晉七賢圖吳興錢舜舉倣唐閻立本所製者也始以劉伶阮咸次嵇康向秀次阮籍終王戎山濤劉伶最曠達不拘史傳苐著其酒德頌可見咸妙解音律尤善琵琶嘗以大盆盛酒相向酌取有羣豕來共飲之咸接去其上仍共豪飲嵇康好服食之事以為神仙禀之自然非積學所得至於導養得理則安期彭祖之倫可及允為名言所與神交者陳留阮籍河内山濤等世所稱竹林七賢者見諸康傳中阮籍著大人傳以三公九牧皆為禈中之蝨本有濟世大志屬天下多故名士少全由是不與世事酣飲以為常文帝初欲為武帝求婚於籍籍醉六十日不得言而止其人可知向秀清悟有逺識莊周著内外篇秀為之發明竒趣其後郭象因得述而廣之若夫王戎慕蘧伯玉之為人與時舒巻雖位總台司而委事僚寀間乗小馬出逰見者不知其為三公也山濤為吏部典選十餘年甄㧞人物各得其當時稱山公啟事吳平之後與盧欽論兵以為不宜去州郡武備帝稱之曰天下名言也而不能用烏乎是七賢者其髙致雖大小各殊然皆皜皜乎不可尚已及宋顔延之出為永嘉太守意甚憤怨乃作五君詠以述竹林之勝而山濤王戎以貴顯被黜盖有激而然非定論也古之君子固有身處廟堂心存巖壑豈可一槩而論今觀此圖諸賢髙致宛然如生舜舉所云流俗無輕議者當矣反覆觀之阮咸出塞之音嵇康廣陵之散安得復起斯人於九原一聞其慷慨激烈之餘韻乎安政蕭君其􅈿襲之書趙文學所藏馬圖後右䝉古唐生所作青驄馬文學趙君藏之遇能賦者輙求題詠愈益不厭最後以示余評余觀唐生筆殆規模於吳興趙公而吳興則由李龍眠以達於曹將軍風致故自超宜文學珍愛之馬有出羣姿圉人唐衣冠亦清楚賦者以其仰嘶疑為困覊束局局者殊不然觀其逸氣凌厲豈轅下駒可儗君子必束身規檢良驥必服鞿馽而后有用何足為病哉文學循循然常恐不及謙謙乎古道是遵固將比德於驥幸甚勉旃而毋徒以脫畧繩䇿為駿且神也雖然余因是圖私有感焉余家藏厲歸真牛一軸吳元瑜馬一巻二公皆五代人宣和畫譜具載其事歸真黄冠善劇飲口大容拳人或求畫不應輙以拳塞其口獨時時作以與酒家耳馬圖則徽廟題其上曰吳元瑜駉牧圖殆百十馬不止小不踰寸大可二三指馬之態大畧具是甚可珍也亂後不省落誰手然往來余心時一耿耿以為宋内府所藏由靖康入金又自金入元不知何自流落而歸於我而竟化去物亦玩人矣哉文學其慎之慎之而毋若余之嘅可也諸詩各極用意若憤切頓挫則有萬石子與最後題然格調意趣俱到巻中律詩一而已書劉氏西齋倡和巻僕生大德間為先朝太平幸民者六十餘年屢不得志於文場自詭小隠每北望燕冀悵然以之時時誦中州鉅公雅作志馳魏闕之下矣今復幸為聖代逸民與康衢叟華封老人嬉戲詠歌以終餘齒不亦多乎適蕭君安正攜至劉氏西齋鉅軸而讀之不覺踴躍三百嗚呼吾陳氏與劉氏為世姻世科而先朝百年間劉氏貢春官者獨子高一人蓋積之厚者發之遲也聖代欽其令聞特起用之再調為北平憲副居常孝友最隆由七千里伻書候其弟子彦至則風雨連床於西齋者幾百日詩文倡和子高皆手書以畀之殆將示後日以著忠孝之澤也子彦又屬僕志其後嗟乎逍遥堂離合參差之感彷彿具是此天倫之樂也乃若燕山懷古一倡一和如史如畫僕何啻身厯而同賦之毎一朗詠俯仰今昔之懷豈有涯哉題孫景賢菊詩後余曩在章貢觀民固未筮仕出此巻求題余讀之如見其嚴君焉後十年景賢由華容抵廬陵出此巻相示曰火後僅存者余再復之如見其令子焉俯仰今昔感慨係之然而希顔相去百里而近連年不得邂逅而景賢相望千里而遙十年復一面亦有數耶第不知觀民當復何時而傾寫也書蕭以恕族譜後昔范宣子論死而不朽歸諸世禄叔孫豹以世禄不可為不朽蓋世德之論也余讀縣丞蕭君自省為沙湖蕭以恕序其族譜牒有曰不推本先世是不為子孫無厥祖矣不能以德埀訓是不為祖父罔厥後矣至哉言乎世之詒謀不淑無以遺後至其子若孫或賢且秀而恥於祖其祖者固時有之落其家聲失其故步不知五世之澤莫究一人之初而付其祖於路人者皆是也皆可嘅也尚有如以恕能念其祖於十四世者乎尚有厯宋元至今衣冠不絶者乎左丞王公參政董公之叙志具可考也蕭叔大心至八世相葉猶厯厯然也非世德不朽不至是嗚呼安得起叔孫豹於千載之上而與共論哉乃若崛興暴進冒牒而拜墳固然莫之怪黜其所自出恬然以為得計者又其最不肖者也則吾子與鍾先生論之詳矣因書于二序之後俾歸于以恕藏之書王僉憲事跡後古今治天下者恒以有窮之法係無窮之變變生則又為之法於是法如牛毛變如蝟刺雖聰睿之英主明斷之哲輔不能革也何則君之所責治效者在守令而守令豈能皆公平也不得不紏之以按察而按察復慮其不能皆公平也不得不紏之以御史至於御史孰紏之乎法如是而止爾夫御史按察皆無長官為其屬者下至曹吏皆得以紏其上法非不美也然而上下相朋其能相紏者亦鮮如之何而可也亦曰得人而已矣得其人則良法美意固溢出於法之外矣故一御史之賢而一臺為之肅一按察之賢而一司為之聳而況臺與司之多賢乎雖然其要在於疏其禁網簡其法令而已昔唐埀拱二年李嶠論巡察風俗疏以為諸道所奏科目凡四十有四别準格勑又三十有餘而巡察使率三月後出都十一月奏事所察文武官毎道多至二千餘人少者一千已下欲令盡其行能褒貶得失則皆不暇誠非敢惰於職而慢於官也實不及耳欲望量其功程與其節制無為多張科目空費簿書率十州置御史一人以周年為限可也嗚呼嶠之所言當時行之與否未可知也而我朝實能行之矣余觀王君子啟自洪武三年五月除監察御史七月除廣西僉事其在司分司行事之蹟皆厯厯細書其自三年至五年皆班班可考其察事明核而非苛其處斷果決而有恕其褒貶得失未嘗不盡其行能其功程節制未嘗少費於簿書於是李嶠論其病於唐者子啟黙皆行其說於今如是而為按察為御史誠能得法外之意哉誠能以法繩變而不窮於變哉子啟由僉事除崇慶知州已而得投閒歸鄉暇日以其在廣西事蹟示余謹書其後如此嗚呼誠非儒者能政其亦孰能與於此哉書章貢城陷本末至正十八年九月二十九日贑州城陷太守噶海齊為麾下所縛偽兵入城者憤其久不下燔刼為甚又其將校不和各自爭功先後入者屢燔屢刼城遂併空居民殱焉始元朝以江西省員外吳彦誠為吉贑總兵官駐師吉安其裨將明志高林伯顔武端等皆驍勇過人及偽朝總兵官陳平章既取江西命宣尉熊幸二人徇上流州郡明志高首殺林巴延武端等需偽兵至即以員外全軍迎降兩偽宣尉既入吉安即上志高款誠於平章志高得爵賞為廣東都元師仍部署兵甲從幸公以取贑至是城破矜功愈驕幸公殺之噶海齊之守贑也政尚猛烈如雷電鬼神不可測不可近偽兵之來自恃必可守以固是年八月民間食盡九月軍士食盡城守益力父老懇曰食盡矣如一城生靈何噶海齊曰我受元厚恩以守兹土又申以江西參政寵命國何負於我爾父老完首領保妻子宜也我固自有處然勢益不支則質偽兵一鎮撫上城計事屏帳前軍校法昌等迺與語鎮撫者噶海齊親且故也法昌等曰守謀降矣降而不與軍校謀吾其死乎不如先之二十九日又語法昌等曰爾率兵民血戰導我出城爾等還以城降我入南中以圖興復衆私計曰審然吾安往耶遂就帳中縳取以降至城外不肯行望見偽兵大罵偽兵揮刀猶罵曰逆天逆天遂死之幸公聞其死也驚異惋惜不已有全普庵薩里者名晉先噶海齊守贑尤號酷虐贑謝氏其故也懷宿憾首沒入之謝自成丁以上非逺徙則獄死且連逮其親戚沒入者十七八家至正十五年秋由贑守陞江西參政特奉㫖取袁州十六年秋始次泰和誣執蕭繩武義士等十八人殺之沒入者又十餘家㑹有㫖左遷九江都元帥憤不赴十七年夏始次吉安先勒大賈徐李各獻銀萬兩徐父子相斷杖限死征愈急次及編戸時江西平章和尼齊鎮瑞州便宜行事以所降九江都元帥宣命符印遣使者即吉安授晉晉戒邏舟拒諸境外使者畏威而走及再至三至終不受十八年五月偽兵至晉倉卒棄其師單舸裝其婦女寶貨還走贑噶海齊拒不納逮偽兵壓城始納之是日先為帳下瑪哈穆特沙圖魯卜岱等所殺法昌持其首遍徇城中然後縛噶海齊出焉堅白老人曰吳員外以儒發身受國重命慈不足庇其民能不足束其下可以俎豆而不可軍旅殆是也夫明志高蔑主將殺同列利人貨財妻妾始而賣降終以自禍天道好還其事信哉噶海齊武人也其為贑守任情好殺率意破律民不堪命則相與羣起而攻逐之倉卒窘束乃痛自責以謝其民其民曰汝自到官行虐政凡幾以毒我人必欲食吾土者悉改是乃可則唯唯從命民又曰逺近未孚也必條所改數十事榜之乃可耳則又唯唯從之其頑鈍無恥如是三尺童子羞言之然率其簡直無所回互又長於弓馬間力扼虎射命中亦非今人所及故能箝刼其民堅死以守此又列城之所無也雖復阽危之際徘徊顧畏致遭群下毒手然效死勿去要亦初心它亦不必深計也若全晉者其無君之罪上通于天征討重事也則奉詔再朞而不發出師毒衆也則所至歌舞以為娛左遷示罰也則肆為拒命而愈縱恣沒入大家而不以聞殺戮良民而滋以蔓使元之君權不喪賞罰畧行市朝之肆豈足多哉有如偽兵至吉奮舉其衆一戰而死猶足盡蓋前愆必不能然引決自盡不尚有辭乎不勇於征袁而勇於走贑不死於勤王而死於依人觀其崎嶇道間羈旅栖屑殘盃冷炙何其悲耶古稱社稷之臣誠死社稷封疆之臣誠死封疆全吳之不能死社稷則同而全之違詔罔上吳之所不為也封疆之死噶海齊固不得為無譏然謚以一惠聖人不棄君子於此取節焉斯可矣題鄧性初巻余弱冠初當太定甲子讀書澄江之南洲始識鄧君用時有交臂寫心之驩其後嘗抵楊觀山先生許其列于青衿者則君用子性初也君用與先生皆已矣予亦崎􅋂厯落且七袠而故友嚴文炳令子子初袖巻軸介予序其端讀巻中詩則皆美性初而賦者嗚呼其使予感也昔予交君用時性初尚弱及觀山講次性初方學也中更喪亂避地五雲雖樂於客土而重違其親乃還其闔閭嗚呼性初親老矣宜何如其左右就養也醫踰於三世既取騐於其鄉經傳夫四詩宜益充其所學切切乎取友之必端懇懇乎與人之必周密密乎遇事之必謹有魚魚雅雅無戚戚咨咨即其親桑榆之景媚於艶陽之暉菽水之味樂於膚鼎之腴矣予題巻已復取董召南桐栢行再四頌之子初曰幸甚書唐馬圖此太宗拳毛騧也厯唐至今雖復萬金涓人可得市乎獨展此圖即天骨開張龍池霹靂皆在目前於是天馬復生矣畫史識馬意大似踴躍端門得所依歸者嗚呼豈不騎戰一敵萬漠漠以開風沙乎龍媒異産何代無之書蕭天與族譜後自宗法既廢而族譜盛行固人心世道之一助也古者宗法之明有百世不遷之大宗有五世則遷之小宗繼襧繼祖繼曾祖繼高祖者小宗也小宗雖不一然皆管攝於大宗冠娶必告死亡必赴祭祀不敢尸故自源徂流條理分明而脉絡有序也然此法不舉久矣於是士大夫之家莫不有譜焉譜上至始祖則宗法立大宗之意也下至高祖則宗法立小宗之意也合大小宗而存其槩於彷彿合千百年之統緒而歸於數葉之楮慘淡之墨嗚呼亦士大夫能之流俗人則不屑矣吾故曰亦人心世道之一助者此也吾鄉沙湖蕭氏天與其派出漢相國蕭何流及齊梁江左蔚為名宗至唐蕭瑀八葉宰相盛莫與京五代時諱昶者為巡察判官避馬氏亂始自湖南徙家泰和之禾溪則沙湖之始祖也其後宋景定二年諱德升者貢于禮部則沙湖之族祖也載諸譜者班班可攷具如左丞王公黼參政董公德元及諸名賢志跋序文兹不贅述余所願者湖邊之族之盛代有俊秀而天與二嗣子震子巽皆秀而文綿厯世逺則方來之未艾未有涯也不其盛歟吾故為書譜後以相期於無窮云題濠梁喬木圖後右濠梁喬木圖廬陵彭希善為襄陽守禦千戸侯竹軒陶君作也侯故家濠梁天資毅勇謀畧英明當主上渡江時侯識運數之歸奮翊衞之智佐興王業蔚為藎臣及天下已定侯任股肱心膂之寄出鎮襄陽實能廣德心奠民社使桴皷不驚鴻鴈安居厥功懋焉然濠梁興王之地也城郭之盛麗邑居之繁庶山河改觀於古今陵廟增輝於日月侯蓋夢寐以之於是希善冩以為圖蓋不獨桑梓之念重墳墓之悲深也或曰侯有大志不尚抵掌而馳於伊吾之北乎而奚止於襄樊侯立大功不尚鳴鏑而奮於平壤之東乎而何有於濠濮圖喬木者姑以寓侯角巾歸第之意今豈然耶是不知侯之心與上所以待臣之禮也昔者文王之遣將帥固曰曰歸曰歸嵗亦莫止其遣戍役亦曰豈不懷歸畏此簡書夫出征臨遣之際尚以歸期勉之況侯居平世臨治邦安得不思其鄉哉然侯所以志存乎四方者固不為懷土而有間也謹書其後如此亦自謂庶幾侯之心云書栁主簿番禺巻後右番禺贈栁侯詩文一巻栁侯官歸至泰和留止出以示余余讀之歎曰泰和栁侯之桐鄉也其民思栁侯如思父母見栁侯再至如見父母重來則番禺之民眷眷可知其士之形於歌詠也固宜矣侯之宰泰和也愷悌之政寛猛適中温良之度愛惡得正寛而不失於縱故疆禦摺伏猛而不至於苛故鰥寡攸寧愛其人必其真可愛故敬不繆而惠不汎惡其人必其真可惡故法不玩而威可懲小大各得逺邇胥慶以故遺愛至今愈久而愈新已去而不忘也番禺廣州之壯邑也上有省治之統臨次有風紀之亷察次有大府之驅迫以一縣而聽命三司焉不其難乎栁侯任主簿遇事之不可者輙犯顔昌言於其上不顧身之艱危惟慮事之不當以求其是之歸此泰和之所無而番禺之獨有者是宜寶安趙晦贈言以為領邑教數年見其能守職勝任者惟士先張公為邑簿及栁侯二人而止耳嗚呼才之難如此哉巻中七言古詩如趙訥五言選體如李昕尤佳致可誦自餘諸賢以及諸生亦皆不凡信乎番禺之多才子也嗟乎栁侯昔宰泰和為其易繼簿番禺為其難然皆恢恢乎游刅於餘地焉然則而今而後焉往而不可行吾志哉故書諸巻末以俟書十八學士登瀛洲圖右十八學士登瀛洲圖遂江蔡鑰為天使朱序班立本作也登瀛洲之榮寵於世久矣事在唐武德末年方𤣥武之事既往神堯之心既安天䇿上將之府初建神堯固惟恐秦王之不為堯舜也既為之開府置屬又為之開館延學士使相講論其意深切當時徒艶其榮寵而豈知學士憂世之心哉是圖也亦圖其迹而已耳迹之可見者或坐石彈琴或倚樹長嘯或角技於楸枰或濡毫而行墨或頽然自放於石根或翛然獨往於竹下或如禦冦之泠然御風或如更生之校讐不倦孰不曰學士之所樂在是學士之神動天放在是亦有識房杜為稱首其經綸天地裁制萬物者果在是乎果不在是乎自餘諸賢如二蘇二李孔陸褚薛高下優劣各殊然皆卓卓有立果皆不存於事業乎然則畫之所形亦所以滌其憂世之心耳其誠能副神堯之心誠能為天䇿之輔使貞觀之治至今無敵者亦千古之盛致哉題劉崧官誥後漢史云以官壽卒官者榮以禄壽者考終命不陷刑辟也在漢世不為稀然漢史特稱之若此矧後世乎婣友劉崧子高有令子士鴻以其先君子前後所授官誥及所贈身後䘏典與主上親為祭文録以成軸而介余識其後始子高以人材起洪武三年八月授兵部職方郎中六年九月授北平按察副使官滿給由既而姦臣弄法坐以違制得釋放還家及權姦伏誅奉勅符取到十三年正月除禮部侍郎五月以人神有變特命致仕十四年二月復起取授國子司業四月卒令有司備禮棺殯命奉御唐壽以牲醴致祭焉享年六十有一嗚呼使子高幸而以職方殁以憲副殁可以為卒官未可為卒壽使子高不幸而殁於放還田里之時可以為卒壽未可為卒官今也一起取於權姦誅鋤之後而有侍郎之除再起取於特致仕之後而有司業之名雖司業席不終煖而褒恤祭奠眷賚彌厚在當時為難得在西昌則一人而已謹題其後以歸士鴻寶藏之書神石銘義虎贊後貳尹李君克貞述文丞相神石夏將軍義虎二篇深有補於名教余讀至再四不去手夫虎為山之君肉百獸以為糧且攫人而吞噬之最不義者也然知有父子則性近乎仁石至頑鈍傲四時而絶生植終萬古而不虧騫波濤不能泐霜雪不能墳無知莫甚焉然茍有所憑則反智於人故虎之能義仁之烈也石之能神物所憑也且石能言於宋起立於漢尚矣則其仆空坑而衞丞相截追兵殆將植我孱王再興趙祚以配祀于天倉皇逼迫之際人不能措其力而石獨能之非神哉夏將軍前忠後逆荃化為茅三尺童子見其心其所養虎欲殺之宜也昔者銜麂啖將軍於廬墓病中虎之仁之至也今者咆哮欲噬將軍而甘心就烹虎之義之盡也虎之死榮矣將軍雖生不亦有靦面目視人罔極哉微神石則丞相必死而後日之大節無其終微義虎則將軍幸生而當時賣國之心為不白此克貞所述足以增重於倫誼而深有發於余衷故書其後如此題蘇黄墨蹟王竹逸蕭極初二英友契闊多年迺復聚首於章貢出其聯輝集相示又出蘇黄二公墨蹟介余識之嗚呼十二三年輪雲世變可嘅何限父子骨肉化為路人而二子獨雲龍上下未嘗少離悲喜値遇悉見於集中皆清新可愛真白璧一雙也始極初得山谷挽其從父夷仲十絶詩稿藏之恨未得坡公真蹟繼而竹逸得坡公所與王毛仲四律詩遂臻二妙如龍泉太阿㑹于延平不期於合而天者相之是又聯輝之大者也黄書舊蓋累見之楊公平之志已詳坡書則今始見之余故書其後云二公筆法皆出黄庭經􅄟鶴銘而蘇盡其常黄極其變至於八法則守之一也坡書後有洪覺範跋而虞邵庵復志之矣他復何求題墨竹序後愚溪王君得斷縑墨竹一梢而裝潢之且述其所由來深加歎恨蓋君嘗學竹於湖州而得其法故見此而異之以揭諸五老山房不啻用并州快刀剪吳淞江水之半亦自可觀或曰犧象溝中之斷也龍吟柯亭之朽也絲桐㸑室之焦也其淪落獨能存其本真及就形製猶為施之時用而此特玩耳王君何留意之深也是殆不然傳曰游於藝説者以為玩物適情書固藝之一畫亦書之流也玩以適情而非玩以喪志何為而不可乎嶧山之刻岐陽之皷風霜消蝕野燒缺落殆盡而蘭亭出杵臼纔二三十字君子得而寶之以存古晉唐名畫粉墨剥爛好事者千金購之嘗恐落他人手而掇補珍襲以傳子孫良有以也王君為能自適矣若夫竹之韻致則君之述盡之其為李遵道父子家法無疑題秋菊問答巻後右秋菊問答一巻凡為律詩二八章廬山王先生希顔為宣城孫景賢氏作也今三閲嵗矣余來贑其令子觀民復請稿於先生繕冩以示不忘且介余志其下方余熟復焉重慨夫昔之公侯里第文武衣冠既與世俱變而其可悲可愕者亦皆散為飄風蕩為飛煙識者無復道而孫君方逺宦荆湖間菊亦荒矣菊雖荒然詩存觀詩復何翅對菊即其風流文物宛然如新有歆慕而無悲愕其用意逺甚詩可以觀殆是也夫余觀輞川集有春桂問答槩見彷彿殊不盡言希顔為菊往復皆八殆無遺餘格調高雅得少陵之風抑不知菊自晉唐來有主賓知己若是者否淵明雖愛菊其子殆不是愛視觀民又何如皆弗可以弗識也嗟賞之餘敬題其末跋周府君碑後按此碑後漢靈帝熹平二年所建唐太宗太和九年重刻也太和乙夘距熹平甲寅凡六百六十二年漢刻蓋不復存今丙午距太和乙夘又五百三十六年唐刻亦磨滅過半其字體完整者極奇古可尚其舛訛者疑太和已失其真況今又加剥蝕乎漢刻本在壠上唐刻在曲江廟不知何時徙置路學已斷為三朝陽錢太守既新府治以韶在漢𨽻桂陽府君功勲在韶乃徙置府治命工膠漆續其斷匣而樹之以嘉惠無極嗚呼服嶺以南韶獨有漢𨽻一通誠希世之珍也錢侯官既滿眷眷是碑且曰余媿府君勲寔多繼府君而轟烈者必余交承徐太守也子幸志之海桑集巻九
