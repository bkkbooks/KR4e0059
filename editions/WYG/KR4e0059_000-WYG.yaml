body:
  text: 海桑集目録别集類五明巻一四言古五言古七言古歌五言律五言排律巻二七言律七言排律五言絶句七言絶句巻三表箋頌論巻四碑銘傳説巻五序巻六序引巻七記巻八墓志銘墓表哀辭巻九書題跋巻十祭文雜著贊文解臣等謹案海桑集十巻明陳謨撰謨字一徳泰和人生於元成宗時洪武初召赴闕以疾辭歸其家傳稱卒年九十六考集中年月止于洪武十七年晏璧於永樂七年作海桑集序稱謨卒後二十年則卒於洪武二十一年戊辰也謨書劉氏西齋倡和巻後稱生大徳間為前朝太平幸民六十餘年由洪武戊辰上推大徳元年丁酉僅九十二年安得夀九十六是其家傳誤也其集詩文各二巻為其甥楊士竒所編國朝康熙庚申其裔孫邦祥重刋然排律之名始于髙棅士竒未必即用其例又靈山寺以五言長律入古體悼劉生詩以七言拗律入古體而崆峒雲居詩又以古體入律體士竒亦不如是之陋殆邦祥又有所竄亂也集中通塞論一篇引微子箕子反復申明謂革代之時不必死節極為害理故其客韶州時為太祖吳元年元尚未亡已為衞官作賀表而集中頌明功徳不一而足無一語故君舊國之思其不仕也雖稱以老病辭然其孫仲亨跋其墨跡稱太祖龍興弓旌首至先生雖老猶輿曵就道一時老師俗儒曲學附會先生之論動輙矛盾是以所如不合遂命駕還山拂衣去國然則與柴桑東籬之志固有殊矣然其文體簡雅詩格舂容東里淵源寔出于是原序稱宋濂目以夏鼎商彞太羮元酒雖未免稍溢要在明初固渢渢乎雅音也乾隆四十四年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀海桑集序廬陵文章爲江右之鄒魯自歐陽文忠公而下若胡忠簡周文忠楊文節俱稱文章宗家宋季巽齋歐陽公湏溪劉公中齋鄧公青山趙公雖不大顯庸卓然文名于世元氏時又若麟洲龍公養吾申齋桂隱三劉公力追古作者猗與盛哉泰和陳心吾先生生元大德乙巳間敏而力學猶及登宋元遺老鉅公之門務躬行踐履嘗與計偕試于有司不偶即棄去肆力古文辭元運既遷科舉學廢鄉人士子從先生講道德性命之懿接踵于戸庭聖朝龍興稽古崇文設科取士先生以老成碩德屢典文衡又以遺逸徵固辭謝去予弱冠侍教先生時翰林承㫖宋公侍講學士潘公祭酒許公南行道廬陵謁先生之廬閲其文而評之曰湯盤禹鼎器之古也太羮𤣥酒味之正也唯知者能知之三君子之論若此又何以議爲哉先生殁之二十年其孫翰林庶吉士孟潔孟京與余同以纂脩大典召赴京師出示海桑集若干巻讀之雄詞大篇誠有德者之言也在昔歐陽子為宋儒宗於謝希深尹師魯死序集古録有無謝尹知音之嘆意謂作者固難而知者爲尤難先生雖不得位于時其學則淑諸鄉人士子其文則見知於當代知名士其行則孝友之政施於家可謂俯仰無愧怍者矣而予也不敏學爲文辭嘗質正於先生期待甚厚老成凋謝之餘持不足之姿承乏文翰内顧慚悚敢叙先生之文哉顧先生知己爲未報又敢靳一言乎惜先生遭時俶擾其製作弗及黼黻皇猷以鳴國家之盛而題曰海桑集云永樂七年歳在己丑四月既望山東提刑按察司僉事晏璧撰
