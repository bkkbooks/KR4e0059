body:
  text: 海桑集卷五明陳謨撰序贈趙文學序臨川趙文學字德容源深於玉牒學粹於四詩僑寓番禺有年而慈闈故留臨川嘗負米數千里外且逮養於斗升之祿矣然未足以為太夫人榮也洪武四年秋番禺試藝者若而人若書易若春秋與計偕者纍纍而是而以詩貢者獨文學一人焉嗚呼異哉然則其素所藴蓄可徴也已臨川之多士有不稱願以夀其太夫人曰幸哉有子乎今而赴禮闈取髙科登膴仕太夫人在堂不曰是能嗣續不辱其世者乎番禺之經生不曰正葩之學不當如趙君乎雖然文學不鄙余老而求贈言余既嘉其已獲者足以榮其親而尤願望其立於位者深足以為親榮也是以敘其卷端贈進士羅子理序羅倫子理舉進士上春官余嘉其堅窮苦節智日益明足以受任而堪事則告之曰士尚志而已志不茍則學充學不茍則行達凡茍其行事以速官謗者其志其學蓋蔑如矣昔者運遭叔季事在轇轕談經者絶響于時衆廢而已獨業衆譁而已獨持得二人焉其一楊自立子淵家於春秋其一倫也家於易二人志同學同行同且誓將無不同者洪武三年子淵誕先甲科入贊天官聲實表灼每重王貢之嘆而倫亦次年奮於暫蹶及於先鞭誠不負初志者嗚呼倫也尚朂之哉由三十寒暑布衣昆弟講切之勤一旦蟬聫玉映以明經顯聞于時非偶然幸致者比而弗加朂可乎吾聞倫始祖希五代時繇金陵徙泰和凡幾傳至宋大觀間曰吉成贈致政生三子次伯夀擢第官盧溝主簿嘗刲股起親疾以孝聞官易其所居坊曰旌孝坊事載郡志季伯霖有隱德狀元張槐應與交莫逆倫其曾孫也盧溝府君逮倫才四世傳不云乎必復其始詩不云乎無念爾祖倫往矣尚朂之哉前之窮養者無或茍矣後之達施者宜無一可茍展也子淵幸以鄙辭質諸其以為否邪抑然邪鮑參軍集序總制俞公子懋刻鮑參軍集於懋齋介僕敘言敘曰參軍名照字明逺照或作昭則唐諱武后而改之也宋文帝元嘉中參臨川王義慶軍事時太尉袁淑文冠一時王請為衛軍咨議照與同列號為極選然則古之摻任閫外籌䇿幕中率多名勝之士若參軍者尤風流文雅傑出等夷者歟考諸大雅有曰文武吉甫美其文足以附衆而武足以威敵也而或者角文武兩途互相詆訾豈通人之論哉今觀俞公鎮撫永新威德並著顯有吉甫之風而平居暇日雅喜詠參軍詩殆曠百世而相與友矣嗟夫唐以來詩人唯李杜為大宗然至少陵贊白也無敵則獨舉參軍之俊逸嫓焉夫俊可能也逸為難俊如文禽逸如豪鷹凡能粲然如繁星之麗天而不能回狂瀾障百川者以能俊而不能逸故爾史稱照古樂府文極遒麗遒斯逸矣麗斯俊矣微少陵不足以知太白微太白不足以擬參軍也雖然文以氣為主以意為輔以辭為衛讀斯集者玩參軍之辭必求其意求參軍之意必尚其氣始參軍謁王欲貢詩言志或難之勃然曰千載上英才異士沉沒不聞者安可數哉大丈夫藴蓄智能可使蘭艾不辨與燕雀相隨乎即奏詩王大竒之此其氣何如也蘇子曰方髙力士用事公卿爭下之願出其門而太白使之脫鞾殿上此其氣已蓋天下矣此太白所以配參軍也善觀者其亦有取於斯贈楊員外序為士而由進士發身天下之清流也為進士而獲班朝署天下之極選也以天下之清流膺天下之極選幾何人哉有能濟兹者充而達之若內及外其於為政也何有楊君子吾洪武三年進士也既取髙科即登吏部勤謹而和緩練習而疏通凡天官之屬藻鑑精核樞機周密曹務劇而咸理敷奏明而常允者君以主事之賢書諾居多以故令聞尤著洪武五年諸蕃宣大臣類以幕府闕員為請上乃命中書遴選省屬往承其乏而君以選升廣東省員外郎九月抵家第展墳墓即就道㒒請贈以言夫服領以南方面之重控制海表國朝平定其地斬伐鯨鯢擁護良善使蛋獠鮫人之室胥為輸賦納貢之區然而地大物夥不尚有當興除利病者乎化暴鑄頑莫若尊賢興學今兹連嵗大比多士賔興與內郡等夫其雲蒸而雷動鯤從而鵬飛者良由聲教之漸被者深也然而不尚有當振厲鼓舞者乎行矣子吾推其所以贊治天官者而悉心以佐理藩府可也吾見總總焉其有餘裕穆穆焉其揚休光而母徒重內而輕外毋以昔之勞而今益勞也夫孰不曰進士之施無不達如此進士之賢能不負所學如此又孰不曰廟堂之登明選公如此廟堂之嘉惠藩服而慎簡乃僚如此然則政譽溢於途而官針埀於範矣顧不偉歟贈進士周淵序周淵字彥容年甚富質甚清學甚劬洪武五年秋余忝校文江西及開榜而淵以詩經舉進士省憲大臣聳嘖矜賞曰是我南昌府學生也老成者或愧之矣其冬淵來西昌受室於浩溪驛丞之館丞爼豆余淵相從連日動如禮法私心甚慶昔徒得其文而今乃得其人焉將上春官且求贈言余自顧無足以補吾子所需也誦先正之格言資逺業之良輔昔河南程夫子以少年登髙科及有髙才能文章為人之不幸夫髙科未易得也在少年尤為榮寵然茍幸得之即肆然不啻過人祿利是徇而道德之弗圗名譽是崇而官謗之弗恤則少年髙科固以榮之亦以纍之固以寵之亦以損之非幸也韓子曰夫天輕與人以富貴而重與人以文章言髙才固造物之所靳也上焉以載道其次以華國其次以文身上下古今落落數人耳若其本實撥而枝峻茂行荒穢而思藻潔政復剟雲錦於天機軼翡翠於蘭苕如王楊盧駱猶不逃裴行儉之誚亦何幸乎爾也今吾子年甚富足以道逺質甚清足以絶俗學甚劬足以有成其取髙科也必矣其文章當水涌而山出矣將之以廉勤而持之以謙撝厚其本於孝友而達其行於政事兼夫人之所難而無程夫子之所病則余之所願望也於是乎言鄉飲酒讀法詩序國朝奄有方夏即詳定法書名曰大明律令又命刑部取凡麗於法者類編其書名曰申明誡諭尤慮中外逺邇弗加警懼輕犯憲條申命文武百司嵗取春冬孟月行鄉飲酒禮而讀法焉民間率百户為一集位以齒董以里長郡縣則肅士大夫之老者為正賔餘為次賔而郡守縣令主其席其儀酌取唐宋而務從其簡物貴儉素而務適其中凡飲皆先讀法然後行酒所以使人人知畏而重犯法人人知秩卑尊而隆齒德也洪武六年正月實維其時泰和縣令尹前御史劉公宗啓即學宫而行事自僚佐暨賢士學官弟子員等凡若而人列位於明德之堂於是學徒二三于于而前正立張拱奉法書而更讀之先令次律次誡諭炳炳琅琅觀者如堵聽者動色讀已而燕籩豆靜嘉衣冠嚴翼竟酒爵行無算有充然飽德之實無起座喧譁之失皆額手頌曰此主上之澤也令尹之化也令尹治縣克勤克廉端其教不鄙夷其民動如禮法民自以不犯其或觀感信向有不齊名𨽻申明籍中不惟其所親所友悚聞誦言面頸發赤雖其怨家聞之亦凛然增唏恨服化之晚誠足以增夫天理民彛之重豈徒飲云乎哉抑刑始於笞笞始於十至輕也遞遞倍之至於杖又遞遞倍之杖至於百何笞律簡杖律繁笞十良民猶不敢犯杖百而犯者益衆然則法可不重乎徒輕而流重流至於三千里極矣又加焉非絞即斬而率輕犯之此國朝所深憫而鄉飲讀法之制所以行也嗚呼仁哉翼日學官自強成詩會稽中常先生和之諸在燕者或𢋫吟或自賦以質諸令尹謂余忝正賔宜為序遂次第書於卷端贈劉侯朝京篇上方圗任舊人共政凡越在外服大小文武百司者憫其勞於王師既渡之日優其渥於王化大行之時悉還其人於朝使咸得宣力於家咸得丕享天休而欽承德意不欲外股肱心膂為異體也知泰和縣劉侯宗啓實惟舊人之通顯者既厯尚寶卿監察御史遂出宰百里在官三年庶政備舉百廢具興洪武六年三月制以平陽郝侯思讓為交代行省則承命趣劉侯朝京郝侯既視篆遣吏來謁文為贈余讀商書所貴乎用舊者蓋曰王播告之修不匿厥指言凡所播告則奉承於內而能不隱匿其指意以達於四方也又曰罔有逸言民用丕變言宣化於外則無過逸之言以惑衆聽故民用大變而化服也又嘗觀詩人美仲山甫既稱其柔嘉維則小心翼翼威儀是力又稱其天子是若明命使賦出納王命王之喉舌凡仲山甫之德業劉侯蓋有之似之今其歸也其能奉承於內也審矣其能宣化於外也必矣然則用舊以圗治商人豈得専美於前哉請以是為贈劉處士赴京篇處士劉仙客應徴而起客賀者曰君仙客也仙者恆遺世亦容有世不我遺出而效用於當時若張良李泌之於漢唐也不其偉哉又曰公卿交相辟士務舉爾所知冀必得其人獨舉君者非有半面之雅一臂之交然則君之令聞廣譽其徴不亦逺歟客語竟處士若有不懌然者曰吾行安敢負所學誠懼弗堪任耳奈何㒒曰窮養而達施正已以待物將焉懼邪抑客語則然請復有以為祝詩不云乎鶴鳴于九臯聲聞于天言隱不能藏也易不云乎中孚豚魚吉象曰信及豚魚言信無不達也處士負山東徑氣讀書青原山下孝友出天性刻苦以養母終身不娶母八十餘歿廬墓以終制焉節操如徐稚非其力不食居止如王凝一物不茍亂所交皆名流所談皆讜論謂之鶴鳴于九臯者非邪其聲清亮聞八九里雖欲不聞於天其可得邪且夫孚信之道可以通神明貫金石守之乎終身如南山不騫不崩行之乎四時如松柏不改柯易葉斯以獲上治下無不孚矣彼豚魚至冥也猶足以感之况至著者乎頑然塊然也猶若有知况其有四端萬善者乎故隱處之不能藏也出而為用惟誠信無往而不自得固處士所素定者直推而放之耳嗚呼當道審於求賢何待夫先容於人處士深於藏器何有乎獨善於已行且朝奏暮召有見晚之嘆彼嚴徐者烏得専美於前哉王氏近代族譜序王氏近代族譜并自序者王以誠之所作也凡譜必原極夫得姓受氏之初而今僅僅至於五世者何譜牒亡逸概得於家訓略其所不可知也其自序何庶後來者之猶可徴也自序而必本諸相國待制制置節制者何端緒可尋源委之求也始啓宗自金陵來為吉州校官因家白下子仲柔舉鄉貢進士於以誠為髙祖仲柔孫榮叔曽孫時可則以誠祖若父也榮叔治儒術有理才當有元延祐間贑寧都蔡冦之亂州強起之抑使就吏給軍府贑之俗鬼寧都城外有妖祠像設極魔怪人莫敢側目土人類縳生口以祭甚神之我軍畏縮榮叔獨奮義火之三火三滅乃命取婦之褻衣羃神首一火而燼遂平其城歸補押録役滿不干進養間恬處喜讀四書間憩東禪寺槐安閣見寒山拾得詩尤酷嗜之時可資質淳厚隱居授徒晚從普覺老衲聽受戒律斷酒葷日誦法華經以此自終有賢子伯天祐仲以誠皆兼習儒吏季以立嗜古學開家孰鼓篋滿堂精厚訓誨不倦嗚呼校官貢士上不辱相國三制之宗榮叔時可下將啓八世莫京之祚斯譜也雖不能逺稽亦足以埀示無窮矣吾故因以誠自序而復述其祖父之可稱者如此又以期以誠昆弟之後光逺而有耀也一篷春雨軒序一篷春雨軒者會稽中常陳先生之所寄也曷為而寄之燕逰之所也燕逰而曷為以是名之身雖家林一畝興則江湖千里也夫人不出户庭則不知有舟居之為樂不病暑暍則不知有甘澍之為澤先生營是軒雜蒔花卉左右圗書風晨月夕茶煙香篆竒古之玩好絶俗之名流日相與嬉娛其間詎篷窗之可擬而風雨之攸宜哉然而處一軒之靜飄飄然有麾斥八極之氣春雨時至波濤驟驚灑灑乎在三江七澤之間此其興趣之逺視一篷奚擇哉先生為前朝逸民交逰貴公巨人無不可為是軒留詠者其來廬陵謂豫曰吾夢寐軒中珠玉嘻亡之矣間記憶十之一二數數誦以貺豫又録以示曰幸為序志之將續有題者嗟夫軒寄也軒之名亦寄也逰夫是軒者又寄也軒之珠玉獨非寄乎今而其人往其詩存則篇什之寄所係者逺宜先生之眷眷不忘也軒其不以是而永存乎羅觀泰歸南安序羅君觀泰當至正間以才膺當道之選辟為南安屬縣巡徼在職以能稱然非其志也是時四方雲擾君既書滿即客土小溪為家甚安適焉余嘗避地旅韶州又嘗校文入廣東皆道經小溪凡冉物色君隱處然皆覿面九疑莫能得也去年君來展桑梓省松楸始諧言面蓋去鄉十七八載矣傾寫無何解憂在念嚴君從禮率朋徒賦詩以贈屬余序之古之君子重違其鄉仁也然而不獲其志者宜亦不少伯夷太公之居於海濵豈其心哉後世或以羈旅或以仕宦得其所願者或不暇歸不得所願者欲歸而無由吾見多矣若余之甘衡門守環堵今吾猶故吾固碌碌無足道如觀泰之小溪誠所謂他鄉勝故鄉邪惜乎曩時不得一造竹所而徒想像其髙致也故於其别序以申之為歐陽志學謝醫序友人歐陽志學别數嵗始一會相勞苦外察其貌始若戚如中乃懌如而終則浩浩如也志學於文忠公為十四世先賢之澤逾逺而長固自與人殊昔文忠公為州學記所以願望於吉士者以為將見皆道德明秀而可為名公卿其后終宋祚三百年終元祚百年為士者誠不負公所期待矣孰謂公十四世若志學之賢乃一鬱栖屑秪爾邪此其貌之戚如宜也乃告豫曰今年有以名薦達者州司有星火之迫而老母八十又六吾何行如之已而嬰疾老母亦疾私自念天其以疾全我使終養乎又自念天疾吾身可也而併疾吾母將焉濟乎得世醫朱氏德輝為施療治按脈而證苻投劑而邪郤身與母俱寧而公與私兩釋此吾所以懌如也朱君年不滿三十而方術已如此殊可尚已使豫不幸而不遇疾豫其行乎故豫之疾天也使豫疾不得朱氏而落於庸工是天將全之適以戕之也故豫之遇朱氏亦天也豫德朱氏而朱氏慕先生之文先生忍能靳一言乎又曰繼今以往終吾年齒浩浩乎日有餘裕石田茅屋得為幸民啜菽飲水言報春輝訓迪後人志文忠公之志學文忠公之學以期埀於無窮又將與德輝之世莫與京也余聞志學言誠君子哉因書以謝朱氏張子靜樂府序始豫得張子靜靈宫樂部曲四章而讀之愛其兼有麗情團扇花間之趣且辭翰俱美恨不識其人意非今時耳目所及也暨物色解后則吾廬陵先輩也僅僅交一臂而去嘗恨不得其全集而讀之兹復聚首乃辱以集為貺桂隱聞廷二劉先生序其端矣極所推服豫晝簾夜燭把玩不能釋手子靜復介豫題辭嗚呼豫七十又二子靜踰八望九矣三影之韻度于湖之俠氣尚往來於心不尚可徴乎當其壯逰武昌我龍洲道人神交物表買桂花上南樓載酒黃鶴磯下少年俊邁蓋可想見今具存集中惜無好事者刻梓以傳徒使四方見其一二者以為古人也昔留侯佐漢服其籌䇿者以為必雄傑偉丈夫也及見則如美婦人焉讀子靜詞孰不曰此月下秦淮海花前晏小山也抑有知其皤然雪顛歉然窶人癯然列仙者乎吾又以子靜盛年不偶於場屋安知其中無留侯之所存哉若留侯者方益斂其華擊節於大風之歌彼其薈蔚朝隮婉孌斯飢國風之傷楚騷之怨蓋未嘗一介懷抱則吾子靜獨擅之嗚呼世道之感歎欷噓其不在是哉周石初集序石初周先生負竒氣抱碩學卒困躓不偶其窮益堅而文益壯吾雖不識嘗得其著作一二於他許相識已多乃今其門人張彥文編集其亂離諸作彚成巨帙以借豫讀之且曰石初知先生幸為我序之嗚呼廬陵之文自歐公倡之乃天下之文也名家繼作迄宋終元皆歐門股肱心膂之臣而或者妄肆胸臆點染雌黃其間君子所不較也近年得歐矩矱而精彩益出者莫如虞先生自餘亦安得瞪若乎廬陵哉石初之文成之劉公序之至矣復奚容贊雖然石初有三幸焉當有元盛時獨不利場屋一也至正之季所在化豺狼雖間道暫時而康莊不失今巋然靈光獨存二也江南野史誰復健筆而集中隱約散見皆可為國史補三也使石初幸乃溷一第不幸逢時不祥必將矯矯令節必不淟涊伈倪為名教羞然位與勢之相侔志與才之相協有不可必者固不如昭文之不鼓也白髮殘年坐籌海屋殆有隂相之福詩不云乎不憖遺一老宰物者其憖遺之矣必將有傳于后昔賢稱杜詩似史記豈不以天寶以來間事不得少陵載而傳之安能如畫此史傳所不及也吾於石初之詩亦云仲氏斐藁序洪武六年夏豫仲氏以靜由贑之興國寓籍以儒行起取赴京師偕起者凡若而人既抵京咸放還鄉獨留仲氏辭不獲且病久之病甚當道者憐而許之九月歸舟抵青原與豫再會拜且泣如再世如夢語豫飲泣相勞苦銜杯酒接殷勤不能數日遄返興國留詩一帙畀豫評之嗚呼自至正壬辰亂起東西避冦率相違違不久率合并自丙午余旅韶由韶徴赴建業參差胡越莫此之甚今幸乃得各還為民然白頭相望故園之念深聽雨之懷愴矣讀集中諸詩皆森削束程度婉娩有思致工巧而不失正大和平而時有譏切至如詠物數處復能於物外賦物不刻畫而切事情若一二長篇如鳩巢癡可針末俗花村酒簾等甚可諷誦豫皆一一評訂之矣何時尋遂初之賦歸善和之里相與觴詠賡酬以樂桑榆之景庸非快事計造物亦未必不見許也姑序以志因養吾鄧先生行附以達諸是嵗臘月書于青原之寓陳謨一德甫流芳集序胡氏志楫以其流芳集示余曰將入梓以埀後而先生未蒙序識之敢請余受而閲之自其逺祖箋箋父咨暨其曾大父士茂父履輝季父履寧履寧子志德代有積慶其擅芳也宜哉夫芳之大者在乎祚胤祚胤賢而聲實茂綿厯永矣然德其本歟故有蔑德之咎而無背德之祥者此也始箋由太學舉進士丞南城當紹熙五年逢國大慶髙年者錫爵得封其父咨迪功郎母歐陽氏孺人讀尚書謝公諤為咨記其儒林精舍寶謨閣直學士楊公萬里為箋記其福榮堂其德可知此流芳之初也士茂一字古澗止一子能均其産畀兄子三而四分之能製尊禮堂以嚴家訓觀鄉衮信國文公鄉先生太傳劉公往還手筆墨迹如新其人可知此流芳之盛也履輝一字澗月履寧一字小隱草廬吳文正公麟洲龍先生諸老皆為賦澗月堂大守楊友直馬昻夫諸賢皆為賦小隱堂而太史虞公又為序之此流芳之續也志楫承之當草昧之運能紏民義障鄉鄰致世業不隳益崇能拜前江浙提學李公祁乞銘其父前陜西省郎中梁公天與乞銘其母今翰林國史宋公濂乞銘其妻致幽壤不憾有光而志德習隱如其父好文撝謙如其父此流芳之衍也然則胡氏之芳其繼繼庸有艾乎昔范宣子論死而不朽歸諸世祿叔孫豹以世祿不可為不朽蓋尚德之論也凡胡氏賢子孫思其髙曾而上由紹熙迄今百七八十年敷遺之休貽謀之善若先達之士名公巨人立言之君子實寵嘉之如是豈易得哉然則樹德尚益務滋乎吾見流芳不但一宗一鄉而止將叔孫子所謂不朽者可躋矣倪二守之鬱林序化州石城二令廬陵倪仲威擢升鬱林二守吉郡總制顧侯文質作為詩章艷其寵榮勉其清修而佇乎其令聞之逺揚也郡庠師賔士友率皆賦贈而㒒則序以致祝規焉當洪武三年廣東秋闈㒒忝校文而君職封彌相與頗習熟然僅僅月餘而别别又五年始再會會無幾即迫公程不可稽又烏得無贈邪㒒聞石城小邑當廣東西海南北之衝前朝以巗仄險隘特割置是邑所謂好則人怒則獸不可爬梳者君履之若夷五年如一日自非豈弟施化平易近民何以能之鬱林視石城為善地二守視二令為優遷志稱其好學者多其民力田務本屬縣三户五萬糧不足二萬君端本於上縣承風於下其易治豈不十倍於石城哉然則顧侯所以佇乎令聞者可計日而待矣抑化民成俗不在興學乎深山長谷庸詎知無趙德其人焉君體貌而禮羅之選弟子員而優異之暇即與為揖讓而肄習之民俗有不丕變矣乎所以奉公上而歡集慰民望而來蘇興頌歌而洋溢者舉不外是矣是為序送揚璟齋序大傳曰龍蛇之蟄以存身也揚子曰士不得則龍蛇夫一屈一信理之常然而亦不能於久屈如揚子所云者則唯清修之士以退為恬者恆處之裕如也故宋參政楊公鑄諸孫振瑛少從前進士祝公堯受業長由學校發身為王府參謀代既更入閩嘗一為帥幕賔非所志也所居得信州城北韓侍郎竹坡餘基其地有玉溪龜山寶駝峯天津橋陸子泉皆名勝遊衍佳處君景行先哲超遙世表其清修何如非揚子所謂龍蛇者耶余與君解后於嶺南君所至虛左前席者不少酒酣氣張浩歌激楚有燕趙慷慨之遺風雖不獲於時亦不辱其志今茲再聚首於青原將返其故居求一言以壯行夫揚子之云余與君同一慨也君歸益求參政之初服而修之求侍郎之髙致而襲之酌陸子之泉香而沃之天下之樂有過此邪若夫鐘鼎之腴軒裳之華樵叟漁童或笑之矣君字顯卿别字曰璟齋陳中常歸會稽序若耶仙子謂陽明洞賔曰久不聞樵風清唱不審中常丈人天逰何許賔曰聞其度彭蠡訪鄱君鼓枻青原白鷺之間五年矣仙子曰賔幸為我致書速其返無久滯也書至丈人即戒行李有海桑子者贈以言曰書稱耆夀俊詩詠老成典刑夫耆夀老成世有能致之者矣而俊為難俊而有典刑可師表尤難丈人𢎞度卓識超然物表論事常慷慨有賈生太息之意談笑傾座人有叔敖抵掌之風大夫資以問政諸生有所矜式夫是謂之俊謂之典刑孰曰不然奈何翩翩乘天風而棄豫如遺哉為我謝仙子曰道濟天下可也若耶之風朝南暮北獨私於樵者可乎謝洞賔曰深山大澤實多豺狼陽明射的無遺鏃可也豈容一矢之或亡乎丈人幸厚自愛尚當相期汗漫逰於八極之表秋雲先生集序秋雲先生吳會之英也學貫經史而尤邃於春秋文肆天葩而尤麗於詩苑余不及見其著述而獲其詩詞讀之大概律詩有廷筠義山之風流宫詞得仲初文昌之格調變陳言為雅辭發新意於衆見第之作者允為名宗會稽陳中常其髙弟子也慨先生舊藁不存僅僅收拾詩詞若干篇手自編次以示豫曰所謂千百之十一爾幸序其端余始讀中常詩歌樂府敬其卓越非凡而不知其水木之有源本在是也嗚呼安得梓刻而傳以與好吟者共之哉鄉飲酒詩序洪武八年十月二十有五日我縣大夫郝公好謙率厥僚屬暨縣之士夫民之髙年行鄉飲酒禮于鄉校明德之堂遵國憲也前期集賔佐師生咸習其儀是日大夫肅賔于庠門外揖讓升堂以序就位乃命諸生袛奉大明律而朗讀之又參伍講之環堂階而聽者如織決知禁防之不可犯法意之無非仁矣既而以法行酒爵有經而飲不亂諸生升歌自宵雅肄三達於臺萊菁莪又賦泮水八章以終洋洋乎渢渢乎沐浴熙明之膏澤鼓舞循良之惠化無不醉心焉者惟我大夫下車兩期堅守如鐵石至信如汐潮平施謹乎權衡燭隱踰乎水鏡用能令出而從化久而孚得人之和致年之豐凡茲嘉與士民同其休成其文者孰非豈弟父母之心所形哉翌日王君子與偕善賦者咸為發德之什而屬其序於豫嗟夫讀法周禮也所以納民於無過之地也有畫一之令與斷有賢大夫之善用法西昌之邑不其幸歟正賔陳謨序永豐教官序天下有才教官不患無名進士然得進士易得教官難今之教官多出於進士而進士之負才名者什一而最之亦罕矣此才教官難也吾邑郭子昭為永豐教諭埀二年彭君子文亟亟為豫稱其學之政能不諉責於訓導與之同堂合席口講指授朝益暮習科分藝别一遵時制而每加勵焉若夫抗顔乎躍冶之金而取長於攻玉之石日嚴乎占畢之訊而時鏗乎待問之鐘又無不曲盡焉如是而為鄉校庶有成哉余惟子文言然固子昭所優為也且夫教人自端本始子昭以衣冠宦族守正葩世學其質溫溫其言恂恂其動撝謙其文雅馴洪武五年余校文江西及開榜而子昭以詩經亞魁炳炳蔚蔚可為名進士矣既而上春官得職教永豐能舉其職如此可為才教官矣抑永豐歐鄉也多世科巨公老成聞家又得子昭樂育其菁莪名進士繼此有不彬彬矣乎子文又稱子昭采􅀢外勺水不辱於朋徒毅然自重未嘗一失言失色於同人嗚呼又奚特為才教官而已邪貞固齋文集序蕭尚仁氏養髙三華山下清修苦節積學績文甘以病廢然薰其德而善良者衆矣殆古之不顯亦世者歟其所著詩文命曰貞固齊藁余把玩不釋手愛其體裁正而豐約適中論議卓而波瀾洋溢允為成家諸詩小絶多警䇿擈茂而不鄙刻意而平夷律圓妥不陳五七言古體寂寥者更腴流動者絶蔓蓋所謂不以輕心出之者其文如此其學行可知矣尚仁本居城西栁溪之上有園亭池沼之勝實衣冠科第之族其先君子方平先生於豫為同志同學易同考業余齒差長一而頴異聰敏余固兄事之當前朝盛時方平壯逰嶺海間不返余獨學寡陋至今每憶相與童子釣逰之嬉文字講貫之樂何可得也故見尚仁如見方平不惟慶其有子尤慶其有子賢秀而文君子之流風餘韻光逺有徴固如此余日就耄尚仁亦華顛讀貞固集良深起豫之益敬書此以為序贈蕭季常序縣學生蕭季常將升大學來請言夫脫略草茅而縱觀山河之勝被服韋素而周旋冠冕之間馳逐雞鶩之場以超遙鳳麟之囿人固豔子之榮必子且貴矣抑傳有之觀於海者難為水逰於聖人之門者難為言思其所難為則將捨其故智以培其德基發其令聞如是而已吾老矣自顧無以補吾子萬一然信其必善學也必有立也故序以壯之贈樂正劉本和序蘭臯劉本和先生為郡庠樂正有年洪武壬戌上以勑符命郡縣以禮羅羅致巖穴賢士與共論治道本和在選中郡守與使者言樂正要職也非此其人則雅樂誰與興者使者勉為留之未幾朝命下釋奠先聖先師必用雅樂於是郡守之留為有以也樂正雖不得與三公論道於明廷乃幸得明蘷夷制作於庠序庶幾邦人士聳聞絶俗之正聲非盛美歟於時以郡守之命來取琴瑟之材於屬縣故旅于泰和因得相與道舊故序契濶焉嗚呼樂正世業也自其祖繼善先生與天慵熊先生為莫逆之交天慵精於音律盡以其法授繼善而繼善亦盡得其傳併以其不傳之妙而筆之於書其家固世守之嗚呼豈特廬陵一郡有所師哉大都大邑有不來取法者乎大司樂成均之教黃鐘大吕之奏獸舞鳳儀之祥豈有外於此乎樂正尤將訪材於它邑於其别也序此以嘉之樂正工詞章善戲墨山水至蘭菊竹石無不精到則皆其餘事也嗚呼賢矣哉贈寫真李約禮序晉人稱傳神寫影正在阿堵中蓋眸子人之神氣也然繇頰上三毛槩之則一髮之失而神非矣人固以全體論骨法神情氣韻坐立當無不肖似乃名國藝郭令公女指前畫得趙郎形貌後畫兼得其性情語笑蘇文忠公令人於燭下取壁上影不施眉眼而見者識與不識皆知為東坡此全體之論也阿堵固全體之大防三毛亦全體之一節也可不務與廬陵李約禮斯藝名三世聞四方余老復解后踈髯翛翛天風起之濯濯如萬絲栁而芝宇霞頰光眩映發可愛談論古今事變及其先世文物酒酣氣張偉然豪傑意態此其全體也凡得君一筆無不如生而亦不輕一筆以豫契久屢别為余筆之且誚豫江湖間屢筆屢不似豫故以前説為謝蓋全體未易言也約禮大父滄波與鄉衮文信公同里常畫信公於南禪觀者疑隨武子復生其父波餘亦如之班固稱士食舊德之名氏工用髙曾之規矩亂來食德者希若規矩髙曾如約禮不替益精幾何人哉嘗見前輩題安城劉氏乾坤清氣圗多宋季魁人碩士使來者願執鞭不可得於世教有補今亡矣約禮其無忽諸庸詎知今無其人耶劉子彥應徴序我朝天兵奮起淮甸擴清疆宇大河以北五嶺以南罔不臣妾洪武元年秋一鼓而燕市為墟再舉而關壠震疊天統斯得皇心載愈爰及稽古禮文之事申明廷臣搜獵巖穴網羅舊聞務酌古法因時宜不局局循故常已興而荐講迭考而旁求蓋質文相變損益取中帝王之道應爾也二年春廬陵劉君子彥由章貢應徴將入東觀升容臺階秩宗奉常與天下之英討論著作成一代巨典搢紳先生悉榮幸之願望之㒒請贈以言昔令狐楚嘗云叔孫通起帝典於桴鼓之中自此以還鴻生碩儒若賈誼董仲舒公孫𢎞希不以此進夫禮所以治神人和上下必若議焉舍儒者奚宜哉漢採秦儀雜就至唐號為繁縟宋頗採唐儀嵗祝天下五方神州宗廟大明夜明太社太稷太一九宫臘臘謂之大祀文宣武成風師雨師先農先蠶謂之中祀靈星中霤馬祖司寒司中司命等謂之小祀或者猶論其以儀為禮以器為樂將禮序樂和猶未能同天地之大禮官博士之職猶多疵闕耶幸而委巷之龎雜諸家之聚訟洛建大儒悉析其淆而歸諸正矣今之議者視唐宋不殆優且裕乎其弗獲施於當時者鴻生碩儒取而建白於今誠所當議也夫功成作樂治定制禮太平之盛致也值亨嘉之會被道德之華無疆之休禎也固以為君祝併以餞云贈王孝亷序孝廉字子啓通介人也值時危浮湛蹇傲以自晦前年會徴賢良方儼然衰絰中州迫起之不得已之郡控辭太守太守曰吾奉命子行矣及藩府伏謁參政陳情焉參政嘉之曰子姑終制需後辟孝廉既獲請益韜迹以遨洪武元年冬太子賔友李公行素奉旨搜訪巖穴士先時孝廉讀書南康山中人莫之知及賔友至太守王公薦其名亟欲與見而州物色無以應也孝廉聞之懼州且獲戾即為書抵夾谷侯慷慨伸志已乃出謁侯侯大喜迎笑曰子真傲人間萬户侯者邪孝廉謝曰正自不能不爾於是筮戒行州之賢士友咸為詩歌賔餞之介㒒敘之㒒既序事且頌禱之曰國之將興必産材於未興之先凡杗桷椳楔榖粟絲枲類倚疊堆阜而沉鬱之困躓之使諳練習熟強忍振厲以需於時用一旦遭時勃興皆能獻竒效智取勳名埀竹帛若古之輟耕太息抱膝長吟舉牛口出跨下緯蕭傭舂洗削賣漿者千載之下想望其人品風概何如也孝廉讀書時感歎於斯久矣有志當世亦素矣難莫難於際方興之運幸莫幸於當強仕之年不以古人自期可乎抑宋盛時有自天章龍圗兩閣學士開國太原郡公諱贄者孝廉所自出也詩曰無念爾祖傳曰公侯之子孫必復其始念之深斯復之大矣若彼石處士騎將軍馬自以為不啻榮寵者夫豈所望於孝廉也哉贈永寧縣丞序永寧二令蔣侯起宗承府公檄督轉輸南京之虧賦者吉支縣九侯督其六泰和以石計虧萬二千有竒侯來不十日輸者已盈萬嗚呼何神速也府公知其清強幹敏任之也篤蔣侯行以溫惠正毅感之也孚如斯而已泰和二令夾谷侯催科能政為他縣最尤敬蔣侯賢語㒒云宜得仁人贈言答蔣侯寵光蓋侯世家淮安之安東讀經史練時務識運數推移嵗丙午由樞密管勾隨總戎赴京欵附授湖廣行中書省掾在職一年具有政績參政傅公甚加敬愛隨侍入京遂擢二永寧永寧處萬山間接壤衡湘號稱巗劇侯豈弟以裕之廉介以端之化用興行頌美斯盛溢以故府公隆是委焉余惟天之生材當興王之運儲之也久則發之必大藴之者富則施之必充若蔣侯者詎止督虧賦一事見其所長哉使艎將東㒒始諧言靣曄乎其神若祥雲之履紫芝溫乎其氣若春陽之韻楊桞藹乎其辭若穀粟絲麻之周於實用也且其律已至潔馭下至嚴公家餼廩一不受第飲澄江水而去嗟乎又止二一縣稱最而已耶吉水縣尹費侯赴京序有司庶府近於君者逺於民其最逺者宰臣是也逺於君者近於民其最近者縣令是也書曰民可近夫民孰肯逺之哉乃亦不得不然者體統建而勢分絶也在易之比曰先王以建萬國親諸侯萬國至衆非一人所能遍親先王特親諸侯而俾諸侯各親其民此近民之道也故宰臣者承君之號令德澤而致之方國而縣令則宣通其號令流暢其德澤而致之民者也大明啓運尤重縣令之選優其禮隆其責且著令三年一朝不重內輕外使咸得自達焉美政令譽者既益知加勸而中材常調者亦凛有所勉而務求為善非良法歟於是文江令費侯振逺將行其嘉賔胡君子祺言於㒒曰侯為縣三年稱神明如黃頴川務保障如尹晉陽守清白如楊伯起忘憂喜如孫叔敖興學校如李贊皇别鰝魴如宓單父至若租稅無逋庸調均節工役日集獄訟不滋在侯為能事蓋不勝書者凡衣冠清流樂侯之趍朝而書最願侯之增秩而遄歸作為歌詩邀㒒序其端以為頌祝僕雅知侯善製錦而不伐又嘉子祺善論德而不浮故樂序之㒒嘗聞昔賢頌循吏有曰一之嵗肅而教之二之嵗惠而安之三之嵗富而樂之今文江之民可謂富且樂矣樂民之樂者民亦樂其樂民惟恐侯升朝為公卿而不得保有其樂於將來也侯必念兹必賦之曰歸哉歸哉尚與爾同樂乎哉永言序李伯葵氏以其永言示余讀之往復數四嘆其志於古道甚篤蓋近古莫如選次古莫如唐后來者莫或尚之伯葵學選優柔沉著每有新意至其曲折態度情景俱會處得於蘇州為多亦其資稟沖嗜好淡翛翛然出塵整整然束禮故其吟咏情性有之似之甚不易得也七言樂府髙古如遼陽行白紵詞長門怨次之唐律圓美清鍊又次之自他人不能兼者伯葵悉兼之矣尤為可尚嘗怪新學談詩類不滿人意尊選者易唐李杜以為剩出右唐者弱選魏晉幾成絶響剽掠潛竊以為工其為選也固不難點綴花草以為媚其為唐也亦安在必若阮嗣宗王仲宣所製不犯十九首句字而音節氣韻酷似之始可言選矣必若李杜為律為長句天縱渾成關涉浩瀚始可名唐矣斯乃白頭書生苦心莫能希萬一也烏得易而弱之因書伯葵集漫及此嗚呼尚有如伯葵之兼致其工者乎五同軒後序讀德基吳少府五同軒記有云古之同者同乎心今之同者同乎迹又云必將同乎古之人古之人可也旨哉言乎吾觀公亮王君與張子陽同里閈同患難同歸鄉同揚歷省若憲掾同者五而已矣由五而充之雖萬可也一理同萬事宜無不可者萬而有一之不同一虧而衆乖矣故君子不尚同不黨同者同乎理而已然理同事同其同也常事不同而理同其同也大易曰君子以同而異傳曰不能大同者亂常悖理之人也不能獨異者隨俗習非之人也昔人有同不同異不異者意頗近似而先正有上殿如爭下殿不失和氣者乃所以為同之大者也少府欲二君同乎古之人欲二君同心不同迹正以皆知同之為同而不知異之為同爾二君臨大事斷大獄決大議勿雷勿阿必辨必允俾民稱願曰蕭規曹隨罔美于漢房謀杜斷何羡於唐不其韙乎不其韙乎集太白句序右集太白句十章川上鄒君為子與王先生頌也何言乎頌先生受徴至不屈上寵嘉之也其寵嘉之何先生德充而慮審智圓而行方上始用臺臣言特徴為説書既入覲因壯其老官之要劇懇辭不拜再四益堅乃完其隱節也國制田賦之家大者嵗朝受諭鄒君既親覩先生寵嘉之美又並舟而上故有是作歸以示㒒反復讀之歎其精工昔朱文公有言李太白聖於詩者也凡人情物態他人纍句不了了者第一語而盡集中包括廣關繫大鄒君熟復之善用之非牽綴強葺者比宫商相宣金石諧和雖謂太白復生為子與賦可也㒒故書之且題其後云贈進士馮韶泰序洪武庚戌㒒校文廣東歸驛抵韶始與陽山學者馮君韶泰諧晤于舜峯之下其人磊砢而英俊其論議卓有器識㒒固卜其逺大且惜其不屑於場屋因以進士業勉之而君亦浩然欲相與求麗澤之益也壬子孟陬君惠訪豫于白下僧舍相勞苦外問近况則以周易貢于鄉上春官矣復求贈言嗟乎將何以為贈哉雖然韶古百粵也三代以前夔取磬材於韶涵濡聖化尚矣秦漢而下以武壯隋莫如麥鐵杖以文佐唐莫如張曲江韶泰得於耳目之見聞習於義方之涵育非如崛起草萊而幸致通顯以榮耀桑梓者也明良在上凡榖粟絲枲梁棟榱桷不遺遐逺不棄憔悴而况皎然以明經進者乎况讀四聖人之經知進退存亡之道思欲不失其正者乎外之為良守令內之為名公卿毋渝素守毋負實學其為科目之重也審矣其為邦家之光也逺矣請以為贈贈醫士謝禮卿序禮卿本興國衣錦鄉故家今居章貢以醫聞㒒嘗觀縣志鄉名衣錦以謝肇故肇在唐廣明中和間纍以機鈐經略功位至金紫光祿大夫檢校户部尚書爵會稽子在南唐保大有至尚書左㒒射右千牛衛將軍者在宋建隆有至散騎常侍兼御史大夫者皆積階銀青光祿大夫皆肇之後今其後雖多皆逐氓伍獨鄉名猶榮耳然禮卿獨以方技取重於時不失為士類數百年間衣錦之餘光不在此乎今夏邑判簿張侯由郡窰所歸而嬰疾疾日增衆醫持兩端涼燥雜試藥不能伐病令尹馮侯二令沈侯乃走急足致禮卿焉至則首踈其痰痞徐理其實熱凡兩下之十七八行而後所苦悉迎創而解向微禮卿投駛劑而姑優遊以養之是殆閉賊于奧而衛其堂也久則敗矣二侯命㒒贈言以餞禮卿㒒賞其醫術而髙其世家故樂序之人有恆言不得為良相則為良醫禮卿有焉謝維髙升太學詩序平川一小縣而在贑為上腴絲麻榖粟之利行乎四方竹箭皮革之美被於上國其民亦多秀而文碩而茂蓋維昔然矣在唐時則有若鍾紹京名在旗常功著社稷在宋時則有若李君行學行純懿為世羽儀其尤表赫顯顯者也夫平川有如是之先正前烈故士生其間資稟超軼者感慕興起樂於為善而常有以致身於不朽其次亦足自表見於時又其次亦不失為善士嗚呼其可敬也夫余嘗應大夫之聘一至其邑其來學之士有謝嶽維髙者質醇而稟厚內剛而外謙讀書經通其閫奧習經義要其指歸達於體用之學而不滯適於時用之宜而不浮可以為善士矣其於學校可謂不辱矣洪武十二年八月有旨州縣學生員在學年久學通經術善為文辭容貌端莊行無玷缺者升入大學教而育之而平川大夫以嶽為首選嗚呼在於鄉學卓有令譽則夫蜚聲於壁水騰躍於天衢固其所耳雖然嶽其朂哉抑抑乎其進之恭也恤恤乎其守之嚴也沉沉乎其思之長也遜其志如有所不能敏於事如有所不及使道之未充者日益充行之未果者日益果見聞日益廣而出於尋常者萬萬交遊日益多而得於名勝者肩相接也上以副聖君賢相樂育之盛心下以慰平川大夫士之願望而逺以紹鍾令公李先生之髙風芳躅也顧不偉哉既行拜余於青原故書此以贈之送陳守道就飬序洪武十二年春陳子都以詩經貢禮部授西安府盩厔縣丞是年六月到官即走急足三千里迎致其父母以就榮養十三年二月其嚴君守道先生始克就道來别於余余惟人莫難於能績學學莫難於能得祿祿莫難於能逮養學而不足以受祿者獨善之民也祿而不及於奉親者永感之民也今子都學足以適時之用春官擢其才天官隆其任二令於大縣可以為逹矣守道義方之訓行於宿昔而迎養之禮不憚於數千里之逺平逹於康莊端居於公館起處節適旨甘豐時可以為榮矣雖然長安古帝王之都也有洪河涇渭之川有終南崤函之險按周秦之故攬漢唐之遺在此行矣過曲江而想渼陂之勝槩過麟逰而弔九成之荒基而金城之千里山河之百二俯仰猶昔地有不慨然興歎惘然長懷者乎君故能吟明年侯君歸錦囊之富當傾倒羅列以貺我竹間集序古之君子政事文學理同而事異蓋仕以行其學之用學以充其仕之資也今之君子學不必優而可以從政仕雖有餘力而不必學者亦多矣豫讀王君竹間集固自有省哉君筮仕最早繇江右敡歷嶺海所至政與學俱有今聞者以其退而不自足進而不枉道也夫其鍾粹稟溫故其詩雅馴而藻潔其中寬而有制故其詩不矜而嚴紆徐而逹其臨政奉法恆務大體不激不阿故其詩體裁正而矩矱精其議論古今是是非非笑言雅雅無詘以隨故其詩善諷而婉堂有埀白之母二毛之兄纍纍辭榮歸養不克遂夢寐以之讀其詩知其於孝友最隆也暇日弦壺棋槊筆牀茶竈隨寓皆然尤深契參同旨收視反聽與天者遊其貌澤如也故其詩翛翛其氣飄飄讀之者又有滄洲紫霞之想嗚呼君於文學至矣既老而彌劭不倦而逾密獨其見於用者猶未足盡所學之長將時邪抑有待邪豫嘗慨乎天地之英華散於萬物其在人則為文章事業不得於事業則得於文章李杜光熖萬丈炳烈千古將非不得於事業然耶彼在天者吾無如之何顧吾所以自立與傳後何如斯賢逹之髙致也集中佳製率慕漢魏盛唐之風而無齊梁綺紈之習其為可傳無疑余又因君筮諸易剝必有復復必有泰以其時可矣如君之才其有不鳴國家之盛乎吳子齋奉母歸宜春序天下之樂莫樂於奉其親奉親之樂莫樂於還其鄉夫甘旨嘗豐而松楸不能時展綵烏日侍而桑梓不能敬恭親之心有不歉然長懷者乎茍有能養親之志者得不恐恐然如弗及乎夫弗獲已者時也弗可失者機也昔世變方殷人皆流離顛沛皆無如時何若江革負母逃難備經險阻採拾為養以幸免為萬全者豈獲已哉故遊子悲故鄉莫切於事變稍定之日稍定則機可乘若之何失之王仲宣稱張儀楚奏莊舄越吟以為人情同於懷土不以窮逹有異而况鶴髮偏慈日夜念其親戚墳墓宜何如邪齊之吳君奉母歸宜春而章貢交遊與流寓賢士莫不嘉羡嘆其榮於晝錦賢於以官為家者俾余序之夫以齊之之賢孝於奉親先意承志他人稱為盛美者齊之皆常事而還鄉亦常事也常事而弗克如齊之者猶多即其善可一二計哉今還其鄉昔之耆而艾者存十一於千百必皆稱願曰賢哉斯母有子如是慈孝之表也昔之童而丱者若壯若疆必皆嘆息曰吾戚懿尊章安在斯人斯母融融然泄泄然天相之福也善果不可為乎為善果不康裕乎陶潛田園荒穢可從而理也王凝門巷果木可方而列也玄晏之書滿室子雲問字之載狎至而太夫人輊軒板輿潘安仁間居之賦如畫也不尚有增夫天理民彛之重哉青陽行樂圖序清江孫碧霄為西昌二守黃侯允中寫青陽行樂圖僕元年冬歸自韶石始獲與侯面且觀圖焉乃序之曰古之君子極軒冕圭裳之貴而不易其山林畎畝之守者其樂無不存也故觀豐水之有芭可以知數世之仁動髙山景行之思可以忘其身之老夫山與水何所獨無何人不玩然反諸已而深契省者寡矣彼其考澗槃以自足樂泌洋而忘飢自謂三公不與易者抑豈知窮達一致定應不拔即廟廊與巖谷何逺故君子之樂無適而不存焉無適而不存者得喪是非舉不足以為纍也昔有以問樂之故曷以曰仁仁故樂極天下至美不足以過之况山與水乎山與水寓也而樂亦無不存也黃侯系出雙井生嶽州臨湘縣青陽里長即宦遊四方因以青陽為别字不忘本也畫史寫而成圖若常對然侯起居節適時而展之先人之桑梓童子所釣遊歷歷然也昔太公封齊五世皆返葬於周狄公望太行白雲念親舍在其下君子移忠於君而孝思常不替若此然則觀斯圖者不獨見侯之樂抑足以知其孝矣况夫青陽者春之司也在天為元在人為仁元首善也仁全德也里以為名而侯以别字豈徒然邪凡立身種學歸宿於仁蒞官行政根本於仁一動靜和之以天倪外窮達安之乎素履將風日妍美吾沖襟也原隰光華吾生意也青陽之景常淑青陽之里常近何隂威慘戚之患何道路阻修之懷亦何適何寓而不樂哉吾故曰仁故樂而非窮達一致定應不拔者其亦孰能與於斯贈醫士劉彥昭序醫有經有守有變理以為經法以為守而變者權衡乎其間理無變法有變變而常適其中其惟洞於理而精於法者乎天官醫師理之原也內外經理之淵也然而簡奧玄微未易靈悟故南陽張機病其難明且痛宗族以傷寒斃者數百口遂著為經論以發其隱備為治法而處其方詳為問答以盡其變此東漢以前所未有也至成無已劉河間諸賢又懼南陽之論猶非後所窺測又從而毛舉髮櫛别嫌闡幽門分類析殆無餘藴此又晉唐以來所無也凡欲所學者洞其理精其法而妙於變耳鳴呼大賢欲公其道於天下也如此而世或有得一方自以為祕施一劑惟恐人知同業而羞講共事而忌疾者何哉學聚問辨之益不充而謀利計功之私日勝故也友生楊仲升曰太醫彥昭劉君獨不然彥昭世業也恆不自足合孔孟岐黃之書而求其統之宗會之元也理有未白法有所窒親賢近仁常溫溫乎金之奏而玉之應也人有疾不擇貴賤而赴之不以為功而功之歸者衆與之藥而不責償者復不少唯務已人之疾而已余今年病熱甚得彥昭良已至今無以謝也彥昭家種杏成林而林中題詩連屋者得詩重於得金也先生幸書前之所言得藉手謝焉余與仲升别久觀其文嘗有為陳侯謝彥昭者今其言又若是懇懇信矣哉為賢醫士矣夫去其謀利計功之私而廣求學聚問辨之益理以為經將無一之或遺法以為守將無施而或戾權衡以通變將出入疾徐無不迎刃而解周官所云嵗考十金為上者其必於彥昭見之且窮而在下存心愛物宜莫如醫此南陽著書意也夫讀其書安有不廣其意者乎孫碧霄歸新渝序辛卯壬辰之亂清江賢士君子率徙家保上流不數年而上流亦不可保往往逐便利茍昕夕以僅免顛隮為至幸方是時王孫公子求如窶人有不任者矣求為他道有弗習者矣雖賢士君子不失其正者幾何人哉而渝上孫君碧霄寓西昌獨不失其所守之常十五年如一日在他人坎窗者君履之若夷及豺狼之性稍就帖息向之鼠竄者皆返我羊肆而君所至人愛之敬之殆不忍離君亦安於久客如其鄉然嗚呼君賦質厚以沖處性謙以周待人和而正學有源本自天時地理方術卜筮等皆所研究而丹青圖寫妙得顧虎頭吳道子法則其世業尤為無敵故不求即人而就之者衆未嘗枉已而處之者裕常義取而無浚恆雖淡交而有深益兹其所以稱善於亂世曲全其所天也歟是豈不賢而能之歟余與君最厚且契然方役役四方不得日從君遊樂不亦重可憫笑邪今年留章貢於太守常方壺所觀晉隋唐宋名畫法書不一其尤著者羲之智永真迹余固識其筆意若閻立本醉道圖許道寧米元章山水黃荃崔白易元吉花木猿鳥等類能觀其神氣之逸耳至其造詣精絶天然入神處概不能窺測一二念安得碧霄共觀之而指教其肯綮要妙豈非絶無僅有之一快哉適兒子家問至言君行且歸渝上得之惘然殆難為懷抑君知天時者也君之行時之泰其有兆乎余逺道不得執别獨贈以言夫當亂世居他鄉不失其常猶若此則其歸亦焉往而不得所當勉者惟善保以需良晤而已斗室詩序易曰退藏於密傳曰居天下之廣居密者心也廣居仁也君子之道斂之不盈方寸不亦密乎散之彌滿六合不亦廣乎是故挫萬物於一毫卧千里於一咫角堆以取勢位吾皆蝸之競侈以髙族閭吾皆孩之天吾與徒賢聖吾與師振古豪傑吾與遊衍也鞏昌汪君敏德實辦兹事扁所居曰斗室既自賦之又與朋徒偕之工者咸登諸軸豫既為吟二章且介豫序其軸端嗟乎善觀天下者天下小於斗善宰天下者天下不出吾斗古之人貧而漁釣賤而耕莘胥靡而版築其藏密斗室之中亦樂矣然其固居天下之廣居也自非逹可行於天下則固終身甘之矣或曰斗室陋如之何余曰圖史吾金玉也風月吾藻繢也文章吾錦繡也杖履吾車馬也江山吾爼豆也草木之榮華禽鳥之宮商與凡樵歌牧笛則皆吾聲伎娛玩取諸左右無不足也何陋之有贈袁叔異入國學序吾鄉故家文物凡數姓而袁氏最著曰文焴者以天子與日月並明賦偕兄樵同登紹定榜其子灝復以天子純德天定位賦世其科而樵之兄弟若椿若槱亦皆先後馳聲名列進士榜中載在郡庠碑刻班班可考斯亦盛矣哉灝之子公鼎當元之初隱德弗耀公鼎之子啓東際皇慶延祐盛時甘肥遁以老其子則復初也與豫同學然皆不得志於場屋復初子彥聖也際大明興運為太平幸民於是縣選其子叔異入鄉校為弟子員而彥聖亦幸其子之周旋乎衣冠爼豆從容乎揖讓進退上以紹奕世之箕裘下以啓方來之簮紱其必在是矣叔異粹乎其為資也煥乎其為表也鑿鑿乎其制行也軒軒乎其立志也碩碩乎其務學也蓋已秀出乎等夷矣洪武十五年皇上以胄監新闢學舍增廣取郡縣生員以實之西昌之學起者七人而叔異在焉是行也吾知叔異近有以光其髙祖父敷遺之休逺有以紹其六世七世祖武之科名不斬之德澤固有出於同時同門之右者不其偉歟因府學生員蕭李常為叔異求贈言故敘其世家以期之云栗陽劉氏族譜序澄江稍迤而南為栗陽劉氏以和世居之居有園池亭榭松林竹樹幽雅夷曠而以和益簡淡濟以吟咏之勝殆古之肥遁者矣自亂離來余避地韶陽與以和不相合并者數年然閭里凋敝故家老長存者無幾暨歸獨以和無恙依然保有林原之趣蓋捐利好施貽謀敦善富若寓而不矜憂可通而不纍故雍穆成風焉今年春余過其家握手相勞苦外間出與其伯氏以文所編族譜一帙介豫敘之且深慨夫兵燹散逸之餘其所紀者記憶耳矣豫惟與治同世者事易集與亂同世者事罔攸濟矧殷憂且不暇奚能庸心於是以和之志可悲也夫按劉氏其先金陵人宋紹興間有諱廷傑與兄廷俊居于縣治之東廷俊復遷之燈窩嶺進士談倫為易其名為登科嶺以期之廷俊後果登第官至辰州知録廷傑五傳至文先則又徙今之栗陽凡若干世其間業儒以光于仕者督耕以食其力者樂恬淡以尚其志者存忠厚以世其家者躬孝弟以順其則者皆輝映簡册表表可見夫自仁率親而知愛自義率祖而知敬自禮率分而知不越若斯譜之作其為世道計也深矣使後以和者因睦以合族而不至於途人相視則其道可久而子孫長世也端不在兹乎嗚呼以和之志其可悲也夫其可尚也夫海桑集卷五
