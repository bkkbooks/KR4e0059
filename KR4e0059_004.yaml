body:
  text: 海桑集卷四明陳謨撰碑韶州虞帝廟碑韶郡西北百五里許嶺曰皇岡嶺水曰皇潭水古者於焉廟祀虞帝以故山水胥以皇稱廟莫詳厥初郡志云故老相傳帝常奏樂於邑東磐山上故石號韶而州以韶名或曰帝時巡亦南嶽止耳不狩荒服蘷取磬材於韶至今韶多磬石殆是耶唐謝楚碑云曲江有虞祠率誠奠饗棟宇過逼儀刑弗稱元和末刺史張蒙改作清廟祠事始嚴楚碑唐長慶元年所樹代不廢祀宋嘉定元年提刑廖德明復大新構正南面位建跪坐像臯益稷契四臣從焉朱文公為作迎饗送神曲有元之季羣不逞倡亂廟落為墟大明啓運金陵建都吳元年信安徐公炳文由股肱舊臣擢知韶府嚴明綜核庶政咸理百廢具興屬邑稟承民力和裕首復相江書院乃眷帝廟大懼明德馨香祗薦無所或寄他宫不亦野哉躬履祠基稽度位序斬木陶埏費不鳩民僚佐悉力工勸吏勤作貌顯敞盤焉囷焉輪焉奐焉二妃是室四臣就列咸復其舊落成之日山增水益松茂柏悅耋稚呼舞嘉栗肥香是蒸是饗惟帝陟降在天巡狩在梧神用眷顧實兹嘉寵於是郡幕長走書來速文願刻貞石紀徐公績埀示久逺謹按傳書言後有作者虞帝弗可及已天地之大日月之明亘萬古今囿其覆載私其照臨卒莫能知其所以為而為之者何也德不可名而功莫能勝計也惟帝盡人之道處變而常盡君之道恭已無為萬代師法萬代祀典神之於赫無乎不在韶雖逺在百粵昔者聲教固暨之矣奚以迹論哉然而祠貌翼翼則由唐刺史張公宋提刑廖公迄今太守徐公而已不其難乎其或繼徐公者百世尚之矣是役也洪武二年正月庀工三月畢事門廊殿寢靡不嚴正二守假原通守蕭隆幕長楊居禮知事程玘實相成之曲江主簿賀元禮典史晏德明實董營之皆不可不書頌曰聖禪平陽化流百越其化伊何日用飲食惟此九韶衡嶽孺孫皇岡巖巖皇潭沄沄重華邈而韶音尚爾孰為亂階蕪湮祠祀顯允徐侯邦之藎臣受命作牧肅恭神人爰作新廟有嚴有翼靈星啓門褕翟端室臣哉鄰哉巍巍巖廊吁咈都俞復萃一堂顯允徐侯惠民天寵孰是炎荒見此埀拱逺徴元和近者嘉定孰與今兹大明新運韶治曲江府肅縣勤伐石刻辭紀功廟庭無為之化萬邦作孚佑我皇家丕隆昌符興國重修孔子廟碑洛陽賈侯思復繇明恕廉勤擢知興國縣視篆既月為吳元年永惟將隆化本必厚教基惟是獲上信下恱近來逺形之而動神之而宜惟聖訓焉依乃相廟學有其廢莫或舉者有其敝莫或改者有其違莫或正者大懼無以尊明祀示永久舊制靈星門孔道抵城濠端直平豁宋元間民侵沒且百年望宫牆者窘仄由徑不良于履視前尹屢規復屢沮侯力復之會部使者至民復有沮者侯指陳益力使者周觀大是之肆得以闢乃加甃焉夾樹仞墻雜植佳木參差蔽虧外伉㧾門丹碧翬騫內浚泮池芙蕖槐柳停蔭清漪壓以飛梁俯以亭檻觀者改觀兩廡從祀棟宇震凌者易粉墨蕭瑟者奐禮殿冕服采色彰施削去不度章數等威折從禮典舊有二程祠伯子叔子立侍倣先師位改侍坐焉舊闕文昌祠規講堂左築宫闕像設焉勒曲阜司冦像于貞石復兵毁佑文像于廡東籩篚爼豆尊雷坫爵百爾器備肄習有齋燕坐有席庖饌有舍祭器有所垣庳者崇甍壓者植甃闕者補渠壅者通自一瓦一桷罔或疏圮此一役也侯倡之次年主簿王君繼先實來聰敏練達併力一心贊幕胡君德中相協厥成致完致美邑人聳嘖歎所未覩每朔望從僚佐引儒彥談經訂史坐堂上既乃人賦詩一躬校工拙厲其不逮以為常聘禮碩師增弟子員復其身朂其業時與揖讓降升飲食談詠人艷其榮焉及是校官趙炫耆儒李士俊等合辭來謁文刻於石惟夫子身雖素王而賢於堯舜位雖大夫而師表百王雖不有天下而以萬世為土秦滅棄以覆漢表章以興聖曷故焉其教曰君子學道則愛人小人學道則易使也有民人社稷者斷斷乎斯其的也已惟賈侯不鄙夷其民陶以豈弟動以禮樂均賦役也制役必緣稅制稅必緣畝護善良也坐強梁讎殺者盡殺不恕躬化理也訟庭自清竭誠感也甘澤屢降斯可云形愛人之實矣是邑故産英碩最其尤者唐鍾紹京宋李先之輩蔚為名臣騰耀史册罔辱聖門今兹濟濟祁祁不尚有繼先哲者乎邑長二大興廟學茂育菁莪如是厥效必將表著方來是皆在所宜頌頌曰有文斯廟表兹平川鄒魯是承洙泗是源有倬其道坦坦平平率履以逹階之聖垣淪囂沒溷孰清以汰復古之規侯功是賴抑抑賈侯民懷其愛母爾斯爾靡厭靡怠聖門之役羣歡輩趍材良工哲巧殫力輸巍巍煌煌素王之居泮水樂只奚斯頌諸衮裳劍履瑶琚玉藻不愆以式其曄肆好八埏流虹埀光講堂孝友張仲來降文昌文翁漢代栖筠唐室邁勛旗常興學殊迹有美平川章甫深衣時節春秋蚤夜競持聖訓丕融侯德不替刻石廟庭欽于世世銘退密軒銘城東陳允中氏扁其燕處之室曰退密軒安城彭君伯圻為小篆書揭之余嘗坐軒中翛翛有出塵之趣數介豫為文以自警或曰退密本易大傳語聖人所以知來藏往而凡學道者所以的歸者也密在我何事退乎審可退也亦可離乎余曰不然彼溺而不知退者外其身客其心安覩密之所在哉雖頃刻不能退也茍介然而或覺焉身為我有心在時而密幾矣其覺也乃退也豈有離合乎哉允中負秀質不幸遭叔季浮湛里閭或出而事大夫之賢者終非素志旋復棄去眷初服之未替植園廬以逃喧賢於殉人殉利者逺甚抑所謂知安分者乎知安分以求退於密進進其有窮乎允中喜曰是吾志也吾方以圖史為佩服花竹為樊墻風月為爼豆江山為朋遊遇會心處即欣然忘倦人未必知也吾之密如是而已蓋將老焉余重嘉其志因序次以記于軒且銘之曰聖有謨兮藏諸密玩而索之守勿失脫塵羈瞻泰宇引而歸之燕且譽軒有銘兮德是朂碩人考槃矢弗告誠之堂銘南雄朱氏系出徽國文公有曰克誠者公九世孫也始徽國季子在為吏部侍郎吏部之孫澤為南雄司法因家焉澤生進士采保昌主簿采生慶克誠髙祖慶生旗旗生佐佐生允升廣州鹽司幕克誠世南雄之業讀徽國之書扁其堂曰誠之求豫銘以自朂豫因為求金華吳廷碩小篆書之而銘諸下方云銘曰周子曰誠無為然則誠之者殆有為乎又曰聖誠而已矣然則賢其誠之者乎先正指歸會于徽國明善由於擇善誠身在乎固執是持是循有嚴有翼美哉克誠乎子先正之後也尚佩服乾乾而勿失德生堂銘古升劉德亨名醫也以德生名堂德之者衆矣吾故賞而銘之曰天地之德曰生而已有生之類莫大乎人天地不徒生也必生百物以養其身不徒養其身也必生百藥以驅其客邪而完天真凡榖粟絲枲牲牢醴酪一日不可少與輕而飲食男女五聲五色所以為生亦所以戕生於是草木之英獸石之精毒如堇荼仁若參苓賤至於牛溲馬渤貴取夫丹砂空青茍善遇之皆足起人於埀死而壯之頽齡此古者良醫師所以握化機而並行賢哉劉君善攻堅如王翦不責報如宋清我銘其堂用朂永貞將來裔繩繩而食舊德且與古人奕奕而埀令名也安安齋銘讀望之之文宏博淵深非始學意見所及然進為之方則固引而未發也記曰安安而能遷乃君子入德之事請以為安道勉乃銘之曰我觀風雷震奮飄激其在于經為恆為益恆者安身立不易方益者遷善不循故常非恆無益能安必遷進修德業罔或容偏有美君子在彼林谷矢志安安身心之朂敢詔一詞見賢思齊三人同行必有我師勿吝勿驕勿封勿閉動靜皆安喧寂無異恆益二象請圖諸壁惟視斯語以永昕夕何侯廟鐘銘侯自元朝至元丙子內附之初來監治西昌實能父母其民保障其土故能廟食于兹百嵗益虔肹蠁感通震於逺邇禮云禦大災捍大患則祀之惟侯有焉先是廟有鐘鼓嚴祀朝夕洪武之初鐘毁不存十七年衆善集力興是範圍鳬氏告功非銘不永銘曰惟侯之民功亦既銘于鼎鐘惟侯之廟貌非鐘不震耀鏗鍧鏜􅝅金聲烈烈匪惟侯威益彰厥德既鼓于宮亦聞于野侯之出入有肅其駕彼蒲牢之吼徒警于海隅曷若此音輯定我民居侯有甘棠蔽芾于西昌我銘此鐘千載不忘東忩銘天之兀氣實萌於東東者生方萬物之宗人之生意皆本於仁仁者人心衆善之根有美君子為里之望以道牖民其居東嚮東方漸明旦氣最清我則挹之穆穆以澄月出東方金魄有耀返我靈臺圓光湛照維伯循氏氣志內降斂此萬慮泰然一窗筆床繭紙竹簡韋編有朋有徒以日以年我銘座右敢朂日新聖有訓言修道以仁括囊齋銘慈湖楊先生之孫孟禮以括囊名其居求其銘於豫以自朂焉夫括囊於坤六四之時而有無咎無譽之美可也然當不言不笑不取之際所以括其囊則然矣而時然後言笑與取則囊之括豈固不出哉所以括者時也所以出之者亦時也余懼其膠於一而不知因其宜以求適中故為之銘曰士之所難泛應無節茍有弗安我囊斯括其括伊何萬象包羅溟涬無形孰識少多千嵗非逺頃刻在兹散斂無迹變化神機倐焉而括忽焉而啓啓之以時括亦在是有括無啓執一不通有啓無括流俗之庸君子存誠與天同運坎止流行物來順應敢贊一辭刻於髙堂敬恭朝夕是為括囊傳乘槎客傳客江浙竒士姓張氏字安國隱居玩易窮變極數别自玄悟值天下雲擾不能俯仰抹撒深自韜抑寄迹卜肆中假六書文推人禍福吉吉凶凶輒先處其時輒不爽所至座常滿適相邅建業相與論易其言曰易卦興而結繩廢為人文太初卦即書之形書則卦之畫而縱橫旁午曲折之中古由籀變篆分𨽻後世變楷行草則加之波戈飄瞥以就簡便爾實皆卦之支也吾第考書之文與數以起卦渙然契矣昔者聖人觀河圖以作易程子因見賣兔者以為觀此亦可畫卦不但河圖也然則何者不可卦乎書文點畫形象古今不甚殊而人心匠經緯布結疏密妍醜人人殊禮所云禍福將至動乎四體者書尤可驗吾數亦竒中以此吾遊藝於道其幾哉且夫﨑􅋂歷落者遊俠之常態也麾斥汗漫者賢逹之髙致也博望侯乘靈槎犯斗牛取天孫支機片石而還竒事竒事六合之外聖人存而不論政此類爾吾故自况曰乘槎客云僕行四方所見聞傳聞以易數名多矣皆並緣易理時亦弋獲皆未若客竒中者乃傳其事以覺來者贊曰聖人作易精可通神明之德粗可類萬物之情其用亦然矧幾者動之微吉凶之先見乎然惟可與神遊八極之表者為能與於此博望侯窮河源歷崑崙以超遙於銀潢天津世俗疑焉逹者信之且嚴君平不嘗遊乎不然支機片石烏能識之哉後世如郭景純張茂先李淳風穆伯長輩皆嘗客槎上皆深於易者也若張安國氏知之者蓋寡矣世所知者徒藝焉止耳至若槎上之趣藝不足以云烏乎賢哉康母陳氏貞節傳節婦姓陳氏名端生延祐四年丁已年二十歸康氏仁安歸之二年生子德昭又三年喪夫孀獨居窮者凡七十年始終守節如一日當夫亡時所親竊議曰此紅顔玉質寧堪書哭耶節婦聞即仰天泣誓曰為婦而棄姑以負所天義與審然覆載所不容矣事姑益謹凡可以備養者傾其奩中不吝茍可以資身者左右承順無方下至補紉浣濯不以付婢子養姑十三年而姑亡喪不愆禮葬不踰期平日內睦姻族外和鄰保行止端莊無瑕玷前後所居凡經數燬拮據興葺皆以加前子雖幼孤訓育使士嘗禱于天曰願保此子庶妾有托當四方盜起節婦能先幾半夜走遁巖穴已而盜果入城獨舉其家得全自是終身無恙矣大明洪武十六年江西提刑按察司試僉事翁師善行縣首訪節義父老即以陳氏舉僉事亷得其實遂以聞十七年禮部移江西布政司司委吉安府知府陳茂材勘核再申十九年得行移旌表縣令徐伯敏奉旨惟恭即日樹臬建表於康氏門外署曰旌表康仁安妻陳氏貞節之門遵國典也節婦之大父叔賢以醫名世為醫學教諭父仁可鄉稱善人實泰和宦族子德昭能讀書隱德以儒發身稱于時孫二人皆賢秀曽孫一人嗚呼節婦生長前代老於天朝享有色養惋愈而孫曽雅雅娛膝下可謂之備福也已至若獨膺國寵表此一門雖金花鸞誥何以易此則榮之至也贊曰惟節婦陳淑惠清貞族出穎川歸于康門其出其歸德門巍巍一子二孫流光逺芬傳德無窮視此貞文説學耕説古者四民士處一農處二豈不以士尊於農乎曰非也甫田詩云蒸我耄士管子云農處野不昵其秀民之能為士者必是賴也然則士出於農工商不敢與齒豈曰尊於農乎特士之得名以學農之得名以耕耕與學理同事異二者可以得兼者將古之民歟二者罕能以兼之者抑今之民歟由其理之同故聖賢每以耕喻學由其事之異故後世或貴士而賤農昔夫子之言曰君子謀道不謀食蓋學所以謀道猶耕所以謀食也學非以求祿猶耕非以求餒也然而祿與餒不求而自至則是君子謀道者憂不得乎道也不謀食者不憂去其貧也勉其在我者而聽其天者耳孟氏之論仁亦取類於五榖荑稗凡此皆以耕喻學其理甚明自貴賤之勢懸朝野之塗分富貴之極反以田舍翁誚其祖父者有矣吾讀豳風豳雅豳頌國脈民命所繫至重夫孰得而賤農哉不賤農所以貴士也仁玉康氏有令子曰以忠質粹而氣沖謙已而下賢佩服圖史乾乾以終日起居甘旨婉婉而承顔扁其堂曰學耕之堂豫嘉其好尚而欲納諸大成也本聖賢之訓而原夫學與耕同一理考古今之判而要諸士與農同一初用以廣其志焉作學耕説以貽之聞人錫字説大聖治水洛吐神苞疇興範啓人文敷朗繇墳典以降天錫禹一初也王訪箕子又一初也微禹莫能受諸天微箕子莫能埀諸後治天下大經大法具是悉矣聞人氏彥芳有大丈夫子覽揆之初命名曰錫既加元服字以禹疇殆使其棄幼志景聖謨成令德也錫重豫執友求衍其義以自朂惟是九疇既敘入德具焉稽諸禮經人生十年曰幼幼斯學二十曰弱弱斯冠幼與弱其間離小學升大學則學修齊治平之道較之箕範要歸在皇極本根由五事而五事又本於敬敬則五事修而身正身正而天人合福祿備其道一致錫乎勉之哉雖箕陳武受匪臣民是為然天子庶人一本於修身堯舜君民事業存乎畎𤱔射必志鵠蒙養作聖理豈二歟錫乎勉之哉漢儒專以災異驗洪範夷禹箕於星史更千百年及朱蔡始復大明而父以是名以是字不徒然也而必敬宗而父之命若書及範是訓是行日三復不啻多將四十強五十艾方物出謀發慮以服一官之政致皇極之君以福歸極之民無愧臣道斯無愧子道而成人之責盡矣錫乎勉之哉貞白説貞白生年甚富學甚劬事親讀書外乃至雜家衆技悉獵取其華惟是之歸處身恆以智恬不茍止妄隨别字貞白生來請其説余惟貞白者天然之白也天然之白羲農堯舜孔子顔孟與我同然也匪直與我同然古今天下人心秉彛好德者舉皆同然也自昔經傳言貞莫尚於易論白莫辨於鄒孟氏夫貞正也易利貞不貞不利又為貞固堅守故又有不可貞不可疾貞者焉又為久而常故又有貞觀貞明貞一者焉殆以凡貞者必固守其正則可久而常耳禮曰白受采言忠信可以學禮白以喻質也獨孟氏不然因告子外義折以白馬白人因告子生之謂性折以白羽之白白雪之白白玉之白白以喻性也天地之性人為貴猶玉之不可賤也玉負其天然之白水火不能變塵滓不能干猶人負其本然之性大行不加窮居不損也君子之學求以全乎是而已矣全乎是者羲農堯舜孔子顔孟之所同也故自然者聖哲也勉焉者希聖也清明在躬而不容利欲入之夜氣所存而毋致旦晝梏之吾知貞以守吾白耳豈不和順內積而光輝日新也哉吾子意殆在兹乎吾又聞古有陶隱君潔身完節以處叔世德學著述師表百代毋論方內外想見其人自命曰貞白先生陶公真能守其天然之白而不辱者耶吾子意將尚華陽乎未可知也併以為説焉鄒律伯春字説瓠巴鼓瑟而遊魚出聽伯牙鼓琴而六馬仰秣鄒衍吹律而寒谷回春聲之和能召氣之和氣之和能感物之和固其理也府學生員鄒氏名律字伯春昔劉向説苑云燕有寒谷不生黍稷鄒衍吹律暖氣隨至草木皆生故取以命名而求豫説以自勉夫以寒谷而吹暖律非黃鐘之宮乎黃鐘子律非春也而實為春之始故吹之而暖氣應焉不寧惟是六陽律自太簇至無射皆黃鐘也六隂律自大呂至林鐘亦黃鐘也皆足以致和也且元氣流和貫金石塞宇宙窮巗險靡不被及而寒谷猶自外於化育焉乃槖籥一鼓百物自生聖人制律有功於天地如此哉雖然黃鐘為春之始於時為春則於人為仁黃鐘為十二律根本春為四時根本仁為萬善根本也君子之學亦求仁而已矣伯春誠能由律之和以見天地之春由春之德以識吾心之仁涵養其本原當主於靜省察其身心不流於欲出入起居無不適於正周旋規矩無不中夫節修於家即所以施於國厚於已即所以及於人將見推律之用上達於郊廟神人之際廣律之功下及於昆蟲草木之微而仁之功用極矣又豈特一器一物之感召遊魚出而六馬仰哉伯春妙齡而美質積學而勤修吾故以逺大期之以德業勉之庶其常有以自激云敬輿説余聞風不厚不能負大翼水不厚不能負大舟君子之學不厚不能舉大德善修德者莫如勤禮善勤禮者莫如盡敬昔者夫子教顔淵克已必曰復禮語仲由為國必曰以禮由也而逹此則可幾堯舜氣象回也力能任之則其效至於一日天下歸仁此修德者莫如勤禮也昔者北宫文子見令尹圍不能敬其威儀以為無威儀者不可以在人上令尹其將不免成肅公受賑于社不敬劉康公以為人受天地之中以生能者養之以福不能者敗以取禍而有以知成子之必不反也此勤禮者莫如盡敬也故子思子之言曰敦厚以崇禮而內史過則曰禮國之幹也敬禮之輿也余宗弟厚字崇禮既取子思子之意以自命而其友生又取內史過之語勉而進之别字曰敬輿今受命襄陽界行來徴余説子謂勤禮盡敬皆非敦厚者不能子既允知之矣然敬其本也人知敬者禮之所以立而豈知敬者禮之輿哉大抵人能𢎞道道不能𢎞人凡三千三百之目所以為天理之節文人事之儀則者茍無其敬禮不虛行故輿者所以載禮而行之者也崇禮資稟沖粹而持之以謙才識優長而充之以學不惟敦厚於禮抑且敦厚於敬其為輿也大矣其能舉德也信矣繼今以往進顯要而大用於時所以定親疏而決嫌疑明是非而别同異下而分爭辨訟教訓正俗上而班朝治軍蒞官行法大而禱祠祭祀供給鬼神孰有一不本於禮者乎孰有一不由敬載而行之者乎子勉之子勉之海桑集卷四
